<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky1: #0a1628;
            --sky2: #0d2744;
            --sky3: #0e3d6e;
            --sky4: #1a6fa8;
            --sky5: #2aa8d4;
            --glow: #4dd8f5;
            --glow2: #7ef0ff;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.15);
            --text: #d8f4ff;
            --text-dim: rgba(180,230,255,0.5);
            --accent: #00d4ff;
            --accent2: #a8f0ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--sky1);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: default;
            position: relative;
        }

        /* ── SKY LAYERS ─────────────────────────── */
        .sky-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 100%, #1a6fa8 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 80%, #0e3d6e 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 70%, #0d2744 0%, transparent 60%),
                linear-gradient(180deg, #050d1a 0%, #091d38 30%, #0d3560 60%, #1a6fa8 100%);
        }

        /* aurora streaks */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .aurora-band {
            position: absolute;
            width: 200%;
            height: 180px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0;
            animation: auroraFloat 8s ease-in-out infinite;
        }

        .aurora-band:nth-child(1) {
            background: linear-gradient(90deg, transparent, rgba(0,200,255,0.12), rgba(100,255,220,0.08), transparent);
            top: 25%;
            left: -50%;
            animation-delay: 0s;
        }
        .aurora-band:nth-child(2) {
            background: linear-gradient(90deg, transparent, rgba(50,150,255,0.1), rgba(0,255,200,0.06), transparent);
            top: 35%;
            left: -30%;
            animation-delay: 2.5s;
        }
        .aurora-band:nth-child(3) {
            background: linear-gradient(90deg, transparent, rgba(0,180,255,0.08), rgba(150,100,255,0.05), transparent);
            top: 45%;
            left: -70%;
            animation-delay: 5s;
        }

        @keyframes auroraFloat {
            0%   { opacity: 0; transform: translateX(0) scaleY(1); }
            30%  { opacity: 1; }
            70%  { opacity: 0.6; }
            100% { opacity: 0; transform: translateX(60%) scaleY(1.3); }
        }

        /* ── STARS ──────────────────────────────── */
        #starCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── FLOATING ORBS ──────────────────────── */
        .orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: orbDrift linear infinite;
        }

        .orb:nth-child(1) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,160,255,0.15) 0%, transparent 70%);
            top: 60%; left: 10%;
            animation-duration: 20s;
        }
        .orb:nth-child(2) {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(100,220,255,0.12) 0%, transparent 70%);
            top: 40%; right: 5%;
            animation-duration: 15s;
            animation-delay: -7s;
        }
        .orb:nth-child(3) {
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(0,255,200,0.1) 0%, transparent 70%);
            top: 70%; right: 25%;
            animation-duration: 18s;
            animation-delay: -4s;
        }

        @keyframes orbDrift {
            0%,100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-30px) scale(1.1); opacity: 1; }
        }

        /* ── HORIZON GLOW ───────────────────────── */
        .horizon {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 35%;
            z-index: 0;
            background: linear-gradient(to top,
                rgba(26,111,168,0.35) 0%,
                rgba(13,61,110,0.2) 40%,
                transparent 100%);
            pointer-events: none;
        }

        .horizon::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(77,216,245,0.6), rgba(126,240,255,0.8), rgba(77,216,245,0.6), transparent);
            box-shadow: 0 0 20px rgba(77,216,245,0.5), 0 0 60px rgba(77,216,245,0.2);
        }

        /* ── FLOATING CLOUD-LIKE SHAPES ─────────── */
        .cloudscape {
            position: fixed;
            bottom: 15%;
            left: 0; right: 0;
            z-index: 0;
            pointer-events: none;
            height: 120px;
        }

        .cloud-layer {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 200px 30px at 15% 60%, rgba(77,216,245,0.06) 0%, transparent 100%),
                radial-gradient(ellipse 350px 25px at 50% 80%, rgba(42,168,212,0.08) 0%, transparent 100%),
                radial-gradient(ellipse 250px 20px at 85% 50%, rgba(77,216,245,0.05) 0%, transparent 100%);
        }

        /* ── UI ─────────────────────────────────── */
        .ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            gap: 0;
        }

        .ui > * { pointer-events: all; }

        /* wordmark */
        .wordmark {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: transparent;
            background: linear-gradient(180deg, #ffffff 0%, var(--glow2) 40%, var(--glow) 70%, rgba(0,180,255,0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(77,216,245,0.6)) drop-shadow(0 0 80px rgba(0,150,255,0.3));
            margin-bottom: 4px;
            user-select: none;
            animation: wordmarkPulse 4s ease-in-out infinite;
        }

        @keyframes wordmarkPulse {
            0%,100% { filter: drop-shadow(0 0 30px rgba(77,216,245,0.6)) drop-shadow(0 0 80px rgba(0,150,255,0.3)); }
            50%      { filter: drop-shadow(0 0 40px rgba(77,216,245,0.9)) drop-shadow(0 0 100px rgba(0,150,255,0.5)); }
        }

        #subtitle {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: lowercase;
            min-height: 18px;
            text-align: center;
            margin-bottom: 40px;
        }

        #subtitle::after {
            content: '▌';
            color: var(--glow);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* search */
        .search-wrap {
            display: flex;
            width: 420px;
            margin-bottom: 36px;
            border-radius: 50px;
            background: rgba(10,30,60,0.6);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 0 0 1px rgba(77,216,245,0.1),
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.1),
                inset 0 0 20px rgba(0,100,200,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .search-wrap:focus-within {
            border-color: rgba(77,216,245,0.4);
            box-shadow:
                0 0 0 1px rgba(77,216,245,0.3),
                0 8px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(77,216,245,0.15),
                inset 0 1px 0 rgba(255,255,255,0.15),
                inset 0 0 20px rgba(0,150,255,0.15);
        }

        #uv-address {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 22px;
            font-size: 13px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        #uv-address::placeholder { color: var(--text-dim); }
        #uv-address:focus { outline: none; }

        .go-btn {
            background: linear-gradient(135deg, rgba(0,180,255,0.3), rgba(0,120,220,0.2));
            border: none;
            border-left: 1px solid var(--glass-border);
            padding: 14px 22px;
            cursor: pointer;
            color: var(--glow2);
            font-size: 18px;
            transition: all 0.2s;
            border-radius: 0 50px 50px 0;
        }

        .go-btn:hover {
            background: linear-gradient(135deg, rgba(0,200,255,0.45), rgba(0,150,255,0.3));
            color: #fff;
            box-shadow: inset 0 0 15px rgba(0,200,255,0.2);
        }

        /* ── TILES ─────────────────────────────── */
        .tiles {
            display: flex;
            gap: 10px;
        }

        .tile {
            width: 80px;
            height: 90px;
            background: rgba(10,25,55,0.55);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            text-decoration: none;
            color: rgba(180,230,255,0.65);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 4px 20px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.12),
                inset 0 0 15px rgba(0,100,200,0.08);
        }

        .tile::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .tile::after {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
        }

        .tile:hover {
            transform: translateY(-6px) scale(1.05);
            border-color: rgba(77,216,245,0.5);
            color: #fff;
            box-shadow:
                0 12px 40px rgba(0,0,0,0.4),
                0 0 20px rgba(77,216,245,0.2),
                inset 0 1px 0 rgba(255,255,255,0.2),
                inset 0 0 20px rgba(0,150,255,0.15);
            background: rgba(0,60,120,0.6);
        }

        .tile:active { transform: translateY(-2px) scale(0.98); }

        .tile svg { transition: all 0.2s; }
        .tile:hover svg { filter: drop-shadow(0 0 6px var(--glow)); transform: scale(1.1); }

        .tile-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.3;
        }

        /* ── CURTAIN ───────────────────────────── */
        #curtain {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #050d1a 0%, #091d38 50%, #0d3560 100%);
            z-index: 9999;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.76,0,0.24,1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #curtain.active { transform: translateY(0); }

        .curtain-inner { text-align: center; }

        .curtain-orb {
            width: 60px; height: 60px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(0,180,255,0.6) 40%, rgba(0,80,200,0.4) 70%, transparent);
            box-shadow:
                0 0 30px rgba(77,216,245,0.5),
                0 0 60px rgba(0,150,255,0.3),
                inset 0 2px 4px rgba(255,255,255,0.5);
            opacity: 0;
            transition: opacity 0.3s 0.1s;
            animation: none;
        }

        #curtain.active .curtain-orb {
            opacity: 1;
            animation: orbSpin 1.5s linear infinite;
        }

        @keyframes orbSpin {
            0%   { box-shadow: 0 0 30px rgba(77,216,245,0.5), 0 0 60px rgba(0,150,255,0.3), inset 0 2px 4px rgba(255,255,255,0.5); }
            50%  { box-shadow: 0 0 50px rgba(77,216,245,0.8), 0 0 100px rgba(0,150,255,0.5), inset 0 2px 4px rgba(255,255,255,0.7); }
            100% { box-shadow: 0 0 30px rgba(77,216,245,0.5), 0 0 60px rgba(0,150,255,0.3), inset 0 2px 4px rgba(255,255,255,0.5); }
        }

        .curtain-line {
            width: 160px; height: 2px;
            background: rgba(255,255,255,0.08);
            margin: 0 auto 14px;
            border-radius: 2px;
            overflow: hidden;
        }

        .curtain-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sky4), var(--glow), var(--glow2));
            width: 0;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--glow);
        }

        #curtain.active .curtain-fill {
            animation: fillBar 0.8s 0.15s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes fillBar { to { width: 100%; } }

        #curtain-msg {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s 0.2s;
        }

        #curtain.active #curtain-msg { opacity: 1; }

        /* ── SMALL PLANET / SPHERE ─────────────── */
        .planet {
            position: fixed;
            bottom: -60px;
            right: 80px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%,
                    rgba(255,255,255,0.25) 0%,
                    rgba(100,200,255,0.4) 20%,
                    rgba(20,100,200,0.6) 50%,
                    rgba(5,30,80,0.9) 80%,
                    #020a1a 100%
                );
            box-shadow:
                0 0 40px rgba(0,150,255,0.3),
                0 0 100px rgba(0,100,200,0.15),
                inset -10px -10px 30px rgba(0,0,0,0.5),
                inset 5px 5px 20px rgba(100,200,255,0.15);
            z-index: 0;
            pointer-events: none;
            animation: planetFloat 6s ease-in-out infinite;
        }

        .planet::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(77,216,245,0.2);
            box-shadow: 0 0 20px rgba(77,216,245,0.1);
        }

        /* ring */
        .planet-ring {
            position: absolute;
            width: 280px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(77,216,245,0.2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            box-shadow: 0 0 15px rgba(77,216,245,0.15);
            pointer-events: none;
        }

        @keyframes planetFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }

        /* small planet left */
        .planet-sm {
            position: fixed;
            top: 80px;
            left: -20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(200,240,255,0.3) 0%,
                rgba(50,150,220,0.5) 30%,
                rgba(10,60,130,0.8) 70%,
                #030d22 100%
            );
            box-shadow:
                0 0 20px rgba(0,100,200,0.2),
                inset -5px -5px 15px rgba(0,0,0,0.5);
            z-index: 0;
            pointer-events: none;
            animation: planetFloat 9s ease-in-out infinite;
            animation-delay: -3s;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<!-- Backgrounds -->
<div class="sky-bg"></div>
<div class="aurora">
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
</div>
<canvas id="starCanvas"></canvas>
<div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
</div>
<div class="cloudscape"><div class="cloud-layer"></div></div>
<div class="horizon"></div>

<!-- Decorative planets -->
<div class="planet"><div class="planet-ring"></div></div>
<div class="planet-sm"></div>

<!-- Curtain transition -->
<div id="curtain">
    <div class="curtain-inner">
        <div class="curtain-orb"></div>
        <div class="curtain-line"><div class="curtain-fill"></div></div>
        <div id="curtain-msg">routing</div>
    </div>
</div>

<!-- Main UI -->
<div class="ui">
    <div class="wordmark">atom</div>
    <div id="subtitle"></div>

    <div class="search-wrap">
        <input id="uv-address" type="text" placeholder="search the cosmos or enter a url" autocomplete="off" spellcheck="false">
        <button class="go-btn" id="goBtn">⟶</button>
    </div>

    <div class="tiles">
        <!-- Sonic Mania -->
        <a href="#" onclick="launch('https://sonic-mania-online.web.app/');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <circle cx="15" cy="16" r="8" fill="none" stroke="var(--glow)" stroke-width="1.2"/>
                <circle cx="15" cy="11" r="4.5" fill="none" stroke="var(--glow)" stroke-width="1.2"/>
                <path d="M12 9 L10 4M13.5 8.5 L13 3M15 8.5 L15.5 3M16.5 9 L18 4M18 10 L20.5 5.5" stroke="var(--glow)" stroke-width="1.2"/>
                <circle cx="17" cy="10.5" r="1.2" fill="var(--glow)"/>
                <path d="M3 19 L9 19M2 21 L8 21" stroke="var(--glow)" stroke-width="1" opacity="0.4"/>
            </svg>
            <span class="tile-label">mania</span>
        </a>

        <!-- Sonic 1 -->
        <a href="#" onclick="launch('https://jojudge.com/ICBINS1/');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <circle cx="15" cy="15" r="10" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <circle cx="15" cy="15" r="5.5" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <circle cx="15" cy="15" r="1.8" fill="var(--glow)"/>
                <path d="M15 5 L15 9.5M15 20.5 L15 25M5 15 L9.5 15M20.5 15 L25 15" stroke="var(--glow)" stroke-width="1.2"/>
            </svg>
            <span class="tile-label">sonic 1</span>
        </a>

        <!-- Roblox via EasyFun -->
        <a href="#" onclick="launch('https://www.easyfun.gg/games/roblox.html');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <rect x="9" y="7" width="12" height="12" rx="2" stroke="var(--glow)" stroke-width="1.2" fill="none" transform="rotate(15 15 13)"/>
                <rect x="10" y="17" width="10" height="6" rx="1.5" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <circle cx="15" cy="20" r="1" fill="var(--glow)"/>
            </svg>
            <span class="tile-label">roblox</span>
        </a>

        <!-- Sonic 2 CC -->
        <a href="#" onclick="launch('https://heyjoeway.github.io/s2cx/');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <polygon points="15,3 24,9 24,21 15,27 6,21 6,9" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <polygon points="15,8 19,11 19,19 15,22 11,19 11,11" stroke="var(--glow)" stroke-width="0.6" fill="none"/>
                <line x1="15" y1="3" x2="15" y2="27" stroke="var(--glow)" stroke-width="0.5" opacity="0.3"/>
                <line x1="6" y1="9" x2="24" y2="21" stroke="var(--glow)" stroke-width="0.5" opacity="0.3"/>
                <line x1="24" y1="9" x2="6" y2="21" stroke="var(--glow)" stroke-width="0.5" opacity="0.3"/>
            </svg>
            <span class="tile-label">s2 cc</span>
        </a>

        <!-- Sonic 3 A/K -->
        <a href="#" onclick="launch('https://projects.sappharad.com/s3air_ios/');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <path d="M15 4 L26 15 L15 11 L15 26 L15 11 L4 15 Z" stroke="var(--glow)" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
                <path d="M4 15 L26 15" stroke="var(--glow)" stroke-width="0.5" opacity="0.4"/>
                <circle cx="23" cy="7" r="1.2" fill="var(--glow)" opacity="0.6"/>
                <circle cx="7" cy="8" r="1.2" fill="var(--glow)" opacity="0.6"/>
            </svg>
            <span class="tile-label">s3 a/k</span>
        </a>

        <!-- YouTube -->
        <a href="#" onclick="launch('https://www.youtube.com');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <rect x="3" y="8" width="24" height="16" rx="4" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <polygon points="12,11 12,20 21,15.5" fill="var(--glow)" opacity="0.8"/>
            </svg>
            <span class="tile-label">youtube</span>
        </a>
    </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────────
const starCanvas = document.getElementById('starCanvas');
const sCtx = starCanvas.getContext('2d');

function resizeStar() {
    starCanvas.width = window.innerWidth;
    starCanvas.height = window.innerHeight;
}
resizeStar();
window.addEventListener('resize', resizeStar);

const stars = [];
for (let i = 0; i < 220; i++) {
    stars.push({
        x: Math.random(),
        y: Math.random() * 0.65, // upper portion
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.008 + 0.002,
        phase: Math.random() * Math.PI * 2
    });
}

let t = 0;
function drawStars() {
    sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    t += 0.01;
    stars.forEach(s => {
        const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
        sCtx.beginPath();
        sCtx.arc(s.x * starCanvas.width, s.y * starCanvas.height, s.r, 0, Math.PI * 2);
        sCtx.fillStyle = `rgba(200,235,255,${alpha})`;
        sCtx.fill();
    });
    requestAnimationFrame(drawStars);
}
drawStars();

// ── PROXY ──────────────────────────────────────────────────────
var curtain = document.getElementById('curtain');
var curtainMsg = document.getElementById('curtain-msg');
var sub = document.getElementById('subtitle');

var swReady = false;
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/uv/uv.sw.js', { scope: '/' })
        .then(reg => {
            if (reg.active) { swReady = true; return; }
            var sw = reg.installing || reg.waiting;
            if (sw) sw.addEventListener('statechange', () => {
                if (sw.state === 'activated') swReady = true;
            });
        }).catch(() => { swReady = true; });
} else { swReady = true; }

var phrases = [
    "your gpa just filed for divorce",
    "sonic is faster than your career path",
    "sponsored by 3am academic despair",
    "your teacher is watching. probably.",
    "brainrot level: executive",
    "procrastinating like a high-end ceo",
    "world history homework? never heard of her",
    "your fbi agent is bored, play something",
    "why study when you can just vibe",
    "this proxy is the only thing passing this year",
    "too many tabs, not enough brain cells",
    "luxury proxy, budget lifestyle",
    "running on spite and caffeine",
    "don't let the firewall win",
    "delete your history after this. seriously.",
    "just one more game of sonic, i swear",
    "error 404: homework not found",
    "currently hiring: one (1) motivation",
    "your future boss just saw your tab",
    "staying unblocked since 2026",
    "the wifi blocker has been defeated. again.",
    "education.exe has stopped responding",
];

var pIdx = 0, cIdx = 0, erasing = false;
function type() {
    var cur = phrases[pIdx];
    if (!erasing) {
        sub.innerText = cur.substring(0, cIdx++);
        if (cIdx > cur.length) { erasing = true; setTimeout(type, 2600); }
        else setTimeout(type, 48);
    } else {
        sub.innerText = cur.substring(0, cIdx--);
        if (cIdx < 0) { erasing = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 350); }
        else setTimeout(type, 20);
    }
}
type();

var loadMsgs = ["routing","bypassing firewall","going fast","loading chaos","escaping homework","launching into orbit","deploying brainrot","warping space"];

function launch(url) {
    curtainMsg.innerText = loadMsgs[Math.floor(Math.random() * loadMsgs.length)];
    curtain.classList.add('active');
    var attempts = 0;
    function go() {
        if (swReady || attempts++ > 40) {
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        } else { setTimeout(go, 100); }
    }
    setTimeout(go, 400);
}

function doSearch(val) {
    if (!val.trim()) return;
    var url = (val.includes('.') && !val.includes(' '))
        ? (val.startsWith('http') ? val : 'https://' + val)
        : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
    launch(url);
}

document.getElementById('uv-address').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(e.target.value);
});
document.getElementById('goBtn').addEventListener('click', () => {
    doSearch(document.getElementById('uv-address').value);
});
</script>
