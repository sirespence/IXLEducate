<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Atom OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505;
  --glass: rgba(20, 20, 20, 0.6);
  --glass-b: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --acc: #3b82f6; 
  --acc-glow: rgba(59, 130, 246, 0.4);
  --text: #e5e5e5;
  --text-m: #a3a3a3;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; -webkit-user-drag: none; cursor: none; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ─── BACKGROUND FX ─── */
#canvas-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.6; }
#vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(circle at 50% 50%, transparent 40%, #000 100%);
}
#noise {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}

/* ─── CUSTOM CURSOR ─── */
#cursor {
  position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none;
  mix-blend-mode: difference; transition: transform 0.1s var(--ease);
}
#c-dot {
  width: 8px; height: 8px; background: white; border-radius: 50%;
  position: absolute; transform: translate(-50%, -50%);
}
#c-ring {
  width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
  position: absolute; transform: translate(-50%, -50%);
  transition: width 0.3s var(--ease), height 0.3s var(--ease), background 0.3s;
}
body.hover #c-ring { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-color: transparent; }
body.hover #c-dot { transform: translate(-50%, -50%) scale(0.5); }

/* ─── MAIN UI LAYOUT ─── */
#ui {
  position: fixed; inset: 1.5vmin; z-index: 10;
  display: flex; flex-direction: column;
  border-radius: 24px;
  background: rgba(10, 10, 10, 0.4);
  backdrop-filter: blur(50px) saturate(120%);
  -webkit-backdrop-filter: blur(50px) saturate(120%);
  box-shadow: 0 0 0 1px var(--border), 0 20px 50px rgba(0,0,0,0.5);
  overflow: hidden;
  transition: transform 0.6s var(--ease), opacity 0.6s;
}

/* ─── VIEWS (PAGES) ─── */
#view-container { flex: 1; position: relative; overflow: hidden; }
.view {
  position: absolute; inset: 0; 
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transform: scale(1.02);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
  padding: 40px;
}
.view.active { opacity: 1; pointer-events: all; transform: scale(1); }

/* ─── HOME VIEW ─── */
.hero-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 80px; font-weight: 700; letter-spacing: -4px;
  background: linear-gradient(135deg, #fff 0%, #aaa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 30px;
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
}
.search-box {
  position: relative; width: 100%; max-width: 600px;
  margin-bottom: 60px; group;
}
.sb-in {
  width: 100%; background: var(--glass-b); border: 1px solid var(--border);
  padding: 20px 24px; border-radius: 18px;
  color: #fff; font-size: 18px; font-family: 'Inter', sans-serif;
  transition: all 0.3s var(--ease);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.sb-in:focus {
  background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.05); transform: translateY(-2px);
}
.grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
  width: 100%; max-width: 1000px;
}
.card {
  aspect-ratio: 1/1;
  background: var(--glass-b); border: 1px solid var(--border);
  border-radius: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; cursor: pointer;
  transition: all 0.4s var(--ease);
  position: relative; overflow: hidden;
}
.card:hover {
  background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3);
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
.card-icon { width: 36px; height: 36px; fill: var(--text); transition: 0.3s; }
.card:hover .card-icon { fill: #fff; transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }
.card-lbl { font-size: 13px; color: var(--text-m); font-weight: 500; }

/* ─── BROWSER VIEW ─── */
#browser-view { padding: 0; }
.url-bar {
  width: 100%; height: 60px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.nav-btn {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid transparent; color: var(--text-m);
  transition: 0.2s;
}
.nav-btn:hover { background: var(--glass-b); color: #fff; }
#url-input {
  flex: 1; background: transparent; border: none;
  color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 13px;
}
#frame-wrap { flex: 1; width: 100%; position: relative; background: #fff; }
#web-frame { width: 100%; height: 100%; border: none; }
#placeholder-screen {
  position: absolute; inset: 0; background: #080808;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* ─── GAMES VIEW ─── */
.games-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px; width: 100%; max-width: 1200px; padding: 20px;
  overflow-y: auto; height: 100%;
}
.game-poster {
  aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
  position: relative; background: #111;
  border: 1px solid var(--border);
  transition: 0.3s var(--ease); cursor: pointer;
}
.game-poster:hover {
  transform: scale(1.05); border-color: var(--acc);
  box-shadow: 0 0 30px var(--acc-glow); z-index: 2;
}
.gp-img {
  width: 100%; height: 100%; object-fit: cover; opacity: 0.6;
  transition: 0.3s;
}
.game-poster:hover .gp-img { opacity: 1; }
.gp-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 15px; background: linear-gradient(0deg, #000 0%, transparent 100%);
}
.gp-title { font-weight: 600; font-size: 14px; color: #fff; }
.gp-tag { font-size: 10px; color: var(--acc); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

/* ─── DOCK ─── */
#dock {
  height: 80px; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.3);
}
.dock-item {
  position: relative;
  padding: 10px 20px; border-radius: 12px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text-m); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: 0.3s var(--ease);
}
.dock-item:hover { background: var(--glass-b); color: #fff; transform: translateY(-4px); }
.dock-item.active { background: rgba(255,255,255,0.08); color: #fff; }
.dock-item.active::after {
  content:''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; background: var(--acc); border-radius: 50%;
  box-shadow: 0 0 10px var(--acc);
}

/* ─── LOADER ─── */
#loader {
  position: fixed; inset: 0; z-index: 99999;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
.load-bar { width: 200px; height: 2px; background: #222; margin-top: 20px; border-radius: 2px; overflow: hidden; }
.load-prog { width: 0%; height: 100%; background: #fff; transition: width 0.1s linear; box-shadow: 0 0 15px #fff; }

/* ─── UTILS ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>

</div>

<!-- MAIN INTERFACE -->

    <div class="view active" id="v-home">

      </div>

          </div>
          <iframe id="web-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups"></iframe>

  { n: 'Slope', u: 'https://slope-game.github.io', t: 'Arcade', img: 'https://img.poki.com/cdn-cgi/image/quality=78,width=600,height=600,fit=cover,f=auto/8c062c3b879486c476722c1592398696.png' },

];

/* ─── INITIALIZATION ─── */
const qGrid = document.getElementById('quick-grid');
const gGrid = document.getElementById('games-grid');

// Populate Quick Apps
APPS.forEach(app => {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<svg class="card-icon" viewBox="0 0 24 24">${app.i}</svg><span class="card-lbl">${app.n}</span>`;
  el.onclick = () => launch(app.u);
  qGrid.appendChild(el);
});

// Populate Games
GAMES.forEach(g => {
  const el = document.createElement('div');
  el.className = 'game-poster';
  // Fallback for images since I can't guarantee hotlinks work forever
  const fallbackColor = 'hsl(' + (Math.random()*360) + ', 40%, 20%)';
  el.style.background = fallbackColor;
  el.innerHTML = `
    <img class="gp-img" src="${g.img}" onerror="this.style.display='none'">
    <div class="gp-info">
      <div class="gp-title">${g.n}</div>
      <div class="gp-tag">${g.t}</div>
    </div>`;
  el.onclick = () => launch(g.u);
  gGrid.appendChild(el);
});

// Cursor Logic
const cur = document.getElementById('cursor');
const cRing = document.getElementById('c-ring');
document.addEventListener('mousemove', e => {
  cur.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
});
// Hover effects
document.querySelectorAll('a, button, .card, .dock-item, .game-poster, input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hover'));
});

// Loading Sequence
window.onload = () => {
  const bar = document.getElementById('lp');
  bar.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
    }, 800);
  }, 600);
  initCanvas();
};

/* ─── NAVIGATION ─── */
function sw(viewId, btn) {
  // Switch Tabs
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  
  // Switch Dock Active State
  document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

/* ─── PROXY LOGIC ─── */
const frame = document.getElementById('web-frame');
const urlIn = document.getElementById('url-input');
const mainSearch = document.getElementById('main-search');

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/uv/uv.sw.js', { scope: '/uv/service/' });
}

function launch(u) {
  sw('v-browser');
  document.querySelectorAll('.dock-item')[1].classList.add('active'); // highlight web tab
  document.querySelectorAll('.dock-item')[0].classList.remove('active');
  loadUrl(u);
}

function loadUrl(u) {
  document.getElementById('placeholder-screen').style.display = 'none';
  let target = u;
  if (!u.includes('.')) {
    target = 'https://search.brave.com/search?q=' + encodeURIComponent(u);
  } else if (!u.startsWith('http')) {
    target = 'https://' + u;
  }
  
  urlIn.value = target;
  
  // Use UV Proxy if available, otherwise direct
  try {
    if(window.__uv$config) {
      frame.src = __uv$config.prefix + __uv$config.encodeUrl(target);
    } else {
      frame.src = target;
    }
  } catch(e) {
    frame.src = target;
  }
}

function goUrl() { loadUrl(urlIn.value); }
function bn(act) {
  try {
    if(act==='back') frame.contentWindow.history.back();
    else if(act==='reload') frame.contentWindow.location.reload();
  } catch(e){}
}

mainSearch.addEventListener('keydown', e => { if(e.key === 'Enter') launch(mainSearch.value); });
urlIn.addEventListener('keydown', e => { if(e.key === 'Enter') goUrl(); });

/* ─── BACKGROUND ANIMATION ─── */
function initCanvas() {
  const cv = document.getElementById('canvas-bg');
  const ctx = cv.getContext('2d');
  
  let w, h;
  const stars = [];
  
  const resize = () => {
    w = cv.width = window.innerWidth;
    h = cv.height = window.innerHeight;
  };
  window.addEventListener('resize', resize);
  resize();

  // Create stars
  for(let i=0; i<150; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.5,
      a: Math.random(),
      s: 0.05 + Math.random() * 0.2
    });
  }

  function anim() {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "#fff";
    
    stars.forEach(st => {
      st.y -= st.s;
      st.a += (Math.random() - 0.5) * 0.02;
      if(st.a < 0) st.a = 0; if(st.a > 1) st.a = 1;
      
      if(st.y < 0) {
        st.y = h;
        st.x = Math.random() * w;
      }
      
      ctx.globalAlpha = st.a * 0.6;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
      ctx.fill();
    });
    
    requestAnimationFrame(anim);
  }
  anim();
}
</script>
