<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>atom</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 90%; max-width: 800px; text-align: center; }

        h1 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0.6;
        }

        /* luxury search bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 60px;
        }

        #uv-address {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            font-size: 32px;
            color: #fff;
            font-weight: 200;
            text-align: center;
            transition: var(--transition);
        }

        #uv-address:focus {
            border-bottom: 1px solid #fff;
            letter-spacing: 2px;
        }

        /* game grid (the arcade) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 30px 20px;
            text-decoration: none;
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
            border-color: #fff;
        }

        /* subtle grain effect for that "luxury" feel */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://grainy-gradients.vercel.app/noise.svg);
            opacity: 0.05; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>atom</h1>
        
        <div class="search-wrapper">
            <input id="uv-address" type="text" placeholder="search brave" autocomplete="off">
        </div>

        <div class="grid">
            <a href="#" onclick="launch('https://vinmannie.github.io/SonicManiaWeb/')" class="card">Mania</a>
            <a href="#" onclick="launch('https://vinmannie.github.io/Sonic-1-WASM/')" class="card">S1 WASM</a>
            <a href="#" onclick="launch('https://jojudge.com/ICBINS1/')" class="card">Judge</a>
            <a href="#" onclick="launch('https://heyjoeway.github.io/s2cx/')" class="card">S2 CX</a>
            <a href="#" onclick="launch('https://projects.sappharad.com/s3air_ios/')" class="card">S3 Air</a>
        </div>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const input = document.getElementById('uv-address');
        
        function launch(url) {
            // using ultraviolet encoding
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        }

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && input.value.trim()) {
                const url = input.value.includes('.') ? 
                    (input.value.startsWith('http') ? input.value : 'https://' + input.value) : 
                    `https://search.brave.com/search?q=${encodeURIComponent(input.value)}`;
                launch(url);
            }
        });
    </script>
</body>
</html>
