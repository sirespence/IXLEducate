<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atom</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --aqua:#00d4ff;
  --aqua2:#00f0ff;
  --cyan:#4dd9ff;
  --blue:#0088ff;
  --blue2:#0055dd;
  --teal:#00c8b4;
  --sky:#b8eeff;
  --white:#ffffff;
  --glass:rgba(255,255,255,0.08);
  --glass2:rgba(255,255,255,0.14);
  --glass3:rgba(255,255,255,0.22);
  --border:rgba(255,255,255,0.18);
  --border2:rgba(0,212,255,0.3);
  --ink:rgba(255,255,255,0.9);
  --ink2:rgba(255,255,255,0.55);
  --ink3:rgba(255,255,255,0.3);
  --glow:rgba(0,212,255,0.25);
  --glow2:rgba(0,136,255,0.2);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:#040d18;
  font-family:'Nunito',sans-serif;
  cursor:none;
}

/* ═══════════════════════════════════════
   ENVIRONMENT
═══════════════════════════════════════ */
#env{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 30% 20%, #001a3a 0%, transparent 60%),
    radial-gradient(ellipse 80% 100% at 80% 80%, #001428 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 60% 10%, rgba(0,80,160,0.35) 0%, transparent 50%),
    #030b15;
  z-index:0;
}

/* deep caustic shimmer layer */
#caustics{
  position:fixed;inset:0;z-index:1;
  opacity:0.18;
  background:
    radial-gradient(circle 300px at 20% 30%, rgba(0,200,255,0.4) 0%, transparent 70%),
    radial-gradient(circle 200px at 75% 60%, rgba(0,136,255,0.35) 0%, transparent 70%),
    radial-gradient(circle 250px at 50% 85%, rgba(0,180,200,0.3) 0%, transparent 70%);
  animation:causticDrift 12s ease-in-out infinite alternate;
  filter:blur(40px);
}
@keyframes causticDrift{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.15) translate(-20px,15px);}
}

#bgCanvas{position:fixed;inset:0;z-index:2;}

/* custom cursor */
#cursor{
  position:fixed;width:20px;height:20px;z-index:9999;pointer-events:none;
  transform:translate(-50%,-50%);
}
#cursor-ring{
  position:absolute;inset:0;
  border:1.5px solid rgba(0,212,255,0.7);
  border-radius:50%;
  box-shadow:0 0 8px rgba(0,212,255,0.4),inset 0 0 4px rgba(0,212,255,0.15);
  transition:transform 0.15s ease,border-color 0.2s;
}
#cursor-dot{
  position:absolute;top:50%;left:50%;
  width:4px;height:4px;
  transform:translate(-50%,-50%);
  background:var(--aqua);
  border-radius:50%;
  box-shadow:0 0 6px var(--aqua);
}
body.hovering #cursor-ring{transform:scale(2.2);border-color:rgba(0,212,255,0.35);}

/* ═══════════════════════════════════════
   MAIN SCENE
═══════════════════════════════════════ */
#scene{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  perspective:1200px;
  perspective-origin:50% 48%;
}

#stage{
  position:relative;
  width:700px;height:540px;
  transform-style:preserve-3d;
  transition:transform 0.1s linear;
}

/* ═══════════════════════════════════════
   ATOM NUCLEUS ORBS (background)
═══════════════════════════════════════ */
.orb-shell{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}

/* The big ambient nucleus glow behind everything */
#nucleus-glow{
  position:absolute;
  width:280px;height:280px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) translateZ(-80px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,
    rgba(0,220,255,0.22) 0%,
    rgba(0,136,255,0.12) 35%,
    rgba(0,80,160,0.06) 60%,
    transparent 75%
  );
  filter:blur(18px);
  animation:nucleusPulse 5s ease-in-out infinite;
}
@keyframes nucleusPulse{
  0%,100%{transform:translate(-50%,-50%) translateZ(-80px) scale(1);}
  50%{transform:translate(-50%,-50%) translateZ(-80px) scale(1.12);}
}

/* Electron orbit rings */
.orbit-ring{
  position:absolute;
  top:50%;left:50%;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.15);
  transform-style:preserve-3d;
  pointer-events:none;
}
.orbit-ring::after{
  content:'';position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  top:50%;left:0;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 40% 35%, #aaf0ff, #00c8ff 50%, #005080);
  box-shadow:0 0 10px rgba(0,200,255,0.8),0 0 20px rgba(0,200,255,0.4);
}

#ring1{
  width:380px;height:130px;
  margin:-65px 0 0 -190px;
  transform:rotateX(72deg) rotateZ(0deg);
  animation:electronOrbit1 4.2s linear infinite;
}
#ring2{
  width:320px;height:110px;
  margin:-55px 0 0 -160px;
  transform:rotateX(72deg) rotateZ(60deg);
  animation:electronOrbit2 3.1s linear infinite;
}
#ring3{
  width:350px;height:120px;
  margin:-60px 0 0 -175px;
  transform:rotateX(72deg) rotateZ(-60deg);
  animation:electronOrbit3 5.8s linear infinite;
}

@keyframes electronOrbit1{from{transform:rotateX(72deg) rotateZ(0deg);}to{transform:rotateX(72deg) rotateZ(360deg);}}
@keyframes electronOrbit2{from{transform:rotateX(72deg) rotateZ(60deg);}to{transform:rotateX(72deg) rotateZ(420deg);}}
@keyframes electronOrbit3{from{transform:rotateX(72deg) rotateZ(-60deg);}to{transform:rotateX(72deg) rotateZ(300deg);}}

/* ═══════════════════════════════════════
   MAIN GLASS CARD
═══════════════════════════════════════ */
#card{
  position:absolute;
  width:560px;
  top:50%;left:50%;
  transform:translate(-50%,-50%) translateZ(0px);
  border-radius:28px;
  padding:48px 52px 44px;

  /* layered glass effect */
  background:
    linear-gradient(135deg,
      rgba(255,255,255,0.14) 0%,
      rgba(255,255,255,0.05) 40%,
      rgba(0,80,180,0.06) 70%,
      rgba(255,255,255,0.04) 100%
    );
  backdrop-filter:blur(32px) saturate(1.8);
  -webkit-backdrop-filter:blur(32px) saturate(1.8);

  border:1px solid rgba(255,255,255,0.2);
  border-top:1px solid rgba(255,255,255,0.35);
  border-left:1px solid rgba(255,255,255,0.28);

  box-shadow:
    0 2px 0 rgba(255,255,255,0.12) inset,
    0 -1px 0 rgba(0,0,0,0.2) inset,
    0 40px 80px rgba(0,0,0,0.5),
    0 8px 32px rgba(0,136,255,0.12),
    0 0 0 1px rgba(0,212,255,0.08);

  transform-style:preserve-3d;
  transition:box-shadow 0.3s;
}

/* top gloss sheen */
#card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:55%;
  border-radius:28px 28px 60% 60%;
  background:linear-gradient(180deg,
    rgba(255,255,255,0.13) 0%,
    rgba(255,255,255,0.04) 60%,
    transparent 100%
  );
  pointer-events:none;z-index:1;
}

/* bottom inner shadow */
#card::after{
  content:'';position:absolute;
  bottom:0;left:10%;right:10%;height:40%;
  border-radius:0 0 28px 28px;
  background:linear-gradient(0deg,rgba(0,20,60,0.25),transparent);
  pointer-events:none;z-index:1;
}

/* ── LOGO AREA ── */
#logo-area{
  text-align:center;
  margin-bottom:10px;
  position:relative;z-index:2;
}

.wordmark{
  font-family:'Exo 2',sans-serif;
  font-weight:200;
  font-size:82px;
  letter-spacing:22px;
  text-indent:22px;
  color:transparent;
  background:linear-gradient(180deg,
    #ffffff 0%,
    #c8f0ff 30%,
    #80ddff 60%,
    #40c0f0 100%
  );
  -webkit-background-clip:text;
  background-clip:text;
  line-height:1;
  display:block;

  /* text 3D depth */
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(0,200,255,0.35)) drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  animation:logoFloat 6s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{filter:drop-shadow(0 0 20px rgba(0,200,255,0.35)) drop-shadow(0 2px 8px rgba(0,0,0,0.4));}
  50%{filter:drop-shadow(0 0 30px rgba(0,200,255,0.55)) drop-shadow(0 2px 8px rgba(0,0,0,0.4));}
}

.logo-version{
  font-family:'Exo 2',sans-serif;
  font-weight:300;
  font-size:10px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:rgba(0,212,255,0.5);
  margin-top:2px;
  display:block;
}

/* divider */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.3) 20%,rgba(255,255,255,0.2) 50%,rgba(0,212,255,0.3) 80%,transparent);
  margin:18px 0 20px;
  position:relative;z-index:2;
}
.divider::after{
  content:'';position:absolute;
  top:-1px;left:50%;transform:translateX(-50%);
  width:60px;height:3px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.6),transparent);
  filter:blur(3px);
}

/* subtitle */
#subtitle{
  font-family:'Exo 2',sans-serif;
  font-weight:300;
  font-style:italic;
  font-size:13px;
  color:rgba(180,230,255,0.5);
  text-align:center;
  letter-spacing:1.5px;
  min-height:20px;
  margin-bottom:28px;
  position:relative;z-index:2;
}
#subtitle::after{
  content:'|';
  color:rgba(0,212,255,0.7);
  animation:blink 1s step-end infinite;
  margin-left:1px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── SEARCH ── */
.search-wrap{
  position:relative;z-index:2;
  margin-bottom:24px;
}

.search-shell{
  display:flex;
  align-items:center;
  border-radius:50px;
  overflow:hidden;
  position:relative;

  background:rgba(0,10,30,0.5);
  border:1px solid rgba(255,255,255,0.15);
  border-top:1px solid rgba(255,255,255,0.22);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.06) inset,
    0 -2px 8px rgba(0,0,0,0.3) inset,
    0 4px 20px rgba(0,0,0,0.3),
    0 0 0 0px rgba(0,212,255,0.2);
  transition:box-shadow 0.3s,border-color 0.3s;
}
.search-wrap:focus-within .search-shell{
  border-color:rgba(0,212,255,0.35);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.08) inset,
    0 -2px 8px rgba(0,0,0,0.3) inset,
    0 4px 20px rgba(0,0,0,0.3),
    0 0 0 3px rgba(0,212,255,0.12),
    0 0 20px rgba(0,212,255,0.1);
}

/* search icon */
.search-icon{
  padding:0 0 0 20px;
  color:rgba(0,200,255,0.45);
  flex-shrink:0;
  display:flex;align-items:center;
}

#uv-address{
  flex:1;
  background:transparent;
  border:none;
  padding:14px 16px;
  font-family:'Exo 2',sans-serif;
  font-weight:300;
  font-size:15px;
  color:rgba(255,255,255,0.88);
  letter-spacing:0.3px;
}
#uv-address::placeholder{color:rgba(255,255,255,0.2);}
#uv-address:focus{outline:none;}

.go-btn{
  padding:10px 22px;
  margin:6px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg, #0088ff, #00c8ff);
  color:#fff;
  font-family:'Exo 2',sans-serif;
  font-weight:600;
  font-size:13px;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 2px 12px rgba(0,136,255,0.45),0 1px 0 rgba(255,255,255,0.25) inset;
  flex-shrink:0;
}
.go-btn:hover{
  background:linear-gradient(135deg, #00aaff, #00e0ff);
  box-shadow:0 4px 20px rgba(0,180,255,0.6),0 1px 0 rgba(255,255,255,0.3) inset;
  transform:translateY(-1px);
}
.go-btn:active{transform:scale(0.93);}

/* ── TILES ── */
.tiles{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  position:relative;z-index:2;
}

.tile{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:9px;
  padding:16px 8px 14px;
  border-radius:18px;
  text-decoration:none;
  cursor:pointer;
  overflow:hidden;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-top:1px solid rgba(255,255,255,0.18);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 4px 16px rgba(0,0,0,0.25);

  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.25s,
    background 0.25s,
    border-color 0.25s;
}

/* tile gloss */
.tile::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:50%;
  border-radius:18px 18px 50% 50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);
  pointer-events:none;z-index:1;
}

.tile:hover{
  transform:translateY(-6px) scale(1.04);
  background:rgba(0,180,255,0.1);
  border-color:rgba(0,212,255,0.3);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.15) inset,
    0 12px 28px rgba(0,0,0,0.35),
    0 0 20px rgba(0,180,255,0.15);
}
.tile:active{transform:translateY(-2px) scale(0.97);}

.tile-icon{
  position:relative;z-index:2;
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  transition:filter 0.25s,transform 0.25s;
}
.tile:hover .tile-icon{
  filter:drop-shadow(0 4px 14px rgba(0,0,0,0.5)) drop-shadow(0 0 8px rgba(255,255,255,0.15));
  transform:scale(1.1) translateY(-2px);
}

.tile-icon-bg{
  position:absolute;inset:0;
  border-radius:50%;
  opacity:0;
  transition:opacity 0.25s;
  filter:blur(8px);
}
.tile:hover .tile-icon-bg{opacity:1;}

.tile-label{
  position:relative;z-index:2;
  font-family:'Exo 2',sans-serif;
  font-weight:400;
  font-size:11px;
  letter-spacing:0.8px;
  color:rgba(200,230,255,0.65);
  text-transform:uppercase;
  transition:color 0.2s;
}
.tile:hover .tile-label{color:rgba(200,230,255,0.9);}

/* ═══════════════════════════════════════
   FLOATING SPHERE ORNAMENTS
═══════════════════════════════════════ */
.float-sphere{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  transform-style:preserve-3d;
}

/* sphere glass shading mixin */
.sphere-glass{
  background:
    radial-gradient(circle at 35% 30%,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.15) 20%,
      transparent 50%
    ),
    radial-gradient(circle at 65% 70%,
      rgba(0,100,200,0.15) 0%,
      transparent 40%
    ),
    radial-gradient(circle at 50% 50%,
      rgba(0,180,255,0.12) 0%,
      rgba(0,80,180,0.2) 60%,
      rgba(0,20,80,0.35) 100%
    );
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:
    0 0 0 1px rgba(0,200,255,0.08),
    inset 0 1px 2px rgba(255,255,255,0.4),
    0 8px 24px rgba(0,0,0,0.5),
    0 0 30px rgba(0,150,255,0.12);
}

/* reflect spot on bottom */
.float-sphere::after{
  content:'';position:absolute;
  bottom:18%;left:50%;transform:translateX(-50%);
  width:40%;height:12%;
  border-radius:50%;
  background:rgba(0,200,255,0.08);
  filter:blur(4px);
}

#sphere1{
  width:90px;height:90px;
  top:-28px;right:-30px;
  animation:sphereFloat1 7s ease-in-out infinite;
}
#sphere2{
  width:55px;height:55px;
  bottom:30px;right:-20px;
  animation:sphereFloat2 5.5s ease-in-out infinite;
}
#sphere3{
  width:38px;height:38px;
  top:40px;left:-22px;
  animation:sphereFloat3 6.8s ease-in-out infinite;
}
#sphere4{
  width:22px;height:22px;
  top:160px;right:10px;
  animation:sphereFloat1 4.2s ease-in-out infinite reverse;
}

@keyframes sphereFloat1{0%,100%{transform:translateY(0) translateZ(40px) rotate(0deg);}50%{transform:translateY(-18px) translateZ(55px) rotate(3deg);}}
@keyframes sphereFloat2{0%,100%{transform:translateY(0) translateZ(30px);}50%{transform:translateY(-12px) translateZ(42px);}}
@keyframes sphereFloat3{0%,100%{transform:translateY(0) translateZ(20px);}50%{transform:translateY(-9px) translateZ(30px);}}

/* tiny orbiting bubble */
.micro-orb{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.6),rgba(0,200,255,0.4) 40%,rgba(0,80,200,0.5));
  box-shadow:0 0 8px rgba(0,200,255,0.5);
  pointer-events:none;
}

/* ═══════════════════════════════════════
   SURFACE REFLECTION RING
═══════════════════════════════════════ */
#reflection-ring{
  position:absolute;
  bottom:-60px;left:50%;
  transform:translateX(-50%);
  width:500px;height:40px;
  border-radius:50%;
  background:radial-gradient(ellipse,rgba(0,180,255,0.12),transparent 70%);
  filter:blur(12px);
  pointer-events:none;
}

/* ═══════════════════════════════════════
   LOADER
═══════════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(2,10,22,0.75);
  backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;
  transition:opacity 0.4s;
}
#loader.active{opacity:1;pointer-events:all;}

.loader-panel{
  width:360px;
  border-radius:24px;
  padding:40px 36px 36px;
  background:
    linear-gradient(135deg,rgba(255,255,255,0.1),rgba(0,60,120,0.1));
  backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.18);
  border-top:1px solid rgba(255,255,255,0.3);
  box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(0,200,255,0.06),0 8px 32px rgba(0,80,160,0.15);
  text-align:center;
  position:relative;
  overflow:hidden;
}
.loader-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  border-radius:24px 24px 60% 60%;
  background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 100%);
  pointer-events:none;
}

.loader-atom{
  position:relative;width:90px;height:90px;
  margin:0 auto 24px;
}
.loader-nucleus{
  position:absolute;top:50%;left:50%;
  width:18px;height:18px;
  margin:-9px 0 0 -9px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#aaf8ff,#00ccff 40%,#005090);
  box-shadow:0 0 15px rgba(0,200,255,0.8),0 0 30px rgba(0,180,255,0.4);
}
.loader-ring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  border:1.5px solid rgba(0,212,255,0.3);
}
.loader-ring-1{width:50px;height:50px;margin:-25px 0 0 -25px;animation:loaderSpin1 1.8s linear infinite;}
.loader-ring-2{width:72px;height:72px;margin:-36px 0 0 -36px;border-style:dashed;animation:loaderSpin2 2.6s linear infinite reverse;}
.loader-ring-3{width:90px;height:90px;margin:-45px 0 0 -45px;animation:loaderSpin1 3.4s linear infinite;}
.loader-ring::after{
  content:'';position:absolute;
  width:7px;height:7px;border-radius:50%;
  top:50%;left:0;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 30% 30%,#fff,var(--aqua));
  box-shadow:0 0 8px var(--aqua);
}
@keyframes loaderSpin1{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes loaderSpin2{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}

.loader-title{
  font-family:'Exo 2',sans-serif;font-weight:200;
  font-size:30px;letter-spacing:12px;
  color:#c8f0ff;margin-bottom:6px;
}
.loader-sub{
  font-family:'Exo 2',sans-serif;font-weight:300;font-style:italic;
  font-size:12px;letter-spacing:1.5px;
  color:rgba(0,200,255,0.5);margin-bottom:20px;min-height:18px;
}

.prog-track{
  width:100%;height:3px;
  background:rgba(255,255,255,0.07);
  border-radius:3px;
  margin-bottom:16px;
  overflow:hidden;
  position:relative;
}
.prog-fill{
  height:100%;width:0%;
  border-radius:3px;

<script>
/* ══ CURSOR ══════════════════════════════════════ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
});

/* ══ STAR FIELD CANVAS ═══════════════════════════ */
(function(){
  const cv = document.getElementById('bgCanvas');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

  const stars = Array.from({length: 260}, () => ({
    x: Math.random() * cv.width,
    y: Math.random() * cv.height,
    r: Math.random() * 1.2 + 0.15,
    a: Math.random() * 0.6 + 0.05,
    t: Math.random() * 100,
    ts: Math.random() * 0.015 + 0.003,
    cross: Math.random() > 0.72,
  }));

  // nebula wisps
  const wisps = Array.from({length: 6}, () => ({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    rx: Math.random() * 180 + 80, ry: Math.random() * 80 + 40,
    a: Math.random() * 0.035 + 0.008,
    rot: Math.random() * Math.PI,
    t: Math.random() * 100, ts: Math.random() * 0.004 + 0.001,
    hue: Math.random() > 0.5 ? '0,180,255' : '0,100,200',
  }));

  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);

    wisps.forEach(w => {
      w.t += w.ts;
      const a = w.a * (0.5 + 0.5 * Math.sin(w.t));
      ctx.save();
      ctx.translate(w.x, w.y);ctx.rotate(w.rot + Math.sin(w.t * 0.3) * 0.2);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, w.rx);
      g.addColorStop(0, `rgba(${w.hue},${a})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.scale(1, w.ry / w.rx);
      ctx.beginPath();ctx.arc(0, 0, w.rx, 0, Math.PI * 2);ctx.fill();
      ctx.restore();
    });

    stars.forEach(s => {
      s.t += s.ts;
      const al = s.a * (0.4 + 0.6 * Math.abs(Math.sin(s.t)));
      ctx.save();ctx.globalAlpha = al;ctx.fillStyle = '#c8eeff';ctx.strokeStyle = '#c8eeff';
      if (s.cross) {
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(s.x - s.r * 3, s.y);ctx.lineTo(s.x + s.r * 3, s.y);
        ctx.moveTo(s.x, s.y - s.r * 3);ctx.lineTo(s.x, s.y + s.r * 3);
        ctx.stroke();
      } else {
        ctx.beginPath();ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);ctx.fill();
      }
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══ AMBIENT PARTICLES ═══════════════════════════ */
(function(){
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    const x = Math.random() * 100;
    const startY = 100 + Math.random() * 20;
    const dur = Math.random() * 18 + 12;
    const delay = Math.random() * -20;
    const hue = Math.random() > 0.5 ? '0,200,255' : '0,140,255';
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${x}vw;
      background:rgba(${hue},${Math.random() * 0.5 + 0.15});
      box-shadow:0 0 ${size * 3}px rgba(${hue},0.4);
      animation:particleRise ${dur}s ${delay}s linear infinite;
    `;
    document.body.appendChild(p);
  }

  const style = document.createElement('style');
  style.textContent = `
    @keyframes particleRise {
      0%   { transform: translateY(100vh) translateX(0);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(${Math.random()*60-30}px); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
})();

/* ══ SUBTITLE TYPEWRITER ════════════════════════ */
const sub = document.getElementById('subtitle');
const phrases = [
  "your wifi filter has been neutralized",
  "E = mc² · escape velocity achieved",
  "routing through the void",
  "educational research mode: active",
  "signal acquired · destination locked",
  "13.8 billion light-years of freedom",
  "the firewall didn't see this coming",
  "sonic mania > literally everything",
  "error 404: restrictions not found",
  "currently indistinguishable from studying",
  "atomic precision · zero trace",
  "teacher detection: nominal · proceed",
];
let pi = 0, ci = 0, erasing = false;
function type() {
  const cur = phrases[pi];
  if (!erasing) {
    sub.innerText = cur.substring(0, ci++);
    if (ci > cur.length) { erasing = true; setTimeout(type, 2600); }
    else setTimeout(type, 40);
  } else {
    sub.innerText = cur.substring(0, ci--);
    if (ci < 0) { erasing = false; pi = (pi + 1) % phrases.length; setTimeout(type, 300); }
    else setTimeout(type, 16);
  }
}
type();

/* ══ 3D PARALLAX ════════════════════════════════ */
const stage = document.getElementById('stage');
let mouseX = 0, mouseY = 0, curX = 0, curY = 0;

document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

(function parallax() {
  curX += (mouseX - curX) * 0.06;
  curY += (mouseY - curY) * 0.06;

  const rx = -curY * 10;
  const ry = curX * 12;
  const tz = Math.abs(curX * curY) * 20;

  stage.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateZ(${tz}px)`;

  // parallax on card layers
  document.getElementById('card').style.transform =
    `translate(-50%,-50%) translateZ(0px) translateX(${curX * 6}px) translateY(${curY * 4}px)`;

  // spheres move more
  const s1 = document.getElementById('sphere1');
  s1.style.marginLeft = `${curX * -18}px`;
  s1.style.marginTop = `${curY * -12}px`;
  const s2 = document.getElementById('sphere2');
  s2.style.marginLeft = `${curX * 14}px`;
  s2.style.marginTop = `${curY * 10}px`;
  const s3 = document.getElementById('sphere3');
  s3.style.marginLeft = `${curX * 22}px`;
  s3.style.marginTop = `${curY * -16}px`;

  requestAnimationFrame(parallax);
})();

/* ══ SERVICE WORKER ════════════════════════════ */
var swReady = false;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/uv/uv.sw.js', { scope: '/' })
    .then(reg => {
      if (reg.active) { swReady = true; return; }
      const sw = reg.installing || reg.waiting;
      if (sw) sw.addEventListener('statechange', () => { if (sw.state === 'activated') swReady = true; });
    }).catch(() => { swReady = true; });
} else swReady = true;

/* ══ LOADER ════════════════════════════════════ */
const loader = document.getElementById('loader');
const loaderSub = document.getElementById('loaderSub');
const loaderStatus = document.getElementById('loaderStatus');
const progFill = document.getElementById('progFill');
const backBtn = document.getElementById('backBtn');
let loadTimer = null;

const loadMsgs = [
  ["routing signal", "bypassing restrictions", "tunneling through", "almost there", "locked on"],
  ["charging particle beam", "bending spacetime", "warping to destination", "entering orbit", "touchdown"],
  ["dissolving firewall", "encrypting path", "signal bounced x7", "trace eliminated", "you're clear"],
  ["eating your homework", "looking very studious", "teacher convinced", "escape velocity", "free"],
];

function startLoader(url) {
  const msgs = loadMsgs[Math.floor(Math.random() * loadMsgs.length)];
  loader.classList.add('active');
  progFill.style.width = '0%';
  loaderSub.innerText = msgs[0];
  loaderStatus.innerText = msgs[0];

  let step = 0;
  const steps = [8, 28, 52, 76, 94, 100];
  const delays = [280, 480, 550, 600, 500, 350];

  function next() {
    if (step < steps.length) {
      progFill.style.width = steps[step] + '%';
      loaderStatus.innerText = msgs[Math.min(step, msgs.length - 1)];
      step++;
      if (step < steps.length) loadTimer = setTimeout(next, delays[step - 1]);
      else loadTimer = setTimeout(() => doNavigate(url), 300);
    }
  }
  loadTimer = setTimeout(next, delays[0]);
}

function doNavigate(url) {
  let tries = 0;
  function go() {
    if (swReady || tries++ > 40) {
      try { window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url); }
      catch(e) { window.location.href = url; }
    } else setTimeout(go, 100);
  }
  go();
}

backBtn.addEventListener('click', () => {
  if (loadTimer) clearTimeout(loadTimer);
  loader.classList.remove('active');
  progFill.style.width = '0%';
});

/* ══ NAVIGATION ════════════════════════════════ */
function launch(url) {
  startLoader(url);
}

function doSearch(val) {
  if (!val.trim()) return;
  const url = (val.includes('.') && !val.includes(' '))
    ? (val.startsWith('http') ? val : 'https://' + val)
    : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
  launch(url);
}

document.getElementById('uv-address').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});
document.getElementById('goBtn').addEventListener('click', () => {
  doSearch(document.getElementById('uv-address').value);
});
</script>
</body>
