<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atom · v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0c1520;
  --bg2:       #111d2e;
  --bg3:       #081018;
  --glass:     rgba(255,255,255,0.06);
  --glass2:    rgba(255,255,255,0.10);
  --gloss:     rgba(255,255,255,0.18);
  --border:    rgba(255,255,255,0.09);
  --border2:   rgba(255,255,255,0.15);
  --ink:       #f0f4ff;
  --ink2:      rgba(240,244,255,0.65);
  --ink3:      rgba(240,244,255,0.35);
  --ink4:      rgba(240,244,255,0.12);
  --a:         #3b82f6;
  --a2:        #60a5fa;
  --a3:        #1d4ed8;
  --teal:      #14b8a6;
  --green:     #10b981;
  --amber:     #f59e0b;
  --red:       #f43f5e;
  --purple:    #a855f7;
  --r:         10px;
  --r-sm:      7px;
  --r-lg:      16px;
  --bar-h:     40px;
  --dock-h:    80px;
  --ease:      cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --spring:    cubic-bezier(0.34, 1.4, 0.64, 1);
  --liquid:    cubic-bezier(0.4, 0, 0.2, 1);
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Space Grotesk',sans-serif; -webkit-font-smoothing:antialiased; cursor:none; user-select:none; }

/* ══════════════════════════════════════
   LIQUID CURSOR
══════════════════════════════════════ */
#cursor { position:fixed; pointer-events:none; z-index:99999; top:0; left:0; mix-blend-mode: normal; }
#c-blob {
  width:12px; height:12px; border-radius:50%;
  background:var(--a2);
  transform:translate(-50%,-50%);
  transition:transform 0.08s var(--spring), width 0.2s var(--spring), height 0.2s var(--spring), background 0.2s;
  filter:blur(0px);
  box-shadow:0 0 16px rgba(96,165,250,0.6), 0 0 32px rgba(96,165,250,0.2);
}
#c-trail {
  position:absolute;
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid rgba(96,165,250,0.3);
  top:-16px; left:-16px;
  transition:width .25s var(--spring), height .25s var(--spring), top .25s var(--spring), left .25s var(--spring), opacity .25s, border-color .25s;
  box-shadow:0 0 12px rgba(59,130,246,0.15);
}
body.hov #c-blob { width:18px; height:18px; background:var(--a); box-shadow:0 0 20px rgba(59,130,246,0.8), 0 0 40px rgba(59,130,246,0.3); }
body.hov #c-trail { width:44px; height:44px; top:-22px; left:-22px; border-color:rgba(96,165,250,0.5); }
body.clk #c-blob { transform:translate(-50%,-50%) scale(0.5); }
body.clk #c-trail { width:20px; height:20px; top:-10px; left:-10px; opacity:0.4; }
body.txt #c-blob { width:3px; height:20px; border-radius:2px; box-shadow:none; background:var(--ink); }
body.txt #c-trail { opacity:0; }

/* ══════════════════════════════════════
   WALLPAPER — Deep animated mesh
══════════════════════════════════════ */
#wp {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 120% 80% at 15% 85%, rgba(29,78,216,0.2) 0%, transparent 50%),
    radial-gradient(ellipse 80% 100% at 85% 5%, rgba(168,85,247,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 50% 40%, rgba(20,184,166,0.06) 0%, transparent 55%),
    linear-gradient(160deg, #07111d 0%, #0c1824 50%, #060f1a 100%);
  overflow:hidden;
}
.wp-orb {
  position:absolute; border-radius:50%;
  filter:blur(80px); opacity:0.18;
  animation:orb-drift 20s ease-in-out infinite;
}
.wo1 { width:600px; height:600px; background:radial-gradient(circle, #3b82f6, transparent 70%); top:-100px; left:-100px; animation-duration:25s; }
.wo2 { width:400px; height:400px; background:radial-gradient(circle, #a855f7, transparent 70%); bottom:-80px; right:10%; animation-duration:18s; animation-delay:-8s; }
.wo3 { width:300px; height:300px; background:radial-gradient(circle, #14b8a6, transparent 70%); top:30%; left:40%; animation-duration:22s; animation-delay:-4s; }
@keyframes orb-drift {
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-30px) scale(1.05);}
  66%{transform:translate(-30px,20px) scale(0.95);}
}
#wp-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:48px 48px;
}

/* ══════════════════════════════════════
   BOOT SEQUENCE — Liquid cinematic
══════════════════════════════════════ */
#boot {
  position:fixed; inset:0; z-index:9999;
  background:#04080f;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  overflow:hidden;
}
/* liquid background for boot */
#boot-bg {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%, rgba(59,130,246,0.08) 0%, transparent 70%);
  animation:boot-bg-pulse 2s ease-in-out infinite;
}
@keyframes boot-bg-pulse { 0%,100%{opacity:0.5;transform:scale(1);} 50%{opacity:1;transform:scale(1.1);} }

/* PHASE 1: atom ring + particle burst */
#boot-phase1 { position:relative; width:160px; height:160px; }
.boot-ring {
  position:absolute; border-radius:50%; top:50%; left:50%;
  border:1.5px solid transparent;
  transform:translate(-50%,-50%);
}
.br1 {
  width:160px; height:160px;
  border-color:rgba(59,130,246,0.6) transparent transparent transparent;
  animation:boot-spin 1.6s linear infinite;
  box-shadow:0 0 20px rgba(59,130,246,0.2);
}
.br2 {
  width:120px; height:120px;
  border-color:transparent rgba(168,85,247,0.5) transparent transparent;
  animation:boot-spin 2.2s linear infinite reverse;
}
.br3 {
  width:80px; height:80px;
  border-color:rgba(20,184,166,0.7) transparent transparent transparent;
  animation:boot-spin 1s linear infinite;
}
.br4 {
  width:40px; height:40px;
  border-color:transparent transparent rgba(96,165,250,0.9) transparent;
  animation:boot-spin 0.7s linear infinite reverse;
  box-shadow:0 0 12px rgba(96,165,250,0.4);
}
.boot-core {
  position:absolute; width:12px; height:12px; border-radius:50%;
  background:radial-gradient(circle, #60a5fa, #3b82f6);
  top:50%; left:50%; transform:translate(-50%,-50%);
  box-shadow:0 0 20px rgba(96,165,250,0.8), 0 0 40px rgba(59,130,246,0.4);
  animation:core-pulse 1.2s ease-in-out infinite;
}
@keyframes boot-spin { to{transform:translate(-50%,-50%) rotate(360deg);} }
@keyframes core-pulse { 0%,100%{box-shadow:0 0 20px rgba(96,165,250,.8),0 0 40px rgba(59,130,246,.4);} 50%{box-shadow:0 0 30px rgba(96,165,250,1),0 0 60px rgba(59,130,246,.6),0 0 80px rgba(59,130,246,.2);} }

/* boot logo under rings */
#boot-wordmark {
  margin-top:36px; font-family:'Syne',sans-serif; font-size:56px; font-weight:800;
  letter-spacing:-2px; color:#fff; opacity:0;
  animation:word-in 0.8s var(--spring) 1.2s forwards;
  text-shadow:0 0 60px rgba(59,130,246,0.4);
  background:linear-gradient(135deg,#f0f4ff 0%,#93c5fd 50%,#c4b5fd 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
@keyframes word-in { from{opacity:0;transform:translateY(12px) scale(0.9);} to{opacity:1;transform:none;} }

#boot-sub {
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:4px; text-transform:uppercase;
  color:var(--a2); opacity:0;
  animation:word-in 0.6s var(--ease) 1.8s forwards;
  margin-top:8px;
}

/* PHASE 2: Progress bar */
#boot-progress {
  margin-top:40px; width:280px; opacity:0;
  animation:word-in 0.5s var(--ease) 2s forwards;
}
.bp-bar {
  height:2px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; margin-bottom:12px;
}
#bp-fill {
  height:100%; width:0%; border-radius:2px;
  background:linear-gradient(90deg, var(--a3), var(--a), var(--a2));
  transition:width 0.4s var(--liquid);
  box-shadow:0 0 10px rgba(59,130,246,0.6);
  position:relative;
}
#bp-fill::after {
  content:''; position:absolute; right:0; top:-2px; width:4px; height:6px;
  background:radial-gradient(circle,rgba(255,255,255,0.9),transparent);
  border-radius:50%; animation:spark-trail 0.3s ease-out infinite;
}
@keyframes spark-trail { 0%{opacity:1;transform:scaleX(1);} 100%{opacity:0;transform:scaleX(3);} }
#bp-text {
  display:flex; justify-content:space-between;
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px;
  color:var(--ink3); text-transform:uppercase;
}
#bp-msg { transition:opacity 0.2s; }
#bp-pct { color:var(--a2); }

/* Liquid dissolve exit */
#boot.dissolve {
  animation:boot-dissolve 0.8s var(--ease) forwards;
}
@keyframes boot-dissolve {
  0%{opacity:1;filter:blur(0);}
  50%{opacity:0.5;filter:blur(8px);}
  100%{opacity:0;filter:blur(20px);transform:scale(1.04);}
}

/* Particles */
.bp-particle {
  position:absolute; border-radius:50%; pointer-events:none;
  animation:particle-rise 2s ease-out forwards;
}
@keyframes particle-rise {
  0%{transform:translate(0,0) scale(1);opacity:0.8;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}

/* ══════════════════════════════════════
   MENUBAR
══════════════════════════════════════ */
#mbar {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  height:var(--bar-h); display:flex; align-items:center; padding:0 16px; gap:0;
  background:rgba(7,17,29,0.85);
  border-bottom:1px solid rgba(59,130,246,0.15);
  box-shadow:0 1px 0 rgba(255,255,255,0.04), 0 4px 20px rgba(0,0,0,0.5);
  backdrop-filter:blur(24px) saturate(1.5);
}
.mb-logo {
  display:flex; align-items:center; gap:8px;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:-0.5px;
  background:linear-gradient(135deg,#93c5fd,#c4b5fd);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-right:16px;
}
.mb-logo-orb {
  width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg, var(--a) 0%, var(--purple) 100%);
  box-shadow:0 0 12px rgba(59,130,246,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
}
.mb-items { display:flex; gap:0; flex:1; }
.mbi {
  padding:0 11px; height:100%; display:flex; align-items:center;
  font-size:12px; font-weight:400; color:var(--ink3);
  cursor:pointer; letter-spacing:0.3px;
  transition:color .15s, background .15s;
  position:relative;
}
.mbi::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:var(--a); border-radius:2px; transition:width .2s var(--spring); }
.mbi:hover { color:var(--ink2); }
.mbi.active { color:var(--ink); }
.mbi.active::after { width:60%; }
.mb-right { margin-left:auto; display:flex; align-items:center; gap:18px; }
.mb-stat { display:flex; align-items:center; gap:5px; font-size:10px; letter-spacing:1px; color:var(--ink3); font-family:'DM Mono',monospace; }
.mb-led { width:5px; height:5px; border-radius:50%; background:var(--teal); box-shadow:0 0 8px var(--teal); animation:led-blink 3s ease-in-out infinite; }
@keyframes led-blink { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
#mb-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink2); letter-spacing:0.5px; }

/* ══════════════════════════════════════
   DESKTOP
══════════════════════════════════════ */
#desktop { position:fixed; top:var(--bar-h); left:0; right:0; bottom:var(--dock-h); z-index:10; overflow:hidden; }

/* ══════════════════════════════════════
   WINDOWS — Liquid glass
══════════════════════════════════════ */
.win {
  position:absolute;
  border-radius:var(--r-lg);
  background:rgba(10,18,30,0.88);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
  display:flex; flex-direction:column;
  min-width:380px; min-height:260px;
  will-change:transform; overflow:hidden;
  backdrop-filter:blur(32px) saturate(1.6);
}
.win::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.5) 30%, rgba(168,85,247,0.4) 70%, transparent 100%);
  z-index:1; pointer-events:none;
}
.win.focused {
  border-color:rgba(59,130,246,0.18);
  box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.1), inset 0 1px 0 rgba(255,255,255,0.09);
}

/* window open animation — liquid spring */
.win.w-open { animation:win-open 0.45s var(--spring) both; }
@keyframes win-open {
  0%  { opacity:0; transform:scale(0.88) translateY(20px); filter:blur(8px); }
  60% { opacity:1; filter:blur(0); }
  80% { transform:scale(1.01) translateY(-2px); }
  100%{ transform:scale(1) translateY(0); }
}
.win.w-close { animation:win-close 0.28s var(--ease) both; pointer-events:none; }
@keyframes win-close {
  to{ opacity:0; transform:scale(0.82) translateY(10px); filter:blur(10px); }
}
.win.w-min   { animation:win-min 0.3s var(--ease) both; pointer-events:none; }
@keyframes win-min {
  to{ opacity:0; transform:scale(0.2) translateY(120px) scaleY(0.1); filter:blur(8px); }
}

/* titlebar */
.wtb {
  height:42px; display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
  border-bottom:1px solid rgba(255,255,255,0.05); position:relative;
}
.tls { display:flex; gap:6px; align-items:center; }
.tl {
  width:12px; height:12px; border-radius:50%;
  cursor:pointer; transition:all .15s; position:relative;
}
.tl::after { content:''; position:absolute; inset:0; border-radius:50%; opacity:0; transition:opacity .15s; }
.tl:hover::after { opacity:1; }
.tl:hover { transform:scale(1.25); }
.tl-r { background:rgba(244,63,94,0.5); box-shadow:0 0 6px rgba(244,63,94,0.2); }
.tl-r::after { background:rgba(244,63,94,0.95); box-shadow:0 0 10px rgba(244,63,94,0.5); }
.tl-y { background:rgba(245,158,11,0.5); box-shadow:0 0 6px rgba(245,158,11,0.2); }
.tl-y::after { background:rgba(245,158,11,0.95); box-shadow:0 0 10px rgba(245,158,11,0.5); }
.tl-g { background:rgba(16,185,129,0.5); box-shadow:0 0 6px rgba(16,185,129,0.2); }
.tl-g::after { background:rgba(16,185,129,0.95); box-shadow:0 0 10px rgba(16,185,129,0.5); }
.w-title {
  position:absolute; left:50%; transform:translateX(-50%);
  font-size:11px; font-weight:500; letter-spacing:1px; text-transform:uppercase;
  color:var(--ink3); pointer-events:none; white-space:nowrap;
  font-family:'DM Mono',monospace;
}
.wbody { flex:1; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.wrz {
  position:absolute; bottom:0; right:0; width:18px; height:18px;
  cursor:se-resize; z-index:10; display:flex; align-items:flex-end; justify-content:flex-end; padding:4px;
}
.wrz svg { opacity:0.15; transition:opacity .15s; }
.wrz:hover svg { opacity:0.5; }

/* ══════════════════════════════════════
   DOCK
══════════════════════════════════════ */
#dock {
  position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
  z-index:1000; display:flex; align-items:flex-end; gap:4px; padding:9px 12px;
  background:rgba(8,16,24,0.88);
  border-radius:22px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 12px 40px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.05) inset, 0 -1px 0 rgba(0,0,0,0.3) inset;
  backdrop-filter:blur(32px) saturate(1.6);
}
.d-sep { width:1px; height:34px; background:rgba(255,255,255,0.08); margin:0 3px; align-self:center; }
.di {
  width:54px; height:54px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transform-origin:bottom center;
  transition:transform .22s var(--spring);
}
.di:hover { transform:scale(1.28) translateY(-8px); }
.di.nb    { transform:scale(1.12) translateY(-4px); }
.di.active::after {
  content:''; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
  width:16px; height:3px; border-radius:2px; background:var(--a);
  box-shadow:0 0 8px var(--a), 0 0 16px rgba(59,130,246,0.4);
}
.di-icon {
  width:100%; height:100%; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.di-icon::after {
  content:''; position:absolute; top:0; left:0; right:0; height:48%;
  background:linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
  border-radius:14px 14px 0 0; pointer-events:none;
}
.di-tip {
  position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
  background:rgba(8,16,24,0.95); border:1px solid rgba(255,255,255,0.1);
  border-radius:7px; padding:3px 10px;
  font-size:10px; font-weight:600; color:var(--ink); white-space:nowrap; letter-spacing:0.3px;
  opacity:0; pointer-events:none; transition:opacity .12s;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
}
.di:hover .di-tip { opacity:1; }
.di-bounce { animation:dock-bounce .5s var(--spring); }
@keyframes dock-bounce { 0%,100%{} 40%{transform:scale(1) translateY(-22px);} 65%{transform:scale(1) translateY(-8px);} }

/* ══════════════════════════════════════
   HOME APP
══════════════════════════════════════ */
.home-body { padding:24px 24px 20px; overflow-y:auto; height:100%; }
.home-hero { margin-bottom:22px; }
.home-mark {
  font-family:'Syne',sans-serif; font-size:52px; font-weight:800;
  letter-spacing:-2px; display:block; line-height:1;
  background:linear-gradient(135deg,#f0f4ff 0%,#93c5fd 50%,#c4b5fd 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.home-status {
  margin-top:8px; display:flex; align-items:center; gap:8px;
  font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink3);
  font-family:'DM Mono',monospace;
}
.h-led { width:5px; height:5px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px var(--teal); animation:led-blink 2s infinite; }
.home-div { height:1px; background:rgba(255,255,255,0.06); margin:18px 0 16px; }

/* search */
.s-wrap { margin-bottom:22px; }
.s-field {
  display:flex; align-items:center;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-top:1px solid rgba(255,255,255,0.13);
  border-radius:12px; overflow:hidden;
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.04);
  transition:border-color .18s, box-shadow .18s;
}
.s-wrap:focus-within .s-field { border-color:rgba(59,130,246,0.4); box-shadow:inset 0 2px 6px rgba(0,0,0,0.3), 0 0 0 3px rgba(59,130,246,0.12); }
.s-ico { padding:0 4px 0 14px; color:var(--ink3); display:flex; align-items:center; flex-shrink:0; }
.s-inp {
  flex:1; background:transparent; border:none; padding:12px 8px;
  font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:300; color:var(--ink);
}
.s-inp::placeholder { color:var(--ink4); }
.s-inp:focus { outline:none; }
.s-btn {
  margin:5px; padding:8px 20px;
  background:linear-gradient(180deg, rgba(59,130,246,0.9) 0%, rgba(29,78,216,0.9) 100%);
  color:#fff; border:none; border-radius:9px;
  font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.3px;
  cursor:pointer; flex-shrink:0; position:relative; overflow:hidden;

const SEARCH = {
  brave: q => 'https://search.brave.com/search?q=' + encodeURIComponent(q),
  ddg:   q => 'https://duckduckgo.com/?q=' + encodeURIComponent(q),

};
function toURL(v) {
  v = v.trim(); if (!v) return null;

/* ── CURSOR ── */
const cur = document.getElementById('cursor');

document.addEventListener('mousemove', e => { tx=e.clientX; ty=e.clientY; cur.style.left=tx+'px'; cur.style.top=ty+'px'; });
document.addEventListener('mousedown', ()=>document.body.classList.add('clk'));
document.addEventListener('mouseup',   ()=>document.body.classList.remove('clk'));
function addH(el) {
  if(el._h) return; el._h=1;
  el.addEventListener('mouseenter', ()=>document.body.classList.add('hov'));
  el.addEventListener('mouseleave', ()=>{ document.body.classList.remove('hov'); document.body.classList.remove('txt'); });
}
function addT(el) {
  el.addEventListener('mouseenter', ()=>document.body.classList.add('txt'));
  el.addEventListener('mouseleave', ()=>document.body.classList.remove('txt'));
}
document.querySelectorAll('a,button,.di,.tl,.mbi,.set-item,.g-card,.qtile,.g-card-sm,.btab,.b-nav,.toggle,.radio-row').forEach(addH);
document.querySelectorAll('input,textarea').forEach(addT);

/* ── WINDOW MANAGER ── */
let zTop = 100;
const WM = {
  wins: {},
  create(id, cfg) {
    const desk = document.getElementById('desktop');
    const el = document.createElement('div');
    el.className='win w-open focused'; el.id='win-'+id;
    const dw=desk.offsetWidth, dh=desk.offsetHeight;
    const w=cfg.w||780, h=cfg.h||540;
    const lx=cfg.x??(dw/2-w/2+(Math.random()-.5)*44|0);
    const ly=cfg.y??(dh/2-h/2+(Math.random()-.5)*32|0);
    el.style.cssText=`width:${w}px;height:${h}px;left:${Math.max(0,lx)}px;top:${Math.max(0,ly)}px;z-index:${++zTop}`;
    el.innerHTML=`
      <div class="wtb" data-wid="${id}">
        <div class="tls">
          <div class="tl tl-r" onclick="WM.close('${id}')"></div>
          <div class="tl tl-y" onclick="WM.minimize('${id}')"></div>
          <div class="tl tl-g" onclick="WM.maximize('${id}')"></div>
        </div>
        <div class="w-title">${cfg.title}</div>
      </div>
      <div class="wbody" id="wb-${id}">${cfg.body}</div>
      <div class="wrz" data-wid="${id}">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M8 2L2 8M8 5L5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>`;
    desk.appendChild(el);
    this.wins[id]={el,cfg,min:false,maxed:false};
    this._drag(el); this._resize(el); this._focus(el);
    el.querySelectorAll('.tl').forEach(addH);
    setTimeout(()=>el.classList.remove('w-open'),500);
    return el;
  },
  close(id) { const w=this.wins[id]; if(!w) return; w.el.classList.add('w-close'); setTimeout(()=>{ w.el.remove(); delete this.wins[id]; },300); },
  minimize(id) { const w=this.wins[id]; if(!w) return; w.el.classList.add('w-min'); w.min=true; setTimeout(()=>{ w.el.style.display='none'; w.el.classList.remove('w-min'); },360); },
  restore(id) { const w=this.wins[id]; if(!w) return; w.el.style.display='flex'; w.min=false; w.el.classList.add('w-open'); setTimeout(()=>w.el.classList.remove('w-open'),500); this._focus(w.el); },
  maximize(id) {
    const w=this.wins[id]; if(!w) return; const el=w.el;
    if(w.maxed) { Object.assign(el.style,{left:w.pr.l,top:w.pr.t,width:w.pr.w,height:w.pr.h,borderRadius:''}); w.maxed=false; }
    else { w.pr={l:el.style.left,t:el.style.top,w:el.style.width,h:el.style.height}; Object.assign(el.style,{left:'0',top:'0',width:'100%',height:'100%',borderRadius:'0'}); w.maxed=true; }
  },
  _focus(el) { document.querySelectorAll('.win').forEach(w=>w.classList.remove('focused')); el.classList.add('focused'); el.style.zIndex=++zTop; },
  _drag(el) {
    const tb=el.querySelector('.wtb'); let ox,oy,on=false;
    tb.addEventListener('mousedown',e=>{ if(e.target.closest('.tls')) return; on=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop; this._focus(el); });
    document.addEventListener('mousemove',e=>{ if(!on) return; const desk=document.getElementById('desktop'); el.style.left=Math.max(-el.offsetWidth+80,Math.min(desk.offsetWidth-80,e.clientX-ox))+'px'; el.style.top=Math.max(0,Math.min(desk.offsetHeight-40,e.clientY-oy))+'px'; });
    document.addEventListener('mouseup',()=>on=false);
    el.addEventListener('mousedown',()=>this._focus(el));
  },
  _resize(el) {
    const rh=el.querySelector('.wrz'); let on=false,ox,oy,ow,oh;
    rh.addEventListener('mousedown',e=>{ on=true; ox=e.clientX; oy=e.clientY; ow=el.offsetWidth; oh=el.offsetHeight; e.stopPropagation(); });
    document.addEventListener('mousemove',e=>{ if(!on) return; el.style.width=Math.max(380,ow+e.clientX-ox)+'px'; el.style.height=Math.max(260,oh+e.clientY-oy)+'px'; });
    document.addEventListener('mouseup',()=>on=false);
  }
};

/* ── APP MANAGER ── */
const App = {
  cnt: {},
  open(type, opts={}) {

    const di=document.getElementById('di-'+type);
    if(di){ di.classList.add('active','di-bounce'); setTimeout(()=>di.classList.remove('di-bounce'),600); }

    switch(type){
      case 'home':     this._home(id,opts);     break;
      case 'browser':  this._browser(id,opts);  break;
      case 'games':    this._games(id,opts);     break;
      case 'settings': this._settings(id,opts); break;
    }
    return id;
  },

  _home(id) {

        <div class="home-hero">
          <span class="home-mark">atom</span>
          <div class="home-status"><span class="h-led"></span>proxy active · stealth mode on</div>
        </div>
        <div class="home-div"></div>
        <div class="s-wrap">
          <div class="s-field">
            <div class="s-ico">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/>
                <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
            <input class="s-inp" id="hs-${id}" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false">
            <button class="s-btn" id="hg-${id}">Go</button>
          </div>
        </div>
        <div class="s-label">Quick Launch</div>
        <div class="q-tiles" id="qt-${id}"></div>
        <div class="strip-row">
          <div class="s-label" style="margin:0">Trending Games</div>
          <div class="see-all" id="sa-${id}">All ${GAMES.length} →</div>
        </div>
        <div class="g-strip" id="gs-${id}"></div>
      </div>`
    });
    const inp=document.getElementById('hs-'+id);
    const go=()=>{ const u=toURL(inp.value); if(u) Loader.launch(u); };
    document.getElementById('hg-'+id).addEventListener('click',go);
    inp.addEventListener('keydown',e=>e.key==='Enter'&&go());
    addT(inp); addH(document.getElementById('hg-'+id));

    const qt=document.getElementById('qt-'+id);
    TILES.forEach(t=>{
      const el=document.createElement('div'); el.className='qtile';
      el.style.background=t.bg;
      el.innerHTML=`<span class="qt-ico">${t.icon}</span><span class="qt-name">${t.n}</span>`;
      el.addEventListener('click',()=>Loader.launch(t.u)); addH(el); qt.appendChild(el);
    });

    const gs=document.getElementById('gs-'+id);
    GAMES.filter(g=>g.hot).slice(0,8).forEach(g=>{
      const el=document.createElement('div'); el.className='g-card-sm';
      el.innerHTML=`<div class="gthumb" style="background:${g.bg}"><span style="font-size:24px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))">${g.ic}</span></div><div class="ginfo"><div class="gname">${g.n}</div><div class="gtag">${g.t}</div></div>`;
      el.addEventListener('click',()=>App.open('browser',{url:g.u})); addH(el); gs.appendChild(el);
    });
    document.getElementById('sa-'+id).addEventListener('click',()=>App.open('games'));
  },

  _browser(id, opts={}) {
    WM.create(id,{title:'Browser',w:960,h:600,body:`
      <div class="b-chrome">
        <button class="b-nav" data-a="back"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8 2L3 6L8 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="b-nav" data-a="fwd"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 2L9 6L4 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

/* ── LOADER ── */
let swReady=false;
const SEQUENCES=[
  ['routing signal','bypassing filter','tunneling through','signal locked','launching'],
  ['warping spacetime','entering orbit','touchdown','signal clean','you\'re in'],
  ['shredding firewall','encrypting path','bouncing nodes','trace cleared','clear'],
  ['deflecting homework','teacher mode: off','escape velocity','bypassed','FREEDOM'],
  ['quantum tunneling','collapsing waveform','cloaking signal','invisible','stealth on'],
  ['phase shifting','bending subnet','spoofing headers','undetected','go'],
];
const Loader={
  _t:null,
  launch(u){
    const seq=SEQUENCES[Math.random()*SEQUENCES.length|0];
    const el=document.getElementById('loader'),sub=document.getElementById('l-sub'),
          st=document.getElementById('l-status'),bar=document.getElementById('lbar');
    el.classList.add('vis'); bar.style.width='0%'; sub.textContent=seq[0];
    const pcts=[6,22,44,66,84,96,100],delays=[120,280,380,440,360,300,180];
    let step=0;
    const next=()=>{
      bar.style.width=pcts[step]+'%';
      if(step<seq.length) st.textContent=seq[step];
      step++;
      if(step<pcts.length) this._t=setTimeout(next,delays[step-1]);
      else this._t=setTimeout(()=>this._nav(u),220);
    };
    this._t=setTimeout(next,delays[0]);
  },
  _nav(u){
    let n=0; const go=()=>{
      if(swReady||n++>40){ try{window.location.href=__uv$config.prefix+__uv$config.encodeUrl(u);}catch{window.location.href=u;} }
      else setTimeout(go,100);
    }; go();
  }
};
document.getElementById('l-cancel').addEventListener('click',()=>{
  clearTimeout(Loader._t);
  document.getElementById('loader').classList.remove('vis');
  document.getElementById('lbar').style.width='0%';
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/uv/uv.sw.js',{scope:'/'})
    .then(r=>{
      if(r.active){swReady=true;return;}
      const s=r.installing||r.waiting;
      if(s) s.addEventListener('statechange',()=>{ if(s.state==='activated'){ swReady=true; Notif.show('atom','Proxy ready · stealth on'); } });

}else swReady=true;

(function runBoot() {
  const msgs = [
    'initializing kernel',
    'loading service worker',
    'establishing proxy tunnel',
    'verifying encryption keys',
    'bypassing content filters',
    'stealth mode engaged',
    'atom OS ready',
  ];
  const pcts = [0, 12, 28, 48, 68, 84, 96, 100];
  const timing = [400, 500, 600, 550, 500, 450, 400, 300];
  let step = 0;
  const fill = document.getElementById('bp-fill');
  const msg  = document.getElementById('bp-msg');
  const pct  = document.getElementById('bp-pct');

  // Spawn floating particles
  const boot = document.getElementById('boot');
  for(let i=0; i<22; i++){
    const p = document.createElement('div'); p.className='bp-particle';
    const size = 2 + Math.random()*4;
    p.style.cssText = `width:${size}px;height:${size}px;left:${10+Math.random()*80}%;top:${40+Math.random()*50}%;background:rgba(${Math.random()>.5?'59,130,246':'168,85,247'},${0.3+Math.random()*.5});animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;--dx:${(Math.random()-.5)*120}px;--dy:${-60-Math.random()*100}px`;
    boot.appendChild(p);
  }

  const advance = () => {
    if(step >= msgs.length) {
      // final pulse then dissolve
      fill.style.width = '100%';
      pct.textContent = '100%';
      msg.textContent = 'complete';
      setTimeout(() => {
        const bootEl = document.getElementById('boot');
        bootEl.classList.add('dissolve');
        setTimeout(() => {
          bootEl.style.display = 'none';
          tick();
          setTimeout(() => App.open('home'), 80);
          setTimeout(() => Notif.show('atom', 'Welcome. Proxy is active.'), 600);
        }, 820);
      }, 500);
      return;
    }
    fill.style.width = pcts[step] + '%';
    pct.textContent  = pcts[step] + '%';
    msg.textContent  = msgs[step] || msgs[msgs.length-1];
    const delay = timing[step] || 400;
    step++;
    setTimeout(advance, delay);
  };

  setTimeout(advance, 800);
})();
