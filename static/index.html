<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0d0d;
            --surface:  #161616;
            --tile:     #1a1a1a;
            --tile-hover: #222222;
            --accent:   #00b4d8;
            --accent2:  #0077b6;
            --accent3:  #48cae4;
            --green:    #52b788;
            --orange:   #f4a261;
            --red:      #e63946;
            --purple:   #7b2d8b;
            --text:     #f0f0f0;
            --text-dim: #666;
            --border:   #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Sans', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* subtle scanline texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.012) 2px,
                rgba(255,255,255,0.012) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* accent light bleed top left */
        body::after {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,180,216,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative; z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 60px 32px 80px;
        }

        /* ── HEADER ── */
        .header {
            margin-bottom: 52px;
            animation: fadeUp 0.5s ease both;
        }

        .wordmark {
            display: flex;
            align-items: baseline;
            gap: 0;
            margin-bottom: 6px;
        }

        .wordmark-text {
            font-size: 52px;
            font-weight: 200;
            letter-spacing: -2px;
            color: var(--text);
            line-height: 1;
        }

        .wordmark-dot {
            width: 10px; height: 10px;
            background: var(--accent);
            display: inline-block;
            margin-left: 3px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 10px;
        }

        .header-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        #subtitle {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 1px;
            white-space: nowrap;
            min-width: 260px;
        }

        #subtitle::after {
            content: '_';
            color: var(--accent);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── SEARCH ── */
        .search-section {
            margin-bottom: 52px;
            animation: fadeUp 0.5s 0.08s ease both;
        }

        .search-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .search-row {
            display: flex;
            gap: 0;
        }

        #uv-address {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-right: none;
            padding: 14px 20px;
            font-size: 15px;
            font-family: 'Fira Sans', sans-serif;
            font-weight: 300;
            color: var(--text);
            transition: border-color 0.2s, background 0.2s;
        }

        #uv-address::placeholder { color: var(--text-dim); }

        #uv-address:focus {
            background: #1e1e1e;
            border-color: var(--accent);
        }

        .search-btn {
            background: var(--accent);
            border: 1px solid var(--accent);
            padding: 14px 22px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .search-btn:hover { background: var(--accent3); }
        .search-btn:active { background: var(--accent2); }

        .search-btn svg { display: block; }

        /* ── GAMES SECTION ── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            animation: fadeUp 0.5s 0.14s ease both;
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .section-rule {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── TILE GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            animation: fadeUp 0.5s 0.18s ease both;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        .tile {
            background: var(--tile);
            border: 1px solid var(--border);
            padding: 20px 14px 16px;
            text-decoration: none;
            color: var(--text);
            text-align: center;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* colored top accent bar per tile */
        .tile::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.2s ease;
        }

        .tile:nth-child(1)::after { background: var(--accent); }
        .tile:nth-child(2)::after { background: var(--green); }
        .tile:nth-child(3)::after { background: var(--orange); }
        .tile:nth-child(4)::after { background: var(--red); }
        .tile:nth-child(5)::after { background: #9d4edd; }

        .tile:hover {
            background: var(--tile-hover);
            border-color: #333;
        }
        .tile:hover::after { transform: scaleX(1); }
        .tile:active { transform: scale(0.97); }

        .tile-icon {
            width: 40px; height: 40px;
            flex-shrink: 0;
        }

        .tile-name {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            line-height: 1.3;
        }

        .tile-sub {
            font-size: 10px;
            font-weight: 300;
            color: var(--text-dim);
            margin-top: -4px;
        }

        /* ── STATUS BAR ── */
        .statusbar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.5s 0.24s ease both;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            flex-shrink: 0;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 10px;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .status-text strong {
            color: var(--accent);
            font-weight: 600;
        }

        .status-right {
            margin-left: auto;
            font-size: 10px;
            color: var(--border);
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* ── CURTAIN ── */
        #void-curtain {
            position: fixed; inset: 0;
            background: var(--bg);
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
        }

        #void-curtain.active { transform: translateY(0); }

        .curtain-bar {
            width: 200px; height: 2px;
            background: var(--border);
            overflow: hidden;
        }

        .curtain-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: none;
        }

        #void-curtain.active .curtain-bar-fill {
            animation: loadBar 0.8s 0.1s ease forwards;
        }

        @keyframes loadBar { from{width:0%} to{width:100%} }

        #curtain-msg {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s 0.15s;
        }

        #void-curtain.active #curtain-msg { opacity: 1; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="void-curtain">
    <div class="curtain-bar"><div class="curtain-bar-fill"></div></div>
    <div id="curtain-msg">routing request</div>
</div>

<div class="page">

    <header class="header">
        <div class="wordmark">
            <span class="wordmark-text">atom</span>
            <span class="wordmark-dot"></span>
        </div>
        <div class="header-meta">
            <span id="subtitle"></span>
            <div class="header-line"></div>
        </div>
    </header>

    <section class="search-section">
        <div class="search-label">navigate</div>
        <div class="search-row">
            <input id="uv-address" type="text" placeholder="url or search query" autocomplete="off" spellcheck="false">
            <button class="search-btn" id="searchBtn" aria-label="Go">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M3 9h12M10 4l5 5-5 5" stroke="#0d0d0d" stroke-width="1.8" stroke-linecap="square"/>
                </svg>
            </button>
        </div>
    </section>

    <div class="section-header">
        <span class="section-title">quick launch</span>
        <div class="section-rule"></div>
    </div>

    <div class="grid">

        <!-- Sonic Mania -->
        <a href="#" onclick="launch('https://vinmannie.github.io/SonicManiaWeb/')" class="tile">
            <svg class="tile-icon" viewBox="0 0 40 40" fill="none">
                <!-- hedgehog silhouette -->
                <circle cx="20" cy="22" r="10" fill="#00b4d8" opacity="0.15"/>
                <ellipse cx="20" cy="24" rx="8" ry="6" fill="#00b4d8"/>
                <circle cx="20" cy="17" r="5" fill="#00b4d8"/>
                <!-- spines -->
                <path d="M16 14 L13 7 L17 13" fill="#48cae4"/>
                <path d="M18 13 L17 5 L20 12" fill="#48cae4"/>
                <path d="M21 13 L23 5 L22 12" fill="#48cae4"/>
                <path d="M23 14 L27 7 L24 13" fill="#48cae4"/>
                <!-- eye -->
                <circle cx="22" cy="16" r="1.5" fill="#0d0d0d"/>
                <circle cx="22.5" cy="15.5" r="0.5" fill="white"/>
                <!-- speed lines -->
                <path d="M4 26 L11 26" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
                <path d="M2 29 L9 29" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>
            </svg>
            <span class="tile-name">Sonic Mania</span>
            <span class="tile-sub">gotta go fast</span>
        </a>

        <!-- Sonic 1 -->
        <a href="#" onclick="launch('https://jojudge.com/ICBINS1/')" class="tile">
            <svg class="tile-icon" viewBox="0 0 40 40" fill="none">
                <!-- retro ring -->
                <circle cx="20" cy="20" r="12" stroke="#52b788" stroke-width="2" fill="none"/>
                <circle cx="20" cy="20" r="8" fill="#52b788" opacity="0.1"/>
                <!-- star shape inside -->
                <polygon points="20,10 22,17 29,17 24,22 26,29 20,24 14,29 16,22 11,17 18,17" fill="#52b788" opacity="0.8"/>
                <!-- "1" badge -->
                <rect x="26" y="5" width="12" height="12" fill="#52b788"/>
                <text x="32" y="14.5" text-anchor="middle" font-family="Fira Sans,sans-serif" font-size="9" font-weight="700" fill="#0d0d0d">1</text>
            </svg>
            <span class="tile-name">Sonic 1</span>
            <span class="tile-sub">the original</span>
        </a>

        <!-- Sonic 2013 -->
        <a href="#" onclick="launch('https://github.com/VinMannie/Sonic-1-WASM')" class="tile">
            <svg class="tile-icon" viewBox="0 0 40 40" fill="none">
                <!-- wasm/remaster chip -->
                <rect x="8" y="8" width="24" height="24" stroke="#f4a261" stroke-width="1.5" fill="none"/>
                <rect x="13" y="13" width="14" height="14" fill="#f4a261" opacity="0.15"/>
                <!-- circuit lines -->
                <path d="M8 16 L4 16M8 24 L4 24M32 16 L36 16M32 24 L36 24M16 8 L16 4M24 8 L24 4M16 32 L16 36M24 32 L24 36" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
                <!-- center text -->
                <text x="20" y="23" text-anchor="middle" font-family="Fira Sans,sans-serif" font-size="7" font-weight="700" fill="#f4a261">2013</text>
            </svg>
            <span class="tile-name">Sonic 2013</span>
            <span class="tile-sub">remastered</span>
        </a>

        <!-- Sonic 2 CC -->
        <a href="#" onclick="launch('https://heyjoeway.github.io/s2cx/')" class="tile">
            <svg class="tile-icon" viewBox="0 0 40 40" fill="none">
                <!-- chaos emerald shape -->
                <polygon points="20,4 30,12 30,28 20,36 10,28 10,12" fill="#e63946" opacity="0.15" stroke="#e63946" stroke-width="1.5"/>
                <!-- inner gem facets -->
                <polygon points="20,4 30,12 20,20" fill="#e63946" opacity="0.3"/>
                <polygon points="20,4 10,12 20,20" fill="#e63946" opacity="0.5"/>
                <polygon points="20,20 30,28 20,36 10,28" fill="#e63946" opacity="0.4"/>
                <line x1="20" y1="4" x2="20" y2="36" stroke="#e63946" stroke-width="0.5" opacity="0.6"/>
                <line x1="10" y1="12" x2="30" y2="28" stroke="#e63946" stroke-width="0.5" opacity="0.4"/>
                <line x1="30" y1="12" x2="10" y2="28" stroke="#e63946" stroke-width="0.5" opacity="0.4"/>
                <!-- CC badge -->
                <text x="20" y="22" text-anchor="middle" font-family="Fira Sans,sans-serif" font-size="6" font-weight="700" fill="#e63946">CC</text>
            </svg>
            <span class="tile-name">Sonic 2</span>
            <span class="tile-sub">chaos edition</span>
        </a>

        <!-- Sonic 3 A/K -->
        <a href="#" onclick="launch('https://projects.sappharad.com/s3air_ios/')" class="tile">
            <svg class="tile-icon" viewBox="0 0 40 40" fill="none">
                <!-- plane/air shape -->
                <path d="M4 22 L20 10 L36 22 L24 22 L24 32 L16 32 L16 22 Z" fill="#9d4edd" opacity="0.2" stroke="#9d4edd" stroke-width="1.5" stroke-linejoin="miter"/>
                <!-- & K text -->
                <text x="14" y="26" font-family="Fira Sans,sans-serif" font-size="8" font-weight="700" fill="#9d4edd">&amp;K</text>
                <!-- stars -->
                <circle cx="10" cy="12" r="1.2" fill="#9d4edd" opacity="0.7"/>
                <circle cx="30" cy="8" r="1.2" fill="#9d4edd" opacity="0.7"/>
                <circle cx="34" cy="16" r="0.8" fill="#9d4edd" opacity="0.5"/>
            </svg>
            <span class="tile-name">Sonic 3 A/K</span>
            <span class="tile-sub">&amp; knuckles</span>
        </a>

    </div>

    <div class="statusbar">
        <div class="status-dot"></div>
        <span class="status-text">bare server <strong>bare.benrogo.net</strong> · ultraviolet proxy active</span>
        <span class="status-right">atom / 2026</span>
    </div>

</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<script>
    var curtain = document.getElementById('void-curtain');
    var curtainMsg = document.getElementById('curtain-msg');
    var sub = document.getElementById('subtitle');

    // SW registration
    var swReady = false;
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/uv/uv.sw.js', {
            scope: __uv$config.prefix
        }).then(function(reg) {
            if (reg.active) { swReady = true; return; }
            var sw = reg.installing || reg.waiting;
            if (sw) {
                sw.addEventListener('statechange', function() {
                    if (sw.state === 'activated') swReady = true;
                });
            }
        }).catch(function(err) {
            console.warn('SW failed:', err);
            swReady = true;
        });
    } else { swReady = true; }

    // Typewriter
    var phrases = [
        "your gpa just filed for divorce",
        "sonic is faster than your career path",
        "sponsored by 3am academic despair",
        "your teacher is watching. probably.",
        "brainrot level: executive",
        "the gpa reaper is outside your house",
        "procrastinating like a high-end ceo",
        "world history homework? never heard of her",
        "your fbi agent is bored, play something",
        "why study when you can just vibe",
        "this proxy is the only thing passing this year",
        "too many tabs, not enough brain cells",
        "sponsored by monster energy and regret",
        "luxury proxy, budget lifestyle",
        "running on spite and caffeine",
        "the sonic obsession is getting weird",
        "type fast, the guilt is catching up",
        "don't let the firewall win",
        "delete your history after this. seriously.",
        "just one more game of sonic, i swear",
        "making irresponsibility look aesthetic",
        "certified school wifi destroyer",
        "error 404: homework not found",
        "currently hiring: one (1) motivation",
        "your future boss just saw your tab",
        "staying unblocked since 2026",
    ];

    var pIdx = 0, cIdx = 0, erasing = false;
    function type() {
        var cur = phrases[pIdx];
        if (!erasing) {
            sub.innerText = cur.substring(0, cIdx++);
            if (cIdx > cur.length) { erasing = true; setTimeout(type, 2600); }
            else setTimeout(type, 50);
        } else {
            sub.innerText = cur.substring(0, cIdx--);
            if (cIdx < 0) { erasing = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 350); }
            else setTimeout(type, 22);
        }
    }
    type();

    var loadingMsgs = [
        "routing request", "bypassing filters", "going fast",
        "loading chaos", "escaping homework", "deploying brainrot",
        "activating proxy", "sending it"
    ];

    function launch(url) {
        curtainMsg.innerText = loadingMsgs[Math.floor(Math.random() * loadingMsgs.length)];
        curtain.classList.add('active');
        var attempts = 0;
        function go() {
            if (swReady || attempts++ > 40) {
                window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            } else {
                setTimeout(go, 100);
            }
        }
        setTimeout(go, 350);
    }

    function doSearch(val) {
        if (!val.trim()) return;
        var url = (val.includes('.') && !val.includes(' '))
            ? (val.startsWith('http') ? val : 'https://' + val)
            : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
        launch(url);
    }

    document.getElementById('uv-address').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSearch(e.target.value);
    });
    document.getElementById('searchBtn').addEventListener('click', function() {
        doSearch(document.getElementById('uv-address').value);
    });
</script>
</body>
</html>
