<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atom · v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;1,300&family=Syne:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#020912;--aqua:#00d8ff;--blue:#006eff;
  --gb:rgba(255,255,255,0.13);--gbt:rgba(255,255,255,0.28);
  --ink:rgba(230,245,255,0.92);--ink2:rgba(180,220,245,0.52);--ink3:rgba(140,190,220,0.32);
  --esp:cubic-bezier(.34,1.56,.64,1);--eo:cubic-bezier(.16,1,.3,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--c0);font-family:'DM Sans',sans-serif;cursor:none;-webkit-font-smoothing:antialiased}

/* ═══ CURSOR ════════════════════════════════════ */
#cur{position:fixed;pointer-events:none;z-index:99999;top:0;left:0;transform:translate(-50%,-50%)}
#co{position:absolute;width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,216,255,.52);transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s,background .18s;box-shadow:0 0 10px rgba(0,216,255,.12)}
#ci{position:absolute;width:4.5px;height:4.5px;border-radius:50%;background:var(--aqua);transform:translate(-50%,-50%);box-shadow:0 0 7px var(--aqua),0 0 14px rgba(0,216,255,.5)}
body.ch #co{width:52px;height:52px;border-color:rgba(0,216,255,.22);background:rgba(0,216,255,.035)}
body.cc #co{transform:translate(-50%,-50%) scale(.7)}
body.cc #ci{transform:translate(-50%,-50%) scale(2)}

/* ═══ ENV ════════════════════════════════════════ */
#env{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 140% 100% at 18% 8%,rgba(0,28,75,.92),transparent 52%),radial-gradient(ellipse 100% 120% at 88% 92%,rgba(0,15,50,.85),transparent 52%),#020912}
#aurora{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:screen;animation:adrift linear infinite}
.ab1{width:750px;height:320px;background:radial-gradient(ellipse,rgba(0,175,255,.11),transparent 70%);top:-120px;left:-80px;animation-duration:28s}
.ab2{width:520px;height:420px;background:radial-gradient(ellipse,rgba(0,90,210,.09),transparent 70%);top:18%;right:-130px;animation-duration:36s;animation-delay:-13s}
.ab3{width:640px;height:260px;background:radial-gradient(ellipse,rgba(0,190,170,.06),transparent 70%);bottom:-90px;left:28%;animation-duration:24s;animation-delay:-9s}
@keyframes adrift{0%{transform:translate(0,0) rotate(0deg);opacity:.6}33%{transform:translate(55px,-38px) rotate(7deg);opacity:1}66%{transform:translate(-35px,28px) rotate(-4deg);opacity:.72}100%{transform:translate(0,0) rotate(0deg);opacity:.6}}
#stCv{position:fixed;inset:0;z-index:2}

/* nucleus bg */
#nucBg{position:fixed;z-index:3;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);width:1000px;height:1000px}
.nr{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(0,200,255,.055);transform-style:preserve-3d}
.nr::after{content:'';position:absolute;border-radius:50%;top:50%;left:0;transform:translate(-50%,-50%);background:radial-gradient(circle at 34% 30%,rgba(210,248,255,.92),rgba(0,200,255,.7) 48%,rgba(0,80,140,.28));box-shadow:0 0 12px rgba(0,220,255,.9),0 0 24px rgba(0,180,255,.5),0 0 42px rgba(0,140,255,.18)}
.nr1{width:400px;height:140px;margin:-70px 0 0 -200px;animation:nrs1 5.2s linear infinite}.nr1::after{width:9px;height:9px}
.nr2{width:340px;height:118px;margin:-59px 0 0 -170px;border-style:dashed;border-color:rgba(0,200,255,.035);animation:nrs2 3.9s linear infinite}.nr2::after{width:7px;height:7px}
.nr3{width:460px;height:162px;margin:-81px 0 0 -230px;animation:nrs3 7.2s linear infinite}.nr3::after{width:6px;height:6px}
.nr4{width:280px;height:98px;margin:-49px 0 0 -140px;border-color:rgba(0,220,255,.045);animation:nrs1 2.8s linear infinite reverse}.nr4::after{width:5px;height:5px}
@keyframes nrs1{from{transform:rotateX(72deg) rotateZ(0deg)}to{transform:rotateX(72deg) rotateZ(360deg)}}
@keyframes nrs2{from{transform:rotateX(72deg) rotateZ(60deg)}to{transform:rotateX(72deg) rotateZ(420deg)}}
@keyframes nrs3{from{transform:rotateX(72deg) rotateZ(-40deg)}to{transform:rotateX(72deg) rotateZ(320deg)}}
#nucCore{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 34% 29%,#d8f8ff,#00ccff 42%,#005090);box-shadow:0 0 22px rgba(0,210,255,.85),0 0 55px rgba(0,170,255,.42),0 0 110px rgba(0,130,255,.14);animation:cpulse 3.5s ease-in-out infinite}
@keyframes cpulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 22px rgba(0,210,255,.85),0 0 55px rgba(0,170,255,.42),0 0 110px rgba(0,130,255,.14)}50%{transform:translate(-50%,-50%) scale(1.35);box-shadow:0 0 32px rgba(0,220,255,1),0 0 75px rgba(0,180,255,.62),0 0 150px rgba(0,140,255,.2)}}

/* glass orbs */
.gorb{position:fixed;border-radius:50%;pointer-events:none;z-index:4;background:radial-gradient(circle at 33% 27%,rgba(255,255,255,.58) 0%,rgba(255,255,255,.14) 18%,transparent 48%),radial-gradient(circle at 50% 50%,rgba(0,170,255,.09),rgba(0,60,160,.2) 55%,rgba(0,12,55,.4) 100%);border:1px solid rgba(255,255,255,.2);box-shadow:inset 0 1px 3px rgba(255,255,255,.45),0 14px 44px rgba(0,0,0,.58),0 0 26px rgba(0,130,255,.07)}
#oa{width:115px;height:115px;top:7vh;right:11vw}
#ob{width:68px;height:68px;bottom:16vh;right:9vw}
#oc{width:48px;height:48px;top:20vh;left:10vw}
#od{width:28px;height:28px;bottom:28vh;left:16vw}
#oe{width:19px;height:19px;top:50vh;right:23vw}

/* ═══ SCENE & STAGE ══════════════════════════════ */
#scene{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;perspective:1700px;perspective-origin:50% 46%}
#stage{position:relative;transform-style:preserve-3d;will-change:transform}

/* ═══ MAIN WINDOW ═════════════════════════════════ */
#win{
  width:720px;
  border-radius:22px;position:relative;transform-style:preserve-3d;
  background:linear-gradient(158deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,.03) 32%,rgba(0,48,138,.08) 68%,rgba(0,18,72,.06) 100%);
  backdrop-filter:blur(52px) saturate(2.3) brightness(1.06);
  -webkit-backdrop-filter:blur(52px) saturate(2.3) brightness(1.06);
  border:1px solid var(--gb);border-top:1px solid var(--gbt);border-left:1px solid rgba(255,255,255,.2);
  box-shadow:
    0 1px 0 rgba(255,255,255,.14) inset,0 -1px 0 rgba(0,0,0,.2) inset,1px 0 0 rgba(255,255,255,.06) inset,
    0 55px 130px rgba(0,0,0,.68),0 22px 55px rgba(0,0,0,.42),0 8px 22px rgba(0,0,0,.32),
    0 0 70px rgba(0,95,220,.1),0 0 140px rgba(0,55,175,.06),0 0 0 1px rgba(0,185,255,.055);
  animation:winIn .85s var(--eo) both;
  overflow:hidden;
}
@keyframes winIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
#win::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;border-radius:22px 22px 82% 82%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;z-index:0}
#win::after{content:'';position:absolute;bottom:0;left:0;right:0;height:38%;border-radius:0 0 22px 22px;background:linear-gradient(0deg,rgba(0,6,28,.28) 0%,transparent 100%);pointer-events:none;z-index:0}

/* ─── TITLEBAR ───────────────────────────────────── */
#tbar{display:flex;align-items:center;height:46px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.065);position:relative;z-index:20;gap:10px;user-select:none;flex-shrink:0}
.tlw{display:flex;gap:7px;align-items:center;flex-shrink:0}
.tl{width:13px;height:13px;border-radius:50%;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.38),inset 0 -1px 0 rgba(0,0,0,.28);transition:filter .14s}
.tl:hover{filter:brightness(1.3)}
.tlr{background:linear-gradient(155deg,#ff6b6b,#e03038)}
.tly{background:linear-gradient(155deg,#ffd166,#e09828)}
.tlg{background:linear-gradient(155deg,#6ce08a,#32b858)}
#tabs{display:flex;gap:2px;flex:1;justify-content:center}
.tab{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:10px;font-size:12px;font-weight:400;letter-spacing:.35px;color:var(--ink3);cursor:pointer;transition:background .16s,color .16s;white-space:nowrap;position:relative}
.tab:hover{color:var(--ink2);background:rgba(255,255,255,.042)}
.tab.active{color:var(--ink);background:rgba(255,255,255,.08);box-shadow:0 1px 0 rgba(255,255,255,.1) inset,0 -1px 0 rgba(0,0,0,.14) inset}
.tind{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:0;height:2px;background:linear-gradient(90deg,transparent,var(--aqua),transparent);border-radius:2px;transition:width .24s var(--esp)}
.tab.active .tind{width:55%}
#clk{font-size:11px;letter-spacing:1.2px;color:rgba(0,200,255,.28);font-weight:300;flex-shrink:0}

/* ─── PANEL CONTAINER ────────────────────────────── */
#pwrap{position:relative;overflow:hidden}
.panel{display:none;animation:panIn .32s var(--eo) both}
.panel.active{display:block}
@keyframes panIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ════════════════════════════════════════════════
   HOME PANEL
════════════════════════════════════════════════ */
#ph{padding:28px 32px 30px}
.logo-row{text-align:center;margin-bottom:8px}
.wm{
  font-family:'Syne',sans-serif;font-weight:700;font-size:92px;letter-spacing:26px;text-indent:26px;
  color:transparent;background:linear-gradient(175deg,#fff 0%,#d0f0ff 18%,#78daff 44%,#2ab4f5 72%,#0080e8 100%);
  -webkit-background-clip:text;background-clip:text;line-height:1;display:block;
  filter:drop-shadow(0 0 28px rgba(0,200,255,.46)) drop-shadow(0 4px 14px rgba(0,0,0,.52));
  animation:lbr 5.5s ease-in-out infinite
}
@keyframes lbr{0%,100%{filter:drop-shadow(0 0 24px rgba(0,200,255,.42)) drop-shadow(0 4px 14px rgba(0,0,0,.52))}50%{filter:drop-shadow(0 0 42px rgba(0,220,255,.72)) drop-shadow(0 4px 14px rgba(0,0,0,.52))}}
.badge{display:inline-flex;align-items:center;gap:8px;margin-top:9px;padding:5px 15px;border-radius:22px;background:rgba(0,200,255,.065);border:1px solid rgba(0,200,255,.14);font-size:9.5px;letter-spacing:3.5px;color:rgba(0,210,255,.48);text-transform:uppercase}
.bdot{width:5px;height:5px;border-radius:50%;background:rgba(0,220,255,.62);box-shadow:0 0 6px rgba(0,220,255,.82);animation:bp 2s ease-in-out infinite}
@keyframes bp{0%,100%{opacity:.58;transform:scale(1)}50%{opacity:1;transform:scale(1.45)}}
.rule{position:relative;height:1px;margin:20px 0 18px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.2) 15%,rgba(255,255,255,.14) 50%,rgba(0,200,255,.2) 85%,transparent)}
.rule::before{content:'⚛';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#061426;padding:0 10px;font-size:11px;color:rgba(0,200,255,.38);backdrop-filter:blur(4px)}
#sub{font-style:italic;font-weight:300;font-size:12.5px;letter-spacing:.9px;color:rgba(170,218,244,.38);text-align:center;min-height:20px;margin-bottom:24px}
#sub::after{content:'|';color:rgba(0,210,255,.65);animation:bl 1s step-end infinite;margin-left:1px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* search */
.sz{position:relative;margin-bottom:22px}
.sf{display:flex;align-items:center;border-radius:15px;overflow:hidden;background:rgba(4,10,32,.6);border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.17);box-shadow:0 2px 0 rgba(255,255,255,.055) inset,0 -2px 7px rgba(0,0,0,.28) inset,0 7px 26px rgba(0,0,0,.38);transition:border-color .24s,box-shadow .24s}
.sz:focus-within .sf{border-color:rgba(0,200,255,.28);border-top-color:rgba(0,200,255,.4);box-shadow:0 2px 0 rgba(0,200,255,.07) inset,0 -2px 7px rgba(0,0,0,.28) inset,0 7px 26px rgba(0,0,0,.38),0 0 0 3px rgba(0,200,255,.08),0 0 32px rgba(0,180,255,.055)}
.si{padding:0 4px 0 18px;display:flex;align-items:center;color:rgba(0,200,255,.36);flex-shrink:0;transition:color .2s}
.sz:focus-within .si{color:rgba(0,200,255,.68)}
#uva{flex:1;background:transparent;border:none;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;letter-spacing:.2px;color:rgba(228,244,255,.9)}
#uva::placeholder{color:rgba(255,255,255,.18)}
#uva:focus{outline:none}
.gb{margin:6px;padding:11px 24px;border:none;border-radius:11px;background:linear-gradient(135deg,#005ce0,#00a5ff);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.4px;cursor:pointer;flex-shrink:0;box-shadow:0 1px 0 rgba(255,255,255,.22) inset,0 -1px 0 rgba(0,0,0,.3) inset,0 4px 18px rgba(0,96,215,.52);transition:background .15s,box-shadow .15s,transform .1s}
.gb:hover{background:linear-gradient(135deg,#0075ff,#00c6ff);box-shadow:0 1px 0 rgba(255,255,255,.26) inset,0 -1px 0 rgba(0,0,0,.3) inset,0 6px 24px rgba(0,120,255,.62)}
.gb:active{transform:scale(.93)}

/* quick launch tiles */
.tlbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:9px}
.tlbl::before,.tlbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent)}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px 8px 14px;border-radius:18px;text-decoration:none;cursor:pointer;overflow:hidden;background:linear-gradient(162deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.16);box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 -1px 0 rgba(0,0,0,.16) inset,0 6px 22px rgba(0,0,0,.32);transition:background .22s,border-color .22s,box-shadow .22s;will-change:transform}
.tile::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;border-radius:18px 18px 62% 62%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;z-index:1}
.tile::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32%;border-radius:0 0 18px 18px;background:linear-gradient(0deg,rgba(0,5,22,.22) 0%,transparent 100%);pointer-events:none;z-index:1}
.tile:hover{background:linear-gradient(162deg,rgba(0,155,255,.11) 0%,rgba(0,75,195,.055) 100%);border-color:rgba(0,200,255,.22);box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 -1px 0 rgba(0,0,0,.16) inset,0 14px 32px rgba(0,0,0,.42),0 0 22px rgba(0,165,255,.1)}
.tile.lifted{transform:translateY(-9px) scale(1.07);transition:transform .28s var(--esp),background .22s,border-color .22s,box-shadow .22s}
.tile.pressing{transform:translateY(-2px) scale(.94)!important;transition:transform .08s ease}
.tglow{position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .22s}
.tile:hover .tglow{opacity:1}
.tico{position:relative;z-index:2;width:48px;height:48px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 8px rgba(0,0,0,.46));transition:filter .22s,transform .22s}
.tile:hover .tico{filter:drop-shadow(0 5px 16px rgba(0,0,0,.56)) drop-shadow(0 0 9px rgba(255,255,255,.1));transform:scale(1.08) translateY(-1px)}
.tlab{position:relative;z-index:2;font-size:10.5px;font-weight:400;letter-spacing:.6px;color:rgba(188,225,250,.52);text-transform:uppercase;transition:color .2s}
.tile:hover .tlab{color:rgba(200,235,255,.9)}

/* games section on home */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:22px 0 11px}
.sec-title{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(0,200,255,.38);font-weight:400;display:flex;align-items:center;gap:9px}
.sec-title::before{content:'';width:22px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.3))}
.sec-more{font-size:9.5px;letter-spacing:.6px;color:rgba(0,200,255,.32);cursor:pointer;transition:color .18s;padding:4px 8px;border-radius:6px}
.sec-more:hover{color:rgba(0,200,255,.72);background:rgba(0,200,255,.06)}

/* HOME GAMES - horizontal scroll strip */
.hgames{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.hgames::-webkit-scrollbar{display:none}
.hgc{
  flex-shrink:0;width:138px;border-radius:14px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.15);
  background:linear-gradient(155deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.01) 100%);
  box-shadow:0 4px 16px rgba(0,0,0,.3);transition:background .2s,border-color .2s,box-shadow .2s;will-change:transform
}
.hgc::before{content:'';position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);pointer-events:none;z-index:2}
.hgc:hover{background:linear-gradient(155deg,rgba(0,145,255,.09) 0%,rgba(0,58,175,.04) 100%);border-color:rgba(0,200,255,.2);box-shadow:0 8px 24px rgba(0,0,0,.42),0 0 14px rgba(0,155,255,.08)}
.hgc.lifted{transform:translateY(-5px) scale(1.04);transition:transform .26s var(--esp),background .2s,border-color .2s,box-shadow .2s}
.hgc.pressing{transform:scale(.96)!important;transition:transform .08s ease}
.hgc-position:relative{}
.hth{width:100%;height:70px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hth::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.38) 100%);pointer-events:none;z-index:1}
.hgi{padding:7px 10px 9px;position:relative;z-index:3}
.hgn{font-size:10.5px;font-weight:500;letter-spacing:.3px;color:rgba(218,238,255,.8);margin-bottom:2px}
.hgt{display:inline-block;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,200,255,.48);background:rgba(0,200,255,.058);border:1px solid rgba(0,200,255,.11);padding:1px 6px;border-radius:4px}

/* thumb gradients */
.t-snake{background:linear-gradient(135deg,#001e10,#003c20,#001508)}
.t-2048{background:linear-gradient(135deg,#190e00,#4c2a00,#160700)}
.t-tetris{background:linear-gradient(135deg,#000720,#001450,#000412)}
.t-pacman{background:linear-gradient(135deg,#120f00,#3c2e00,#0c0800)}
.t-brkout{background:linear-gradient(135deg,#0e001e,#320058,#080010)}
.t-flappy{background:linear-gradient(135deg,#000c18,#002c58,#00060f)}
.t-mario{background:linear-gradient(135deg,#1a0000,#5a1200,#0f0000)}
.t-chess{background:linear-gradient(135deg,#0a0a0a,#222,#060606)}
.t-doom{background:linear-gradient(135deg,#1a0000,#4a0808,#0e0000)}
.t-gd{background:linear-gradient(135deg,#080014,#22003a,#040008)}
.t-minesw{background:linear-gradient(135deg,#001822,#004060,#000e14)}
.t-slope{background:linear-gradient(135deg,#000a16,#002045,#00050d)}

/* ════════════════════════════════════════════════
   BROWSER PANEL
════════════════════════════════════════════════ */
#pb{padding:0}
#bchrome{display:flex;align-items:center;gap:7px;padding:9px 13px;background:rgba(0,0,0,.22);border-bottom:1px solid rgba(255,255,255,.058)}
.nbtn{width:30px;height:30px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink2);cursor:pointer;transition:background .14s,color .14s,transform .1s;flex-shrink:0}
.nbtn:hover{background:rgba(255,255,255,.1);color:var(--ink)}
.nbtn:active{transform:scale(.87)}
.burw{flex:1;display:flex;align-items:center;background:rgba(4,10,32,.58);border:1px solid rgba(255,255,255,.09);border-radius:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.burw:focus-within{border-color:rgba(0,200,255,.26);box-shadow:0 0 0 2px rgba(0,200,255,.07)}
.block{padding:0 7px 0 11px;color:rgba(0,200,255,.32);display:flex;align-items:center;flex-shrink:0}

/* ═══════════════════════════════════════════════
   BUILD HOME STRIP
═══════════════════════════════════════════════ */
function buildHomeStrip() {
  const strip = document.getElementById('hgstrip');
  GAMES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'hgc';
    card.style.position = 'relative';
    card.innerHTML = `
      <div class="hth ${g.cls}">${g.icon}</div>
      <div class="hgi"><div class="hgn">${g.name}</div><div class="hgt">${g.tag}</div></div>`;
    card.addEventListener('mouseenter', () => card.classList.add('lifted'));
    card.addEventListener('mouseleave', () => { card.classList.remove('lifted'); card.classList.remove('pressing'); });
    card.addEventListener('mousedown', () => { card.classList.remove('lifted'); card.classList.add('pressing'); });
    card.addEventListener('mouseup', () => { card.classList.remove('pressing'); card.classList.add('lifted'); });
    card.addEventListener('click', () => launchGame(g.url));
    strip.appendChild(card);
    addHover(card);
  });
}

/* ═══════════════════════════════════════════════
   BUILD FULL GAMES GRID
═══════════════════════════════════════════════ */
function buildGamesGrid() {
  const grid = document.getElementById('ggrid');
  GAMES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'gc';
    card.innerHTML = `
      <div class="gth ${g.cls}">${g.icon}</div>
      <div class="ginf"><div class="gn">${g.name}</div><div class="gtag">${g.tag}</div></div>`;
    card.addEventListener('mouseenter', () => card.classList.add('lifted'));
    card.addEventListener('mouseleave', () => { card.classList.remove('lifted'); card.classList.remove('pressing'); });
    card.addEventListener('mousedown', () => { card.classList.remove('lifted'); card.classList.add('pressing'); });
    card.addEventListener('mouseup', () => { card.classList.remove('pressing'); card.classList.add('lifted'); });
    card.addEventListener('click', () => launchGame(g.url));
    grid.appendChild(card);
    addHover(card);
  });
}

buildHomeStrip();

/* ═══════════════════════════════════════════════
   STARFIELD
═══════════════════════════════════════════════ */
(function(){
  const cv = document.getElementById('stCv');
  const ctx = cv.getContext('2d');
  const rs = () => { cv.width = innerWidth; cv.height = innerHeight; };
  rs(); addEventListener('resize', rs);
  const stars = Array.from({length:300}, () => ({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.12,a:Math.random()*.55+.04,t:Math.random()*100,ts:Math.random()*.014+.003,cross:Math.random()>.68}));
  const wisps = Array.from({length:6}, () => ({x:Math.random()*innerWidth,y:Math.random()*innerHeight,rx:90+Math.random()*200,ry:38+Math.random()*80,a:.007+Math.random()*.024,rot:Math.random()*Math.PI,t:Math.random()*100,ts:.001+Math.random()*.004,h:Math.random()>.5?'0,150,238':'0,78,188'}));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    wisps.forEach(w=>{w.t+=w.ts;const a=w.a*(0.5+0.5*Math.sin(w.t));ctx.save();ctx.translate(w.x,w.y);ctx.rotate(w.rot+Math.sin(w.t*.25)*.14);const g=ctx.createRadialGradient(0,0,0,0,0,w.rx);g.addColorStop(0,`rgba(${w.h},${a})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.scale(1,w.ry/w.rx);ctx.beginPath();ctx.arc(0,0,w.rx,0,Math.PI*2);ctx.fill();ctx.restore();});
    stars.forEach(s=>{s.t+=s.ts;const al=s.a*(0.35+0.65*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#c0e8ff';ctx.strokeStyle='#c0e8ff';if(s.cross){ctx.lineWidth=.55;ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}ctx.restore();});
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════════════════
   3D PARALLAX
═══════════════════════════════════════════════ */
const stage=document.getElementById('stage');
const winEl=document.getElementById('win');
const nBg=document.getElementById('nucBg');
const orbs=[document.getElementById('oa'),document.getElementById('ob'),document.getElementById('oc'),document.getElementById('od'),document.getElementById('oe')];
const orbDep=[20,14,26,10,8];
let tx=0,ty=0,sx=0,sy=0;
document.addEventListener('mousemove',e=>{tx=(e.clientX/innerWidth-.5)*2;ty=(e.clientY/innerHeight-.5)*2;});
(function raf(){
  sx+=(tx-sx)*.048;sy+=(ty-sy)*.048;
  const t=Date.now()*.001;
  stage.style.transform=`rotateX(${-sy*8}deg) rotateY(${sx*10}deg)`;
  winEl.style.transform=`translateX(${sx*4}px) translateY(${sy*2.5}px)`;
  nBg.style.transform=`translate(-50%,-50%) translateX(${sx*9}px) translateY(${sy*7}px)`;
  const floats=[Math.sin(t*.62),-Math.sin(t*.52+1.3),Math.sin(t*.78+2.4),-Math.sin(t*.98+.7),Math.sin(t*.88+3.1)];
  orbs.forEach((o,i)=>{o.style.transform=`translateY(${floats[i]*12}px) translateX(${sx*(i%2===0?-1:1)*orbDep[i]}px)`;});
  requestAnimationFrame(raf);
})();

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
const bFrame=document.getElementById('bframe');
const bEmpty=document.getElementById('bempty');
const bUrl=document.getElementById('burl');
function bg(){
  const val=bUrl.value.trim();if(!val)return;
  const url=val.includes('.')&&!val.includes(' ')?(val.startsWith('http')?val:'https://'+val):'https://search.brave.com/search?q='+encodeURIComponent(val);
  loadBrowser(url);
}
function loadBrowser(url){
  bUrl.value=url;bEmpty.style.display='none';bFrame.style.display='block';
  try{bFrame.src=__uv$config.prefix+__uv$config.encodeUrl(url);}catch(e){bFrame.src=url;}
}
function bn(a){try{if(a==='back')bFrame.contentWindow.history.back();else if(a==='fwd')bFrame.contentWindow.history.forward();else bFrame.contentWindow.location.reload();}catch(e){}}
document.getElementById('burl').addEventListener('keydown',e=>{if(e.key==='Enter')bg();});

function launchGame(url){sw('browser');setTimeout(()=>loadBrowser(url),80);}

═══════════════════════════════════════════════ */
var swR=false;
if('serviceWorker' in navigator){navigator.serviceWorker.register('/uv/uv.sw.js',{scope:'/'}).then(r=>{if(r.active){swR=true;return;}const sw=r.installing||r.waiting;if(sw)sw.addEventListener('statechange',()=>{if(sw.state==='activated')swR=true;});}).catch(()=>swR=true);}else swR=true;

/* ═══════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════ */
const ld=document.getElementById('ld');
const ldSub=document.getElementById('ldSub');
const ldSt=document.getElementById('ldSt');
const ldBar=document.getElementById('ldbar');
let ldT=null;
const seqs=[["routing signal","bypassing filter","tunneling through","signal locked","go"],["charging particle beam","bending spacetime","warping to destination","entering orbit","touchdown"],["dissolving firewall","encrypting path","bouncing signal x7","trace eliminated","you're clear"],["eating your homework","looking very studious","teacher convinced","escape velocity","free at last"]];
function startLoader(url){
  const m=seqs[Math.floor(Math.random()*seqs.length)];
  ld.classList.add('on');ldBar.style.width='0%';ldSub.textContent=m[0];ldSt.textContent=m[0];
  let step=0;const ps=[6,22,46,70,90,100],ds=[240,420,500,560,460,300];
  function next(){if(step<ps.length){ldBar.style.width=ps[step]+'%';ldSt.textContent=m[Math.min(step,m.length-1)];step++;if(step<ps.length)ldT=setTimeout(next,ds[step-1]);else ldT=setTimeout(()=>doNav(url),260);}}
  ldT=setTimeout(next,ds[0]);
}
function doNav(url){let n=0;function go(){if(swR||n++>40){try{window.location.href=__uv$config.prefix+__uv$config.encodeUrl(url);}catch(e){window.location.href=url;}}else setTimeout(go,100);}go();}
document.getElementById('ldCanc').addEventListener('click',()=>{if(ldT)clearTimeout(ldT);ld.classList.remove('on');ldBar.style.width='0%';});

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function lp(url){startLoader(url);}
function doSearch(v){if(!v.trim())return;const url=(v.includes('.')&&!v.includes(' '))?(v.startsWith('http')?v:'https://'+v):'https://search.brave.com/search?q='+encodeURIComponent(v);lp(url);}
document.getElementById('uva').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(e.target.value);});
document.getElementById('goB').addEventListener('click',()=>doSearch(document.getElementById('uva').value));
