<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>atom</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030c1a;
  --a:#00e5ff;--a2:#00ffea;--bl:#0070ff;
  --gb:rgba(255,255,255,.14);--gbt:rgba(255,255,255,.32);
  --ink:rgba(225,245,255,.93);--ink2:rgba(170,215,245,.52);--ink3:rgba(130,185,220,.3);
  --sp:cubic-bezier(.34,1.56,.64,1);--eo:cubic-bezier(.16,1,.3,1)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;cursor:none;-webkit-font-smoothing:antialiased}

/* ── CURSOR ── */
#cur{position:fixed;pointer-events:none;z-index:9999;top:0;left:0;transform:translate(-50%,-50%);mix-blend-mode:normal}
#co{position:absolute;width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,229,255,.55);transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s,background .2s;box-shadow:0 0 12px rgba(0,229,255,.15),inset 0 0 6px rgba(0,229,255,.04)}
#ci{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--a);transform:translate(-50%,-50%);box-shadow:0 0 8px var(--a),0 0 16px rgba(0,229,255,.55),0 0 28px rgba(0,229,255,.2)}
body.ch #co{width:50px;height:50px;border-color:rgba(0,229,255,.24);background:rgba(0,229,255,.038)}
body.cc #co{transform:translate(-50%,-50%) scale(.68)}
body.cc #ci{transform:translate(-50%,-50%) scale(2.2)}

/* ── DEEP SPACE BG ── */
#env{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 160% 120% at 15% 5%,  rgba(0,20,70,.95),transparent 50%),
    radial-gradient(ellipse 120% 150% at 90% 95%,  rgba(0,10,48,.9),transparent 52%),
    radial-gradient(ellipse 80%  80%  at 50% 50%,  rgba(0,6,28,.6), transparent 65%),
    radial-gradient(ellipse 200% 60%  at 50% 100%, rgba(0,40,100,.25),transparent 55%),
    #020810}
/* nebula wisps */
#neb{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.nw{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen;animation:nwdrift linear infinite}
.nw1{width:900px;height:380px;background:radial-gradient(ellipse,rgba(0,160,255,.09),transparent 68%);top:-160px;left:-120px;animation-duration:34s}
.nw2{width:640px;height:500px;background:radial-gradient(ellipse,rgba(0,80,200,.08),transparent 68%);top:15%;right:-180px;animation-duration:44s;animation-delay:-16s}
.nw3{width:780px;height:300px;background:radial-gradient(ellipse,rgba(0,180,160,.055),transparent 68%);bottom:-110px;left:22%;animation-duration:28s;animation-delay:-11s}
.nw4{width:500px;height:420px;background:radial-gradient(ellipse,rgba(60,0,160,.06),transparent 68%);top:30%;left:-100px;animation-duration:38s;animation-delay:-5s}
@keyframes nwdrift{0%{transform:translate(0,0) rotate(0deg);opacity:.55}33%{transform:translate(50px,-35px) rotate(6deg);opacity:1}66%{transform:translate(-30px,25px) rotate(-4deg);opacity:.68}100%{transform:translate(0,0) rotate(0deg);opacity:.55}}
canvas#sc{position:fixed;inset:0;z-index:2}

/* ── NUCLEUS ── */
#nuc{position:fixed;z-index:3;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);width:1100px;height:1100px;will-change:transform}
.or{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(0,200,255,.05)}
.or::after{content:'';position:absolute;border-radius:50%;top:50%;left:0;transform:translate(-50%,-50%);background:radial-gradient(circle at 33% 28%,rgba(210,252,255,.95),rgba(0,210,255,.7) 46%,rgba(0,88,155,.25));box-shadow:0 0 14px rgba(0,225,255,.92),0 0 28px rgba(0,185,255,.5),0 0 50px rgba(0,145,255,.18)}
.o1{width:420px;height:146px;margin:-73px 0 0 -210px;animation:os1 5.4s linear infinite}.o1::after{width:10px;height:10px}
.o2{width:360px;height:125px;margin:-62px 0 0 -180px;border-style:dashed;border-color:rgba(0,200,255,.038);animation:os2 4s linear infinite}.o2::after{width:7px;height:7px}
.o3{width:490px;height:172px;margin:-86px 0 0 -245px;animation:os3 7.4s linear infinite}.o3::after{width:6px;height:6px}
.o4{width:295px;height:103px;margin:-51px 0 0 -147px;border-color:rgba(0,225,255,.042);animation:os1 2.9s linear infinite reverse}.o4::after{width:5px;height:5px}
@keyframes os1{from{transform:rotateX(72deg) rotateZ(0)}to{transform:rotateX(72deg) rotateZ(360deg)}}
@keyframes os2{from{transform:rotateX(72deg) rotateZ(60deg)}to{transform:rotateX(72deg) rotateZ(420deg)}}
@keyframes os3{from{transform:rotateX(72deg) rotateZ(-40deg)}to{transform:rotateX(72deg) rotateZ(320deg)}}
#nc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 33% 28%,#dff8ff,#00ccff 40%,#004e90);box-shadow:0 0 24px rgba(0,215,255,.88),0 0 58px rgba(0,175,255,.44),0 0 120px rgba(0,135,255,.15);animation:ncp 3.8s ease-in-out infinite}
@keyframes ncp{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.4);box-shadow:0 0 36px rgba(0,225,255,1),0 0 80px rgba(0,185,255,.65),0 0 160px rgba(0,145,255,.22)}}

/* ── GLASS ORBS ── */
.gorb{position:fixed;border-radius:50%;pointer-events:none;z-index:4;
  background:
    radial-gradient(circle at 32% 26%,rgba(255,255,255,.62) 0%,rgba(255,255,255,.15) 18%,transparent 48%),
    radial-gradient(circle at 65% 70%,rgba(0,120,200,.1),transparent 42%),
    radial-gradient(circle at 50% 50%,rgba(0,180,255,.09),rgba(0,62,168,.22) 56%,rgba(0,14,58,.42) 100%);
  border:1px solid rgba(255,255,255,.22);
  box-shadow:inset 0 1.5px 3px rgba(255,255,255,.48),0 16px 48px rgba(0,0,0,.6),0 0 30px rgba(0,130,255,.07)}
.gorb::after{content:'';position:absolute;bottom:13%;left:50%;transform:translateX(-50%);width:42%;height:7%;border-radius:50%;background:rgba(0,200,255,.055);filter:blur(5px)}
#oa{width:120px;height:120px;top:6vh;right:10vw}
#ob{width:70px;height:70px;bottom:15vh;right:8vw}
#oc{width:50px;height:50px;top:18vh;left:9vw}
#od{width:30px;height:30px;bottom:26vh;left:15vw}
#oe{width:20px;height:20px;top:48vh;right:22vw}

/* ── SCENE ── */
#scene{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;perspective:1800px;perspective-origin:50% 46%}
#stage{position:relative;transform-style:preserve-3d;will-change:transform}

/* ── WINDOW ── */
#win{
  width:760px;border-radius:24px;position:relative;transform-style:preserve-3d;overflow:hidden;
  background:linear-gradient(158deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.032) 30%,rgba(0,50,148,.09) 68%,rgba(0,22,82,.065) 100%);
  backdrop-filter:blur(56px) saturate(2.4) brightness(1.07);-webkit-backdrop-filter:blur(56px) saturate(2.4) brightness(1.07);
  border:1px solid var(--gb);border-top:1px solid var(--gbt);border-left:1px solid rgba(255,255,255,.22);
  box-shadow:
    0 1px 0 rgba(255,255,255,.15) inset,0 -1px 0 rgba(0,0,0,.22) inset,1px 0 0 rgba(255,255,255,.065) inset,
    0 60px 140px rgba(0,0,0,.72),0 24px 60px rgba(0,0,0,.44),0 8px 24px rgba(0,0,0,.34),
    0 0 80px rgba(0,100,238,.11),0 0 0 1px rgba(0,190,255,.058);
  animation:winIn .9s var(--eo) both
}
@keyframes winIn{from{opacity:0;transform:translateY(24px) scale(.966)}to{opacity:1;transform:none}}
#win::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:24px 24px 85% 85%;background:linear-gradient(180deg,rgba(255,255,255,.11) 0%,transparent 100%);pointer-events:none;z-index:0}
#win::after{content:'';position:absolute;bottom:0;left:0;right:0;height:35%;border-radius:0 0 24px 24px;background:linear-gradient(0deg,rgba(0,8,32,.3) 0%,transparent 100%);pointer-events:none;z-index:0}

/* ── TITLEBAR ── */
#tb{display:flex;align-items:center;height:48px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.065);position:relative;z-index:20;gap:10px;user-select:none;flex-shrink:0}
.tlw{display:flex;gap:7px;align-items:center;flex-shrink:0}
.tl{width:13px;height:13px;border-radius:50%;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.42),inset 0 -1px 0 rgba(0,0,0,.28);transition:filter .14s}
.tl:hover{filter:brightness(1.35)}.tlr{background:linear-gradient(155deg,#ff6868,#e02e36)}.tly{background:linear-gradient(155deg,#ffd066,#e09522)}.tlg{background:linear-gradient(155deg,#6adf88,#2eb654)}
#tabs{display:flex;gap:2px;flex:1;justify-content:center}
.tab{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:10px;font-size:12px;font-weight:400;letter-spacing:.35px;color:var(--ink3);cursor:pointer;transition:background .16s,color .16s;white-space:nowrap;position:relative}
.tab:hover{color:var(--ink2);background:rgba(255,255,255,.044)}
.tab.on{color:var(--ink);background:rgba(255,255,255,.082);box-shadow:0 1px 0 rgba(255,255,255,.1) inset,0 -1px 0 rgba(0,0,0,.14) inset}
.ti{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:0;height:2px;background:linear-gradient(90deg,transparent,var(--a),transparent);border-radius:2px;transition:width .24s var(--sp)}
.tab.on .ti{width:58%}
#clk{font-size:10.5px;letter-spacing:1.3px;color:rgba(0,210,255,.26);font-weight:300;flex-shrink:0}

/* ── PANELS ── */
#pw{position:relative;overflow:hidden}
.pn{display:none;animation:pnIn .3s var(--eo) both}
.pn.on{display:block}
@keyframes pnIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}

/* ═══════════ HOME ═══════════ */
#ph{padding:26px 30px 28px}
.wm{font-family:'Syne',sans-serif;font-weight:800;font-size:96px;letter-spacing:28px;text-indent:28px;color:transparent;
  background:linear-gradient(170deg,#fff 0%,#cef2ff 16%,#74dcff 42%,#22b2f8 70%,#0078e6 100%);
  -webkit-background-clip:text;background-clip:text;line-height:1;display:block;
  filter:drop-shadow(0 0 30px rgba(0,200,255,.48)) drop-shadow(0 4px 16px rgba(0,0,0,.55));
  animation:wb 6s ease-in-out infinite}
@keyframes wb{0%,100%{filter:drop-shadow(0 0 26px rgba(0,200,255,.44)) drop-shadow(0 4px 16px rgba(0,0,0,.55))}50%{filter:drop-shadow(0 0 46px rgba(0,225,255,.76)) drop-shadow(0 4px 16px rgba(0,0,0,.55))}}
.badge{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:5px 16px;border-radius:24px;background:rgba(0,205,255,.065);border:1px solid rgba(0,205,255,.15);font-size:9.5px;letter-spacing:3.5px;color:rgba(0,215,255,.48);text-transform:uppercase}
.bd{width:5px;height:5px;border-radius:50%;background:rgba(0,225,255,.65);box-shadow:0 0 7px rgba(0,225,255,.85);animation:bdp 2.2s ease-in-out infinite}
@keyframes bdp{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
.rule{position:relative;height:1px;margin:18px 0 16px;background:linear-gradient(90deg,transparent,rgba(0,205,255,.22) 15%,rgba(255,255,255,.14) 50%,rgba(0,205,255,.22) 85%,transparent)}
.rule::before{content:'⚛';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#061426;padding:0 10px;font-size:11px;color:rgba(0,205,255,.36)}
#sub{font-style:italic;font-weight:300;font-size:12.5px;letter-spacing:.9px;color:rgba(165,218,244,.38);text-align:center;min-height:20px;margin-bottom:22px}
#sub::after{content:'|';color:rgba(0,212,255,.65);animation:bl 1s step-end infinite;margin-left:1px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* search */
.sz{margin-bottom:20px}
.sf{display:flex;align-items:center;border-radius:15px;overflow:hidden;background:rgba(4,11,34,.62);border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.18);box-shadow:0 2px 0 rgba(255,255,255,.055) inset,0 -2px 8px rgba(0,0,0,.3) inset,0 8px 28px rgba(0,0,0,.4);transition:border-color .24s,box-shadow .24s}
.sz:focus-within .sf{border-color:rgba(0,205,255,.3);border-top-color:rgba(0,205,255,.42);box-shadow:0 2px 0 rgba(0,205,255,.07) inset,0 -2px 8px rgba(0,0,0,.3) inset,0 8px 28px rgba(0,0,0,.4),0 0 0 3.5px rgba(0,205,255,.08),0 0 36px rgba(0,185,255,.06)}
.si{padding:0 4px 0 18px;display:flex;align-items:center;color:rgba(0,205,255,.36);flex-shrink:0;transition:color .2s}
.sz:focus-within .si{color:rgba(0,205,255,.7)}
#uva{flex:1;background:transparent;border:none;padding:14px 16px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:300;letter-spacing:.2px;color:rgba(228,245,255,.92)}
#uva::placeholder{color:rgba(255,255,255,.18)}
#uva:focus{outline:none}
.gb{margin:6px;padding:11px 26px;border:none;border-radius:11px;background:linear-gradient(138deg,#005ee0,#00a8ff);color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;letter-spacing:.4px;cursor:pointer;flex-shrink:0;box-shadow:0 1px 0 rgba(255,255,255,.22) inset,0 -1px 0 rgba(0,0,0,.32) inset,0 4px 20px rgba(0,98,220,.54);transition:background .15s,box-shadow .15s,transform .1s}
.gb:hover{background:linear-gradient(138deg,#0078ff,#00c8ff);box-shadow:0 1px 0 rgba(255,255,255,.26) inset,0 -1px 0 rgba(0,0,0,.32) inset,0 6px 26px rgba(0,124,255,.65)}
.gb:active{transform:scale(.92)}

/* quick tiles */
.tlbl{font-size:8.5px;letter-spacing:2.8px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;display:flex;align-items:center;gap:9px}
.tlbl::before,.tlbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent)}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.tile{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px 8px 14px;border-radius:18px;text-decoration:none;cursor:pointer;overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,.075) 0%,rgba(255,255,255,.022) 100%);
  border:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.17);
  box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 -1px 0 rgba(0,0,0,.17) inset,0 6px 22px rgba(0,0,0,.34);
  transition:background .22s,border-color .22s,box-shadow .22s;will-change:transform}
.tile::before{content:'';position:absolute;top:0;left:0;right:0;height:44%;border-radius:18px 18px 64% 64%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;z-index:1}
.tile:hover{background:linear-gradient(160deg,rgba(0,162,255,.12) 0%,rgba(0,78,202,.058) 100%);border-color:rgba(0,205,255,.24);box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 -1px 0 rgba(0,0,0,.17) inset,0 16px 36px rgba(0,0,0,.44),0 0 24px rgba(0,172,255,.11)}
.tile.lf{transform:translateY(-9px) scale(1.07);transition:transform .28s var(--sp),background .22s,border-color .22s,box-shadow .22s}
.tile.pr{transform:translateY(-2px) scale(.93)!important;transition:transform .08s ease}
.tgw{position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .22s}
.tile:hover .tgw{opacity:1}
.tic{position:relative;z-index:2;width:48px;height:48px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 9px rgba(0,0,0,.48));transition:filter .22s,transform .22s}
.tile:hover .tic{filter:drop-shadow(0 5px 17px rgba(0,0,0,.58)) drop-shadow(0 0 9px rgba(255,255,255,.1));transform:scale(1.09) translateY(-1px)}
.tlab{position:relative;z-index:2;font-size:10.5px;font-weight:400;letter-spacing:.6px;color:rgba(185,225,250,.52);text-transform:uppercase;transition:color .2s}
.tile:hover .tlab{color:rgba(200,238,255,.92)}

/* home games strip */
.shdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.stit{font-size:8.5px;letter-spacing:2.8px;text-transform:uppercase;color:rgba(0,205,255,.36);display:flex;align-items:center;gap:8px}
.stit::before{content:'';width:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,205,255,.3))}
.smore{font-size:9.5px;color:rgba(0,205,255,.3);cursor:pointer;transition:color .18s;padding:3px 8px;border-radius:6px}
.smore:hover{color:rgba(0,205,255,.72);background:rgba(0,205,255,.06)}
.hgames{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
.hgames::-webkit-scrollbar{display:none}
.hgc{flex-shrink:0;width:132px;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;
  border:1px solid rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.15);
  background:linear-gradient(155deg,rgba(255,255,255,.05),rgba(255,255,255,.01));
  box-shadow:0 4px 18px rgba(0,0,0,.32);transition:background .2s,border-color .2s,box-shadow .2s;will-change:transform}
.hgc::before{content:'';position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);pointer-events:none;z-index:2}
.hgc:hover{background:linear-gradient(155deg,rgba(0,148,255,.1),rgba(0,60,182,.045));border-color:rgba(0,205,255,.2);box-shadow:0 8px 26px rgba(0,0,0,.44),0 0 16px rgba(0,158,255,.09)}
.hgc.lf{transform:translateY(-5px) scale(1.045);transition:transform .26s var(--sp),background .2s,border-color .2s,box-shadow .2s}
.hgc.pr{transform:scale(.95)!important;transition:transform .08s ease}
.hth{width:100%;height:68px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hth::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 44%,rgba(0,0,0,.4) 100%);pointer-events:none;z-index:1}
.hgi{padding:6px 9px 8px;position:relative;z-index:3}
.hgn{font-size:10px;font-weight:500;letter-spacing:.3px;color:rgba(215,238,255,.8);margin-bottom:2px}
.hgt{font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(0,205,255,.46);background:rgba(0,205,255,.055);border:1px solid rgba(0,205,255,.1);padding:1px 5px;border-radius:4px;display:inline-block}

/* thumb bgs */
.ts{background:linear-gradient(135deg,#001e10,#003d22,#001508)}
.t2{background:linear-gradient(135deg,#190f00,#4e2c00,#150700)}
.tt{background:linear-gradient(135deg,#000720,#001558,#000415)}
.tp{background:linear-gradient(135deg,#130f00,#3e3000,#0d0900)}
.tf{background:linear-gradient(135deg,#000c18,#002e5e,#000710)}
.tb{background:linear-gradient(135deg,#0f0022,#340060,#090014)}
.tm{background:linear-gradient(135deg,#1a0000,#5c1400,#100000)}
.tch{background:linear-gradient(135deg,#080808,#1e1e1e,#050505)}
.tgd{background:linear-gradient(135deg,#080016,#240040,#040009)}
.tms{background:linear-gradient(135deg,#001a25,#00426a,#000f14)}
.tsl{background:linear-gradient(135deg,#000b16,#002248,#00060e)}
.tw{background:linear-gradient(135deg,#0a1200,#263600,#060900)}

/* ═══════════ BROWSER ═══════════ */
#pbr{padding:0}
#bch{display:flex;align-items:center;gap:7px;padding:9px 13px;background:rgba(0,0,0,.24);border-bottom:1px solid rgba(255,255,255,.058)}
.nb{width:30px;height:30px;background:rgba(255,255,255,.052);border:1px solid rgba(255,255,255,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink2);cursor:pointer;transition:background .14s,color .14s,transform .1s;flex-shrink:0}
.nb:hover{background:rgba(255,255,255,.1);color:var(--ink)}.nb:active{transform:scale(.85)}
.burw{flex:1;display:flex;align-items:center;background:rgba(4,11,34,.6);border:1px solid rgba(255,255,255,.09);border-radius:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.burw:focus-within{border-color:rgba(0,205,255,.28);box-shadow:0 0 0 2.5px rgba(0,205,255,.08)}
.bl{padding:0 7px 0 11px;color:rgba(0,205,255,.3);display:flex;align-items:center;flex-shrink:0}
#burl{flex:1;background:transparent;border:none;padding:7.5px 8px 7.5px 0;font-family:'Outfit',sans-serif;font-size:13px;font-weight:300;color:rgba(222,242,255,.84);letter-spacing:.1px}
#burl:focus{outline:none}

/* ─── BUILD UI ─────────────────────────────────────────── */
function mkCard(cfg,isSmall){
  const d=document.createElement('div');
  d.className=isSmall?'hgc':'gc';
  d.innerHTML=`<div class="${isSmall?'hth':'gth'} ${cfg.c}">${cfg.i}</div><div class="${isSmall?'hgi':'gi'}"><div class="${isSmall?'hgn':'gn'}">${cfg.n}</div><div class="${isSmall?'hgt':'gtag'}">${cfg.t}</div></div>`;
  d.addEventListener('mouseenter',()=>{d.classList.add('lf');addHov(d)});
  d.addEventListener('mouseleave',()=>{d.classList.remove('lf','pr');});
  d.addEventListener('mousedown',()=>{d.classList.remove('lf');d.classList.add('pr');});
  d.addEventListener('mouseup',()=>{d.classList.remove('pr');d.classList.add('lf');});
  d.addEventListener('click',()=>lgame(cfg.u));
  return d;
}
function mkTile(q){
  const d=document.createElement('a');d.href='#';d.className='tile';
  d.onclick=e=>{e.preventDefault();lp(q.u)};
  d.innerHTML=`<div class="tgw" style="background:radial-gradient(circle at 50% 80%,${q.gc},transparent 70%)"></div><div class="tic">${q.i}</div><span class="tlab">${q.n}</span>`;
  ['mouseenter','mouseleave','mousedown','mouseup'].forEach(ev=>d.addEventListener(ev,e=>{
    if(ev==='mouseenter'){d.classList.add('lf');addHov(d);}
    else if(ev==='mouseleave'){d.classList.remove('lf','pr');}
    else if(ev==='mousedown'){d.classList.remove('lf');d.classList.add('pr');}
    else{d.classList.remove('pr');d.classList.add('lf');}
  }));
  return d;
}

/* ─── STARFIELD ──────────────────────────────────────────── */
(()=>{
  const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  const rs=()=>{cv.width=innerWidth;cv.height=innerHeight};rs();addEventListener('resize',rs);
  const st=Array.from({length:340},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+.1,a:Math.random()*.58+.04,t:Math.random()*100,ts:Math.random()*.014+.003,cx:Math.random()>.7}));
  const ws=Array.from({length:7},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,rx:80+Math.random()*220,ry:35+Math.random()*90,a:.006+Math.random()*.026,rot:Math.random()*Math.PI,t:Math.random()*100,ts:.001+Math.random()*.004,h:['0,145,235','0,72,185','0,168,152','50,0,155'][Math.random()*4|0]}));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ws.forEach(w=>{w.t+=w.ts;const a=w.a*(.5+.5*Math.sin(w.t));ctx.save();ctx.translate(w.x,w.y);ctx.rotate(w.rot+Math.sin(w.t*.25)*.15);const g=ctx.createRadialGradient(0,0,0,0,0,w.rx);g.addColorStop(0,`rgba(${w.h},${a})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.scale(1,w.ry/w.rx);ctx.beginPath();ctx.arc(0,0,w.rx,0,Math.PI*2);ctx.fill();ctx.restore()});
    st.forEach(s=>{s.t+=s.ts;const al=s.a*(.35+.65*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle=ctx.strokeStyle='#c2eaff';if(s.cx){ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}ctx.restore()});
    requestAnimationFrame(draw);
  }draw();
})();
