<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --border: rgba(255, 255, 255, 0.08);
  --border-h: rgba(255, 255, 255, 0.2);
  --text: #ededed;
  --text-dim: #666666;
  --accent: #ffffff;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; -webkit-user-drag: none; cursor: default; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ─── AMBIENT BACKGROUND ─── */
#void-bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% 120%, #1a1a1a 0%, #000 70%);
  opacity: 1; transition: opacity 0.8s var(--ease);
}
#particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.4; }

/* ─── UI LAYER ─── */
#interface {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  transition: transform 0.6s var(--ease), opacity 0.6s var(--ease);
}

/* ─── TOP BAR ─── */
#status {
  height: 40px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
  color: var(--text-dim); z-index: 20;
}
.st-group { display: flex; gap: 20px; }
.st-item { transition: 0.2s; cursor: pointer; }
.st-item:hover { color: var(--text); }

/* ─── MAIN VIEW ─── */
#home {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 1; transform: scale(1); transition: 0.5s var(--ease);
}
.hidden { opacity: 0!important; pointer-events: none; transform: scale(0.95)!important; }

/* ─── HERO SECTION ─── */
h1 {
  font-family: 'Inter'; font-weight: 600; font-size: 64px; letter-spacing: -3px;
  margin-bottom: 40px; color: #fff;
}
.search-container {
  position: relative; width: 420px; margin-bottom: 60px;
}
.search-in {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  padding: 16px 20px; border-radius: 12px;
  color: #fff; font-family: 'Inter'; font-size: 14px; text-align: center;
  transition: 0.3s var(--ease);
}
.search-in:focus { border-color: var(--border-h); width: 440px; margin-left: -10px; }
.search-in::placeholder { color: #333; }

/* ─── APP GRID ─── */
.grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px;
  padding: 20px; perspective: 1000px;
}
.icon {
  width: 72px; height: 72px; border-radius: 18px;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: 0.4s var(--ease);
}
.icon:hover {
  background: #151515; border-color: var(--border-h);
  transform: translateY(-8px) translateZ(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.8);
  z-index: 10;
}
.icon svg, .icon img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
.icon-lbl {
  position: absolute; bottom: -24px; font-size: 10px; color: #555; font-weight: 500;
  opacity: 0; transition: 0.2s; pointer-events: none; white-space: nowrap;
}
.icon:hover .icon-lbl { opacity: 1; transform: translateY(5px); }

/* ─── FULLSCREEN APP WINDOW ─── */
#app-window {
  position: fixed; inset: 0; z-index: 50;
  background: #000;
  transform: translateY(100vh); transition: transform 0.6s var(--ease);
  display: flex; flex-direction: column;
}
#app-window.active { transform: translateY(0); }

.win-bar {
  height: 40px; background: #000; border-bottom: 1px solid #151515;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 2;
}
.win-title { font-family: 'JetBrains Mono'; font-size: 11px; color: #444; text-transform: uppercase; }
.win-ctrls { display: flex; gap: 8px; }
.ctrl {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: #666; cursor: pointer; transition: 0.2s;
}
.ctrl:hover { border-color: #fff; color: #fff; background: #111; }

#app-content { flex: 1; position: relative; }
iframe { width: 100%; height: 100%; border: none; background: #000; }
#loader {
  position: absolute; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 5; transition: opacity 0.5s; pointer-events: none;
}
.load-bar {
  width: 150px; height: 2px; background: #111; margin-top: 20px;
  overflow: hidden; position: relative;
}
.load-fill {
  position: absolute; top: 0; left: 0; height: 100%; width: 50%; background: #fff;
  animation: load 1.5s infinite ease-in-out;
}
@keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

/* ─── CUSTOM CURSOR ─── */
#cursor {
  position: fixed; top: 0; left: 0; width: 12px; height: 12px;
  border: 1px solid rgba(255,255,255,0.8); border-radius: 50%;
  transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
  mix-blend-mode: difference; transition: width 0.3s, height 0.3s;
}
body.hover #cursor { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-color: transparent; }

  <div id="home">

    <div class="search-container">

];

/* ─── SYSTEM LOGIC ─── */
const grid = document.getElementById('icon-grid');
const win = document.getElementById('app-window');
const home = document.getElementById('home');
const frame = document.getElementById('frame');
const loader = document.getElementById('loader');
const wTit = document.getElementById('win-tit');
let activeUrl = '';

// Generate Icons
APPS.forEach(app => {
  const el = document.createElement('div');
  el.className = 'icon';
  el.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor">${app.i}</svg><div class="icon-lbl">${app.n}</div>`;
  el.onclick = () => openApp(app);
  grid.appendChild(el);
});

function openApp(app) {
  // Transition
  home.classList.add('hidden');
  win.classList.add('active');
  loader.style.opacity = '1';
  wTit.innerText = app.n.toUpperCase();
  activeUrl = app.u;

  // URL Handling
  setTimeout(() => {
    // If embedding is active, use UV Proxy unless marked direct
    let target = app.u;
    if (!app.direct) {
      try {
        if(window.__uv$config) target = __uv$config.prefix + __uv$config.encodeUrl(app.u);
      } catch(e) { console.warn('Proxy Config Missing'); }
    }
    frame.src = target;
    
    // Hide loader after a bit
    frame.onload = () => loader.style.opacity = '0';
    // Fallback timer for loader
    setTimeout(() => loader.style.opacity = '0', 3000);
  }, 600);
}

function closeApp() {
  win.classList.remove('active');
  home.classList.remove('hidden');
  setTimeout(() => { frame.src = 'about:blank'; }, 600);
}

function reloadApp() { frame.contentWindow.location.reload(); }
function popApp() { window.open(activeUrl, '_blank'); }

// Search
document.getElementById('search').addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    const val = e.target.value;
    const url = val.includes('.') ? (val.startsWith('http') ? val : 'https://'+val) : 'https://search.brave.com/search?q='+encodeURIComponent(val);
    openApp({ n: 'Browser', u: url, direct: false });
  }
});

// Cursor & Clock
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cur.style.top = e.clientY+'px'; cur.style.left = e.clientX+'px'; });
document.querySelectorAll('.icon, .ctrl, .st-item, input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hover'));
});
setInterval(() => document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 1000);

/* ─── PARTICLES ─── */
const cv = document.getElementById('particles'), ctx = cv.getContext('2d');
let w, h, p = [];
const resize = () => { w=cv.width=innerWidth; h=cv.height=innerHeight; };
window.addEventListener('resize', resize); resize();

for(let i=0; i<60; i++) p.push({x:Math.random()*w, y:Math.random()*h, s:Math.random()*2, vx:(Math.random()-.5)*0.5, vy:(Math.random()-.5)*0.5});

function anim() {
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#fff';
  p.forEach(pt => {
    pt.x += pt.vx; pt.y += pt.vy;
    if(pt.x<0) pt.x=w; if(pt.x>w) pt.x=0;
    if(pt.y<0) pt.y=h; if(pt.y>h) pt.y=0;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.s, 0, Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();
