<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>atom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050709;
  --s1:#0a0d13;
  --s2:#0e1119;
  --b0:rgba(255,255,255,.04);
  --b1:rgba(255,255,255,.08);
  --b2:rgba(255,255,255,.13);
  --d0:rgba(255,255,255,.15);
  --d1:rgba(255,255,255,.35);
  --d2:rgba(255,255,255,.65);
  --d3:rgba(255,255,255,.9);
  --a:#5b9cf6;
  --a2:rgba(91,156,246,.12);
  --a3:rgba(91,156,246,.25);
  --mono:'DM Mono',monospace;
  --serif:'Cormorant Garamond',serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);cursor:none;-webkit-font-smoothing:antialiased}

/* cursor */
#cur{position:fixed;pointer-events:none;z-index:9999;top:0;left:0}
#co{position:absolute;width:18px;height:18px;border-radius:50%;border:1px solid rgba(91,156,246,.45);transform:translate(-50%,-50%);transition:width .2s var(--ease),height .2s var(--ease),border-color .2s,opacity .2s}
#ci{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--a);transform:translate(-50%,-50%);transition:transform .1s}
body.ch #co{width:32px;height:32px;border-color:rgba(91,156,246,.25)}
body.cc #ci{transform:translate(-50%,-50%) scale(2.5)}
body.cc #co{transform:translate(-50%,-50%) scale(.8)}

/* canvas bg */
canvas#sc{position:fixed;inset:0;z-index:0}

/* full layout */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}

/* TOPBAR */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;flex-shrink:0;
  border-bottom:1px solid var(--b0);
  background:rgba(5,7,9,.6);
  backdrop-filter:blur(24px);
}
.logo{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--d2);letter-spacing:.5px;line-height:1}
.logo sup{font-size:9px;font-family:var(--mono);font-style:normal;letter-spacing:2px;color:var(--a);opacity:.7;vertical-align:top;margin-top:4px;margin-left:4px}
#nav{display:flex;align-items:center;gap:2px}
.ntab{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--d0);cursor:pointer;transition:color .15s,background .15s;border:1px solid transparent}
.ntab:hover{color:var(--d1);background:var(--b0)}
.ntab.on{color:var(--d2);background:var(--b1);border-color:var(--b1)}
.ntab svg{flex-shrink:0}
#topright{display:flex;align-items:center;gap:16px}
#clk{font-size:10px;letter-spacing:.5px;color:var(--d0);font-variant-numeric:tabular-nums}
.tldots{display:flex;gap:5px}
.tl{width:10px;height:10px;border-radius:50%;cursor:pointer;opacity:.55;transition:opacity .15s}
.tl:hover{opacity:.9}
.tlr{background:#d9534f}.tly{background:#c9962a}.tlg{background:#5ba85b}

/* CONTENT */
#content{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;display:none;animation:viewIn .3s var(--ease) both}
.view.on{display:flex;flex-direction:column}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* HOME VIEW */
#vh{align-items:center;justify-content:center}
.home-inner{width:100%;max-width:620px;padding:0 24px}

.hero{text-align:center;margin-bottom:52px}
.hero-name{font-family:var(--serif);font-style:italic;font-size:clamp(72px,10vw,110px);color:transparent;
  background:linear-gradient(175deg,rgba(255,255,255,.92) 0%,rgba(180,210,255,.55) 55%,rgba(91,156,246,.3) 100%);
  -webkit-background-clip:text;background-clip:text;line-height:.95;letter-spacing:-2px;
  animation:fadeUp .8s var(--ease) both}
.hero-sub{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--d0);margin-top:16px;
  animation:fadeUp .8s var(--ease) .1s both;min-height:16px;font-style:italic}
.hero-sub::after{content:'▋';color:rgba(91,156,246,.5);animation:blink 1.1s step-end infinite;font-size:8px;margin-left:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* search */
.search-wrap{animation:fadeUp .8s var(--ease) .2s both;margin-bottom:40px}
.search-bar{display:flex;align-items:center;background:var(--s2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.search-bar:focus-within{border-color:rgba(91,156,246,.3);box-shadow:0 0 0 4px rgba(91,156,246,.05),0 20px 60px rgba(0,0,0,.4)}
.s-icon{padding:0 14px;color:var(--d0);display:flex;flex-shrink:0;transition:color .2s}
.search-bar:focus-within .s-icon{color:var(--a)}
#uva{flex:1;background:transparent;border:none;padding:16px 10px;font-family:var(--mono);font-size:14px;font-weight:300;color:var(--d3);letter-spacing:.2px}
#uva::placeholder{color:rgba(255,255,255,.12)}
#uva:focus{outline:none}
.s-btn{margin:6px;padding:11px 24px;border:none;border-radius:8px;background:var(--a2);color:var(--a);font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;flex-shrink:0;border:1px solid var(--a3);transition:background .15s,color .15s,box-shadow .15s}
.s-btn:hover{background:rgba(91,156,246,.2);color:#fff;box-shadow:0 4px 20px rgba(91,156,246,.15)}
.s-btn:active{transform:scale(.95)}

/* sections */
.section{animation:fadeUp .8s var(--ease) .3s both}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--d0)}
.sec-more{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--d0);cursor:pointer;transition:color .15s;padding:4px 0}
.sec-more:hover{color:var(--a)}

.qtiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 8px 16px;border-radius:13px;cursor:pointer;
  background:var(--s1);border:1px solid var(--b0);
  transition:background .18s,border-color .18s,transform .22s var(--spring),box-shadow .22s}
.tile:hover{background:var(--s2);border-color:var(--b1);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.tile:active{transform:translateY(-1px) scale(.97)}
.tlab{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--d0);transition:color .15s}
.tile:hover .tlab{color:var(--d1)}

.gstrip{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.gstrip::-webkit-scrollbar{display:none}
.gcard{flex-shrink:0;width:130px;border-radius:12px;overflow:hidden;cursor:pointer;
  background:var(--s1);border:1px solid var(--b0);
  transition:background .18s,border-color .18s,transform .22s var(--spring),box-shadow .22s}
.gcard:hover{background:var(--s2);border-color:var(--b1);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.gcard:active{transform:scale(.96)}
.gth{width:100%;height:66px;display:flex;align-items:center;justify-content:center}
.ginfo{padding:7px 10px 9px}
.gname{font-size:10px;letter-spacing:.3px;color:var(--d1);margin-bottom:2px}
.gtag{font-size:7.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--d0)}

.ts{background:linear-gradient(140deg,#001e10,#003d22)}.t2{background:linear-gradient(140deg,#190f00,#4e2c00)}.tt{background:linear-gradient(140deg,#000720,#001558)}.tp{background:linear-gradient(140deg,#130f00,#3e3000)}.tf{background:linear-gradient(140deg,#000c18,#002e5e)}.tb{background:linear-gradient(140deg,#0f0022,#340060)}.tm{background:linear-gradient(140deg,#1a0000,#5c1400)}.tch{background:linear-gradient(140deg,#080808,#242424)}.tgd{background:linear-gradient(140deg,#080016,#240040)}.tms{background:linear-gradient(140deg,#001a25,#003a60)}.tsl{background:linear-gradient(140deg,#000b16,#002248)}.tw{background:linear-gradient(140deg,#0a1200,#263600)}

/* BROWSER VIEW */
#vbr{flex-direction:column}
#bbar{display:flex;align-items:center;gap:7px;padding:10px 16px;border-bottom:1px solid var(--b0);flex-shrink:0;background:rgba(5,7,9,.5)}
.nbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--b0);border:1px solid var(--b0);border-radius:8px;color:var(--d0);cursor:pointer;transition:background .14s,color .14s,border-color .14s;flex-shrink:0}
.nbtn:hover{background:var(--b1);border-color:var(--b1);color:var(--d1)}
.nbtn:active{transform:scale(.88)}
.url-bar{flex:1;display:flex;align-items:center;background:var(--s2);border:1px solid var(--b1);border-radius:9px;overflow:hidden;transition:border-color .2s}
.url-bar:focus-within{border-color:rgba(91,156,246,.25);box-shadow:0 0 0 3px rgba(91,156,246,.05)}
.url-ico{padding:0 10px 0 12px;color:var(--d0);display:flex;flex-shrink:0}
#burl{flex:1;background:transparent;border:none;padding:8px 6px;font-family:var(--mono);font-size:12.5px;font-weight:300;color:var(--d2)}
#burl:focus{outline:none}
.url-go{margin:4px;padding:7px 16px;background:var(--a2);border:1px solid var(--a3);border-radius:6px;color:var(--a);font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .14s;flex-shrink:0}
.url-go:hover{background:rgba(91,156,246,.22)}
#bframe{flex:1;position:relative;background:#04060a}
#bf{width:100%;height:100%;border:none;display:none}
#bempty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-ring{width:40px;height:40px;border-radius:50%;border:1px solid var(--b1);display:flex;align-items:center;justify-content:center}
.empty-ring svg{opacity:.3}
.empty-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--d0)}

/* GAMES VIEW */
#vgm{padding:28px 32px;overflow-y:auto}
#vgm::-webkit-scrollbar{width:4px}
#vgm::-webkit-scrollbar-track{background:transparent}
#vgm::-webkit-scrollbar-thumb{background:var(--b1);border-radius:4px}
.games-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.games-title{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--d1)}
.games-count{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--d0)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.gc2{border-radius:12px;overflow:hidden;cursor:pointer;
  background:var(--s1);border:1px solid var(--b0);
  transition:background .18s,border-color .18s,transform .22s var(--spring),box-shadow .22s}
.gc2:hover{background:var(--s2);border-color:var(--b1);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.gc2:active{transform:scale(.96)}
.gc2 .gth{height:70px}
.gc2 .ginfo{padding:8px 10px 10px}
.gc2 .gname{font-size:10.5px}

/* LOADER */
#ld{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(5,7,9,.92);backdrop-filter:blur(24px);opacity:0;pointer-events:none;transition:opacity .22s var(--ease)}
#ld.on{opacity:1;pointer-events:all}
.ld-box{width:300px;text-align:center}
.ld-ring{width:44px;height:44px;border-radius:50%;border:1px solid var(--b1);border-top-color:rgba(91,156,246,.6);animation:spin 1.2s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-name{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--d2);margin-bottom:5px}
.ld-phrase{font-size:10px;letter-spacing:.4px;color:var(--d0);font-style:italic;margin-bottom:20px;min-height:15px}
.ld-track{width:100%;height:1px;background:var(--b1);border-radius:1px;margin-bottom:14px;overflow:visible;position:relative}
#ldbar{position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,rgba(91,156,246,.3),rgba(91,156,246,.9));border-radius:1px;transition:width .36s var(--ease)}
#ldbar::after{content:'';position:absolute;right:0;top:-2px;width:4px;height:4px;border-radius:50%;background:rgba(91,156,246,.9);box-shadow:0 0 8px rgba(91,156,246,.7)}
.ld-status{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--d0);margin-bottom:20px;min-height:12px}
.ld-cancel{background:none;border:1px solid var(--b1);border-radius:6px;padding:8px 22px;font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--d0);cursor:pointer;transition:border-color .15s,color .15s}
.ld-cancel:hover{border-color:var(--b2);color:var(--d1)}
</style>
</head>
<body>
<canvas id="sc"></canvas>
<div id="cur"><div id="co"></div><div id="ci"></div></div>

<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:20px">
      <div class="tldots"><div class="tl tlr"></div><div class="tl tly"></div><div class="tl tlg"></div></div>
      <span class="logo">atom<sup>proxy</sup></span>
    </div>
    <div id="nav">
      <div class="ntab on" data-v="vh" onclick="sv('vh')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1L1 5v6h3V8h4v3h3V5Z"/></svg>Home
      </div>
      <div class="ntab" data-v="vbr" onclick="sv('vbr')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="2" width="10" height="9" rx="1.5"/><line x1="1" y1="5" x2="11" y2="5"/></svg>Browser
      </div>
      <div class="ntab" data-v="vgm" onclick="sv('vgm')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="3" width="10" height="7" rx="1.5"/><line x1="4.5" y1="6.5" x2="6.5" y2="6.5"/><line x1="5.5" y1="5.5" x2="5.5" y2="7.5"/></svg>Games
      </div>
    </div>
    <div id="topright"><div id="clk"></div></div>
  </div>

  <div id="content">

    <!-- HOME -->
    <div class="view on" id="vh">
      <div class="home-inner">
        <div class="hero">
          <div class="hero-name">atom</div>
          <div class="hero-sub" id="sub"></div>
        </div>
        <div class="search-wrap">
          <div class="search-bar">
            <div class="s-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
            <input id="uva" type="text" placeholder="search anything or paste a url…" autocomplete="off" spellcheck="false">
            <button class="s-btn" id="goB">Go</button>
          </div>
        </div>
        <div class="section">
          <div class="sec-row"><span class="sec-label">Quick Launch</span></div>
          <div class="qtiles" id="qtiles"></div>
          <div class="sec-row">
            <span class="sec-label">Games</span>
            <span class="sec-more" onclick="sv('vgm')">see all →</span>
          </div>
          <div class="gstrip" id="hgstrip"></div>
        </div>
      </div>
    </div>

    <!-- BROWSER -->
    <div class="view" id="vbr">
      <div id="bbar">
        <button class="nbtn" onclick="bn('back')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7 9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="nbtn" onclick="bn('fwd')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="nbtn" onclick="bn('rl')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M2.5 7A4.5 4.5 0 0 1 11 4M11 2v2.5H8.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="url-bar">
          <div class="url-ico"><svg width="9" height="11" viewBox="0 0 11 14" fill="none"><rect x="1.5" y="6" width="8" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3.5 6V4a2 2 0 0 1 4 0v2" stroke="currentColor" stroke-width="1.3"/></svg></div>
          <input id="burl" type="text" placeholder="enter a url or search…" autocomplete="off" spellcheck="false">
          <button class="url-go" onclick="bg()">Go</button>
        </div>
      </div>
      <div id="bframe">
        <div id="bempty">
          <div class="empty-ring"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="22"/><path d="M2 12h20M4.5 5.5C7 9 9 11 12 12s5 3 7.5 6.5M19.5 5.5C17 9 15 11 12 12s-5 3-7.5 6.5"/></svg></div>
          <div class="empty-txt">enter a url above</div>
        </div>
        <iframe id="bf" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>

    <!-- GAMES -->
    <div class="view" id="vgm">
      <div class="games-hdr">
        <span class="games-title">Games</span>
        <span class="games-count">12 titles</span>
      </div>
      <div class="games-grid" id="gg"></div>
    </div>

  </div>
</div>

<!-- LOADER -->
<div id="ld">
  <div class="ld-box">
    <div class="ld-ring"></div>
    <div class="ld-name">atom</div>
    <div class="ld-phrase" id="ldSub"></div>
    <div class="ld-track"><div id="ldbar"></div></div>
    <div class="ld-status" id="ldSt"></div>
    <button class="ld-cancel" id="ldCanc">cancel</button>
  </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
const G=[
  {n:'Snake',         u:'https://www.coolmathgames.com/0-snake',             t:'Classic', c:'ts', i:`<svg viewBox="0 0 50 50" fill="none" width="36"><path d="M8 40Q8 28 16 28Q24 28 24 20Q24 12 32 12Q40 12 40 20" stroke="#2ef288" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="40" cy="20" r="4" fill="#2ef288"/></svg>`},
  {n:'2048',          u:'https://play2048.co/',                               t:'Puzzle',  c:'t2', i:`<svg viewBox="0 0 44 44" fill="none" width="36"><rect x="3" y="3" width="17" height="17" rx="3" fill="#ffaa00" opacity=".75"/><rect x="24" y="3" width="17" height="17" rx="3" fill="#ff7700" opacity=".7"/><rect x="3" y="24" width="17" height="17" rx="3" fill="#ff5500" opacity=".68"/><rect x="24" y="24" width="17" height="17" rx="3" fill="#ffcc00" opacity=".78"/></svg>`},
  {n:'Tetris',        u:'https://www.coolmathgames.com/0-tetris',             t:'Arcade',  c:'tt', i:`<svg viewBox="0 0 44 44" fill="none" width="36"><rect x="2" y="2" width="12" height="12" rx="2" fill="#00ccff" opacity=".75"/><rect x="16" y="2" width="12" height="12" rx="2" fill="#00ccff" opacity=".73"/><rect x="16" y="16" width="12" height="12" rx="2" fill="#00ccff" opacity=".71"/><rect x="2" y="28" width="12" height="12" rx="2" fill="#ff44aa" opacity=".73"/><rect x="16" y="28" width="12" height="12" rx="2" fill="#ff44aa" opacity=".71"/><rect x="30" y="28" width="12" height="12" rx="2" fill="#ff44aa" opacity=".69"/></svg>`},

/* starfield */
(()=>{
  const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  const rs=()=>{cv.width=innerWidth;cv.height=innerHeight};rs();addEventListener('resize',rs);
  const st=Array.from({length:320},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*.8+.1,a:Math.random()*.45+.04,
    t:Math.random()*100,ts:Math.random()*.006+.002
  }));
  const shoot=[];
  setInterval(()=>{if(Math.random()>.5)shoot.push({x:Math.random()*innerWidth*.8,y:Math.random()*innerHeight*.5,len:50+Math.random()*80,life:1,vx:2+Math.random()*3,vy:.4+Math.random()*1.2})},3000);
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    const nb=ctx.createRadialGradient(cv.width*.15,cv.height*.2,0,cv.width*.15,cv.height*.2,cv.width*.4);
    nb.addColorStop(0,'rgba(20,40,100,.04)');nb.addColorStop(1,'transparent');
    ctx.fillStyle=nb;ctx.fillRect(0,0,cv.width,cv.height);
    st.forEach(s=>{s.t+=s.ts;const al=s.a*(.35+.65*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#c8deff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    for(let i=shoot.length-1;i>=0;i--){const s=shoot[i];ctx.save();ctx.globalAlpha=s.life*.35;const g=ctx.createLinearGradient(s.x,s.y,s.x-s.len,s.y-s.len*.35);g.addColorStop(0,'rgba(180,215,255,.9)');g.addColorStop(1,'transparent');ctx.strokeStyle=g;ctx.lineWidth=.7;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.len,s.y-s.len*.35);ctx.stroke();ctx.restore();s.x+=s.vx;s.y+=s.vy;s.life-=.022;if(s.life<=0)shoot.splice(i,1);}
    requestAnimationFrame(draw);
  }draw();
})();

function sv(id){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('on',t.dataset.v===id));

/* browser */
const bf=document.getElementById('bf'),bempty=document.getElementById('bempty'),burlEl=document.getElementById('burl');
function bg(){const v=burlEl.value.trim();if(!v)return;const u=v.includes('.')&&!v.includes(' ')?(v.startsWith('http')?v:'https://'+v):'https://search.brave.com/search?q='+encodeURIComponent(v);lbr(u);}
function lbr(u){burlEl.value=u;bempty.style.display='none';bf.style.display='block';try{bf.src=__uv$config.prefix+__uv$config.encodeUrl(u);}catch(e){bf.src=u;}}
function bn(a){try{if(a==='back')bf.contentWindow.history.back();else if(a==='fwd')bf.contentWindow.history.forward();else bf.contentWindow.location.reload();}catch(e){}}
burlEl.addEventListener('keydown',e=>{if(e.key==='Enter')bg();});
function lgame(u){sv('vbr');setTimeout(()=>lbr(u),80);}

/* service worker */
var swR=false;
if('serviceWorker' in navigator){navigator.serviceWorker.register('/uv/uv.sw.js',{scope:'/'}).then(r=>{if(r.active){swR=true;return;}const s=r.installing||r.waiting;if(s)s.addEventListener('statechange',()=>{if(s.state==='activated')swR=true;});}).catch(()=>swR=true);}else swR=true;

/* loader */
const ldEl=document.getElementById('ld'),ldSub=document.getElementById('ldSub'),ldSt=document.getElementById('ldSt'),ldBar=document.getElementById('ldbar');
let ldT=null;
const seqs=[["routing signal","bypassing filter","tunneling through","signal locked","launching"],["charging particle beam","warping spacetime","entering orbit","touchdown","you're in"],["shredding firewall","encrypting path","bouncing satellites","trace zeroed","clear"],["bribing the router","looking very academic","calculating yeet trajectory","firewall: destroyed","let's go"]];
function lp(u){
  const m=seqs[Math.random()*seqs.length|0];
  ldEl.classList.add('on');ldBar.style.width='0%';ldSub.textContent=m[0];ldSt.textContent=m[0];
  let s=0;const ps=[5,20,44,68,90,100],ds=[240,420,510,570,460,300];
  function nx(){ldBar.style.width=ps[s]+'%';ldSt.textContent=m[Math.min(s,m.length-1)];s++;if(s<ps.length)ldT=setTimeout(nx,ds[s-1]);else ldT=setTimeout(()=>nav(u),260);}
  ldT=setTimeout(nx,ds[0]);
}
function nav(u){let n=0;function go(){if(swR||n++>40){try{window.location.href=__uv$config.prefix+__uv$config.encodeUrl(u);}catch(e){window.location.href=u;}}else setTimeout(go,100);}go();}
document.getElementById('ldCanc').addEventListener('click',()=>{clearTimeout(ldT);ldEl.classList.remove('on');ldBar.style.width='0%';});

/* search */
function ds(v){if(!v.trim())return;const u=v.includes('.')&&!v.includes(' ')?(v.startsWith('http')?v:'https://'+v):'https://search.brave.com/search?q='+encodeURIComponent(v);lp(u);}
document.getElementById('uva').addEventListener('keydown',e=>{if(e.key==='Enter')ds(e.target.value);});
