<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>atom</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,200;0,300;0,400;0,600;1,200&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --aqua:#00d4ff;--blue:#0088ff;
  --border:rgba(255,255,255,0.16);--border-top:rgba(255,255,255,0.3);
  --ink:rgba(255,255,255,0.88);--ink2:rgba(255,255,255,0.42);
}
html,body{width:100%;height:100%;overflow:hidden;background:#030c18;font-family:'Exo 2',sans-serif;cursor:none;}

/* CURSOR */
#cur{position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);width:18px;height:18px;transition:width .2s,height .2s;}
#cur-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,212,255,.75);box-shadow:0 0 6px rgba(0,212,255,.35);}
#cur-dot{position:absolute;top:50%;left:50%;width:3.5px;height:3.5px;transform:translate(-50%,-50%);border-radius:50%;background:var(--aqua);box-shadow:0 0 5px var(--aqua);}
body.hovering #cur{width:30px;height:30px;}
body.hovering #cur-ring{border-color:rgba(0,212,255,.35);}

/* ENV */
#env{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 110% 80% at 25% 25%,#001a3a,transparent 60%),radial-gradient(ellipse 70% 90% at 80% 75%,#00112a,transparent 55%),#030c18;}
#caustics{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle 280px at 22% 28%,rgba(0,180,255,.18),transparent),radial-gradient(circle 200px at 75% 62%,rgba(0,100,200,.14),transparent);filter:blur(45px);animation:caustDrift 14s ease-in-out infinite alternate;}
@keyframes caustDrift{to{transform:scale(1.18) translate(-22px,14px);}}
#bgCv{position:fixed;inset:0;z-index:2;}

/* SCENE */
#scene{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;perspective:1400px;perspective-origin:50% 48%;}
#stage{position:relative;width:660px;height:570px;transform-style:preserve-3d;will-change:transform;}

/* ORBIT RINGS */
.orbit{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(0,212,255,.1);transform-style:preserve-3d;}
.orbit::after{content:'';position:absolute;width:7px;height:7px;border-radius:50%;top:50%;left:0;transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 30%,#b8f8ff,#00ccff 50%,#004870);box-shadow:0 0 10px rgba(0,200,255,.9),0 0 18px rgba(0,160,255,.4);}
#r1{width:360px;height:120px;margin:-60px 0 0 -180px;transform:rotateX(70deg) rotateZ(0deg);animation:orb1 4.4s linear infinite;}
#r2{width:300px;height:105px;margin:-52px 0 0 -150px;border-style:dashed;animation:orb2 3.2s linear infinite;}
#r3{width:330px;height:112px;margin:-56px 0 0 -165px;animation:orb3 6s linear infinite;}
@keyframes orb1{to{transform:rotateX(70deg) rotateZ(360deg);}}
@keyframes orb2{to{transform:rotateX(70deg) rotateZ(-360deg);}}
@keyframes orb3{to{transform:rotateX(70deg) rotateZ(300deg);}}
#nucGlow{position:absolute;width:250px;height:250px;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(-60px);border-radius:50%;background:radial-gradient(circle at 40% 38%,rgba(0,220,255,.17),rgba(0,120,255,.09) 40%,transparent 70%);filter:blur(18px);animation:nucPulse 5s ease-in-out infinite;}
@keyframes nucPulse{0%,100%{opacity:.7;}50%{opacity:1;}}

/* SPHERES */
.sph{position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 36% 30%,rgba(255,255,255,.55) 0%,rgba(255,255,255,.12) 22%,transparent 50%),radial-gradient(circle at 50% 50%,rgba(0,180,255,.1),rgba(0,70,180,.22) 55%,rgba(0,15,70,.38) 100%);
  border:1px solid rgba(255,255,255,.22);
  box-shadow:inset 0 1px 3px rgba(255,255,255,.4),0 8px 24px rgba(0,0,0,.55),0 0 20px rgba(0,140,255,.1);}
#s1{width:88px;height:88px;top:-26px;right:-28px;}
#s2{width:52px;height:52px;bottom:32px;right:-18px;}
#s3{width:36px;height:36px;top:42px;left:-20px;}
#s4{width:20px;height:20px;top:168px;right:14px;}

/* MAIN CARD */
#card{
  position:absolute;width:570px;top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:26px;
  background:linear-gradient(145deg,rgba(255,255,255,.13) 0%,rgba(255,255,255,.04) 45%,rgba(0,60,160,.07) 75%,rgba(255,255,255,.04) 100%);
  backdrop-filter:blur(36px) saturate(1.9);-webkit-backdrop-filter:blur(36px) saturate(1.9);
  border:1px solid var(--border);border-top:1px solid var(--border-top);border-left:1px solid rgba(255,255,255,.24);
  box-shadow:0 2px 0 rgba(255,255,255,.11) inset,0 -1px 0 rgba(0,0,0,.18) inset,0 40px 80px rgba(0,0,0,.5),0 8px 32px rgba(0,100,255,.1),0 0 0 1px rgba(0,200,255,.06);
  overflow:hidden;
}
#card::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;border-radius:26px 26px 60% 60%;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%);pointer-events:none;z-index:0;}

/* TAB BAR */
#tabbar{display:flex;align-items:center;gap:5px;padding:13px 18px 0;position:relative;z-index:5;border-bottom:1px solid rgba(255,255,255,.07);}
.tab{display:flex;align-items:center;gap:6px;padding:8px 14px 10px;border-radius:10px 10px 0 0;font-size:11px;font-weight:400;letter-spacing:.5px;color:var(--ink2);cursor:pointer;border:1px solid transparent;border-bottom:none;transition:background .18s,color .18s,border-color .18s;white-space:nowrap;user-select:none;position:relative;}
.tab:hover{color:rgba(255,255,255,.68);background:rgba(255,255,255,.04);}
.tab.active{color:var(--ink);background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);border-bottom:1px solid rgba(26,28,46,.0);margin-bottom:-1px;}

/* PANELS */
.panel{display:none;padding:24px 26px 26px;position:relative;z-index:2;}
.panel.active{display:block;}

/* HOME */
#logo-area{text-align:center;margin-bottom:10px;}
.wordmark{font-weight:200;font-size:74px;letter-spacing:20px;text-indent:20px;color:transparent;background:linear-gradient(180deg,#fff 0%,#c8f0ff 30%,#7adcff 65%,#38b8f0 100%);-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 22px rgba(0,200,255,.38)) drop-shadow(0 3px 8px rgba(0,0,0,.4));line-height:1;display:block;animation:logoGlow 6s ease-in-out infinite;}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(0,200,255,.35)) drop-shadow(0 3px 8px rgba(0,0,0,.4));}50%{filter:drop-shadow(0 0 32px rgba(0,200,255,.58)) drop-shadow(0 3px 8px rgba(0,0,0,.4));}}
.logo-ver{font-size:9px;letter-spacing:5px;color:rgba(0,210,255,.42);margin-top:3px;display:block;font-weight:300;text-align:center;}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.26) 20%,rgba(255,255,255,.17) 50%,rgba(0,210,255,.26) 80%,transparent);margin:15px 0 17px;}
#subtitle{font-style:italic;font-weight:300;font-size:12px;color:rgba(180,228,255,.42);text-align:center;letter-spacing:1.2px;min-height:20px;margin-bottom:22px;}
#subtitle::after{content:'|';color:rgba(0,210,255,.7);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px;}
.search-shell{display:flex;align-items:center;border-radius:50px;overflow:hidden;background:rgba(0,8,28,.52);border:1px solid rgba(255,255,255,.13);border-top:1px solid rgba(255,255,255,.2);box-shadow:0 2px 0 rgba(255,255,255,.05) inset,0 -2px 8px rgba(0,0,0,.28) inset,0 4px 18px rgba(0,0,0,.28);transition:border-color .22s,box-shadow .22s;}
.search-wrap:focus-within .search-shell{border-color:rgba(0,210,255,.3);box-shadow:0 2px 0 rgba(255,255,255,.07) inset,0 -2px 8px rgba(0,0,0,.28) inset,0 4px 18px rgba(0,0,0,.28),0 0 0 3px rgba(0,210,255,.09);}
.search-ico{padding:0 0 0 18px;color:rgba(0,200,255,.4);display:flex;align-items:center;flex-shrink:0;}
#uv-address{flex:1;background:transparent;border:none;padding:12px 14px;font-family:'Exo 2',sans-serif;font-weight:300;font-size:15px;color:rgba(255,255,255,.88);letter-spacing:.3px;}
#uv-address::placeholder{color:rgba(255,255,255,.17);}
#uv-address:focus{outline:none;}
.go-btn{padding:9px 20px;margin:5px;border:none;border-radius:50px;background:linear-gradient(135deg,#0088ff,#00ccff);color:#fff;font-family:'Exo 2',sans-serif;font-weight:600;font-size:12px;letter-spacing:.8px;cursor:pointer;transition:background .18s,box-shadow .18s,transform .1s;box-shadow:0 2px 10px rgba(0,130,255,.42),0 1px 0 rgba(255,255,255,.22) inset;flex-shrink:0;}
.go-btn:hover{background:linear-gradient(135deg,#00aaff,#00ddff);box-shadow:0 4px 18px rgba(0,170,255,.52),0 1px 0 rgba(255,255,255,.28) inset;}
.go-btn:active{transform:scale(.94);}

/* TILES */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.tile{
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  padding:15px 6px 12px;border-radius:16px;text-decoration:none;cursor:pointer;overflow:hidden;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.16);
  box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 4px 14px rgba(0,0,0,.22);
  /* transform handled ONLY by JS class — zero CSS hover transform = zero jitter */
  transition:background .2s,border-color .2s,box-shadow .2s;will-change:transform;
}
.tile::before{content:'';position:absolute;top:0;left:0;right:0;height:48%;border-radius:16px 16px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none;z-index:1;}
.tile:hover{background:rgba(0,160,255,.08);border-color:rgba(0,210,255,.24);box-shadow:0 1px 0 rgba(255,255,255,.12) inset,0 10px 22px rgba(0,0,0,.3),0 0 16px rgba(0,160,255,.11);}
.tile.lifted{transform:translateY(-7px) scale(1.055);}
.tile.pressing{transform:translateY(-1px) scale(.96)!important;}
.tile-icon-bg{position:absolute;inset:0;border-radius:50%;opacity:0;filter:blur(10px);transition:opacity .2s;}
.tile:hover .tile-icon-bg{opacity:1;}
.tile-icon{position:relative;z-index:2;width:44px;height:44px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));transition:filter .2s;}
.tile:hover .tile-icon{filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)) drop-shadow(0 0 7px rgba(255,255,255,.12));}
.tile-label{position:relative;z-index:2;font-size:10px;letter-spacing:.7px;color:rgba(200,228,255,.55);text-transform:uppercase;transition:color .18s;}
.tile:hover .tile-label{color:rgba(200,228,255,.88);}

/* BROWSER PANEL */
#panel-browser{padding:0;}
#browser-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.16);}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--ink2);padding:5px 7px;border-radius:8px;font-size:14px;transition:background .14s,color .14s;display:flex;align-items:center;line-height:1;flex-shrink:0;}
.nav-btn:hover{background:rgba(255,255,255,.08);color:var(--ink);}
.browser-url{flex:1;background:rgba(0,8,28,.55);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:7px 15px;font-family:'Exo 2',sans-serif;font-weight:300;font-size:12.5px;color:rgba(255,255,255,.8);transition:border-color .18s,box-shadow .18s;letter-spacing:.2px;}
.browser-url:focus{outline:none;border-color:rgba(0,210,255,.28);box-shadow:0 0 0 2.5px rgba(0,210,255,.08);}
.nav-go{padding:7px 15px;border:none;border-radius:50px;background:linear-gradient(135deg,#0070dd,#00bbee);color:#fff;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;letter-spacing:.6px;cursor:pointer;transition:background .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,100,200,.35);white-space:nowrap;flex-shrink:0;}
.nav-go:hover{background:linear-gradient(135deg,#0090ff,#00d4ff);box-shadow:0 3px 14px rgba(0,150,255,.42);}
#browser-frame-wrap{position:relative;overflow:hidden;background:#07080f;border-radius:0 0 26px 26px;}
#browser-frame{width:100%;height:376px;border:none;display:block;border-radius:0 0 26px 26px;}
#browser-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,.18);font-size:12.5px;font-weight:300;letter-spacing:.8px;background:rgba(4,8,20,.82);border-radius:0 0 26px 26px;}
.bp-icon{font-size:34px;opacity:.22;filter:drop-shadow(0 0 8px rgba(0,180,255,.4));}

/* GAMES PANEL */
#panel-games{padding:14px 16px;}
.games-head{font-size:9px;letter-spacing:2.2px;text-transform:uppercase;color:rgba(0,200,255,.35);margin-bottom:11px;font-weight:300;}
.games-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.game-card{
  position:relative;border-radius:14px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.04);box-shadow:0 4px 14px rgba(0,0,0,.24);
  transition:background .2s,border-color .2s,box-shadow .2s;will-change:transform;
}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.09) 0%,transparent 100%);pointer-events:none;z-index:1;}
.game-card:hover{background:rgba(0,150,255,.08);border-color:rgba(0,210,255,.2);box-shadow:0 8px 20px rgba(0,0,0,.32),0 0 12px rgba(0,150,255,.09);}
.game-card.lifted{transform:translateY(-5px) scale(1.04);}
.game-card.pressing{transform:scale(.97)!important;}
.game-thumb{width:100%;height:66px;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;overflow:hidden;}
.game-info{padding:6px 10px 8px;position:relative;z-index:2;}
.game-name{font-size:10.5px;font-weight:600;letter-spacing:.4px;color:rgba(220,240,255,.8);margin-bottom:2px;}
.game-genre{font-size:9px;letter-spacing:.8px;color:rgba(0,200,255,.4);text-transform:uppercase;font-weight:300;}
.g-snake{background:linear-gradient(135deg,#00260f,#005a28);}
.g-2048{background:linear-gradient(135deg,#221200,#6a3a00);}
.g-tetris{background:linear-gradient(135deg,#000d2e,#002470);}
.g-pacman{background:linear-gradient(135deg,#221a00,#5e5000);}
.g-breakout{background:linear-gradient(135deg,#160022,#440070);}
.g-flappy{background:linear-gradient(135deg,#001528,#004278);}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(2,8,20,.78);backdrop-filter:blur(22px);opacity:0;pointer-events:none;transition:opacity .3s;}
#loader.active{opacity:1;pointer-events:all;}
.ld-panel{width:330px;border-radius:22px;padding:36px 30px 30px;background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(0,50,110,.1));backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.15);border-top:1px solid rgba(255,255,255,.27);box-shadow:0 40px 80px rgba(0,0,0,.5);text-align:center;position:relative;overflow:hidden;}
.ld-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:48%;border-radius:22px 22px 60% 60%;background:linear-gradient(180deg,rgba(255,255,255,.09) 0%,transparent 100%);pointer-events:none;}
.ld-atom{position:relative;width:80px;height:80px;margin:0 auto 20px;}
.ld-nucleus{position:absolute;top:50%;left:50%;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#aaf8ff,#00ccff 45%,#004888);box-shadow:0 0 13px rgba(0,200,255,.85),0 0 26px rgba(0,170,255,.4);}
.ld-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1.5px solid rgba(0,210,255,.26);}
.ld-ring::after{content:'';position:absolute;width:6px;height:6px;border-radius:50%;top:50%;left:0;transform:translate(-50%,-50%);background:radial-gradient(circle at 30% 30%,#fff,var(--aqua));box-shadow:0 0 7px var(--aqua);}
.lr1{width:44px;height:44px;margin:-22px 0 0 -22px;animation:spin1 1.8s linear infinite;}
.lr2{width:64px;height:64px;margin:-32px 0 0 -32px;border-style:dashed;animation:spin2 2.7s linear infinite;}
.lr3{width:80px;height:80px;margin:-40px 0 0 -40px;animation:spin1 3.5s linear infinite;}
@keyframes spin1{to{transform:rotate(360deg);}}
@keyframes spin2{to{transform:rotate(-360deg);}}
.ld-title{font-weight:200;font-size:26px;letter-spacing:10px;color:#c8f0ff;margin-bottom:4px;}
.ld-sub{font-style:italic;font-weight:300;font-size:11px;letter-spacing:1.3px;color:rgba(0,200,255,.46);margin-bottom:16px;min-height:16px;}
.prog-track{width:100%;height:2.5px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.prog-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,#0088ff,#00e0ff);box-shadow:0 0 7px rgba(0,200,255,.7);transition:width .36s ease;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-1px;top:-1.5px;width:5px;height:5px;border-radius:50%;background:#00e8ff;box-shadow:0 0 7px #00e8ff;}
.ld-status{font-weight:300;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.22);min-height:14px;margin-bottom:16px;}
.back-btn{background:none;border:1px solid rgba(255,255,255,.11);border-radius:50px;padding:8px 22px;font-family:'Exo 2',sans-serif;font-weight:400;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(200,228,255,.42);cursor:pointer;transition:border-color .16s,color .16s;}
.back-btn:hover{border-color:rgba(0,200,255,.26);color:rgba(0,200,255,.72);}

/* PARTICLES */
.ptcl{position:fixed;border-radius:50%;pointer-events:none;z-index:3;}
</style>
</head>
<body>

<div id="env"></div><div id="caustics"></div>
<canvas id="bgCv"></canvas>
<div id="cur"><div id="cur-ring"></div><div id="cur-dot"></div></div>

<div id="scene"><div id="stage">
  <div id="r1" class="orbit"></div>
  <div id="r2" class="orbit"></div>
  <div id="r3" class="orbit"></div>
  <div id="nucGlow"></div>
  <div id="s1" class="sph"></div>
  <div id="s2" class="sph"></div>
  <div id="s3" class="sph"></div>
  <div id="s4" class="sph"></div>

  <div id="card">
    <!-- TAB BAR -->
    <div id="tabbar">
      <div class="tab active" data-tab="home" onclick="switchTab('home')">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1L1 5v6h3.5V8h3v3H11V5L6 1z"/></svg>
        Home
      </div>
      <div class="tab" data-tab="browser" onclick="switchTab('browser')">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="2" width="10" height="9" rx="1.5"/><line x1="1" y1="5" x2="11" y2="5"/><circle cx="3" cy="3.5" r=".65" fill="currentColor"/><circle cx="5.5" cy="3.5" r=".65" fill="currentColor"/></svg>
        Browser
      </div>
      <div class="tab" data-tab="games" onclick="switchTab('games')">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="3" width="10" height="7" rx="1.5"/><line x1="4" y1="6.5" x2="6" y2="6.5"/><line x1="5" y1="5.5" x2="5" y2="7.5"/><circle cx="8.5" cy="6" r=".55" fill="currentColor"/><circle cx="9.5" cy="7" r=".55" fill="currentColor"/></svg>
        Games
      </div>
      <div style="flex:1"></div>
      <div id="clockdisp" style="font-size:9.5px;letter-spacing:1.5px;color:rgba(0,200,255,.32);font-weight:300;padding:0 4px 8px;align-self:flex-end;"></div>
    </div>

    <!-- HOME PANEL -->
    <div class="panel active" id="panel-home">
      <div id="logo-area">
        <span class="wordmark">atom</span>
        <span class="logo-ver">v 2 . 0 &nbsp;·&nbsp; secure &nbsp;·&nbsp; fast</span>
      </div>
      <div class="divider"></div>
      <div id="subtitle"></div>
      <div class="search-wrap">
        <div class="search-shell">
          <span class="search-ico">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </span>
          <input id="uv-address" type="text" placeholder="search or enter a url…" autocomplete="off" spellcheck="false">
          <button class="go-btn" id="goBtn">GO</button>
        </div>
      </div>

/* STARFIELD */
(function(){
  const cv=document.getElementById('bgCv');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  window.addEventListener('resize',()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;});
  const stars=Array.from({length:280},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.3+.15,a:Math.random()*.6+.05,t:Math.random()*100,ts:Math.random()*.015+.003,cross:Math.random()>.72}));
  const wisps=Array.from({length:5},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,rx:Math.random()*160+65,ry:Math.random()*65+32,a:Math.random()*.028+.006,rot:Math.random()*Math.PI,t:Math.random()*100,ts:Math.random()*.004+.001,h:Math.random()>.5?'0,160,255':'0,85,190'}));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    wisps.forEach(w=>{w.t+=w.ts;const a=w.a*(0.5+0.5*Math.sin(w.t));ctx.save();ctx.translate(w.x,w.y);ctx.rotate(w.rot+Math.sin(w.t*.3)*.2);const g=ctx.createRadialGradient(0,0,0,0,0,w.rx);g.addColorStop(0,`rgba(${w.h},${a})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.scale(1,w.ry/w.rx);ctx.beginPath();ctx.arc(0,0,w.rx,0,Math.PI*2);ctx.fill();ctx.restore();});
    stars.forEach(s=>{s.t+=s.ts;const al=s.a*(0.4+0.6*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#c4eaff';ctx.strokeStyle='#c4eaff';if(s.cross){ctx.lineWidth=.55;ctx.beginPath();ctx.moveTo(s.x-s.r*2.8,s.y);ctx.lineTo(s.x+s.r*2.8,s.y);ctx.moveTo(s.x,s.y-s.r*2.8);ctx.lineTo(s.x,s.y+s.r*2.8);ctx.stroke();}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}ctx.restore();});
    requestAnimationFrame(draw);
  }
  draw();
})();

/* PARTICLES */

    document.body.appendChild(p);

/* 3D PARALLAX */

let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5)*2;my=(e.clientY/window.innerHeight-.5)*2;});
(function raf(){
  cx+=(mx-cx)*.052;cy+=(my-cy)*.052;
  const t=Date.now()*.001;
  stage.style.transform=`rotateX(${-cy*9}deg) rotateY(${cx*11}deg)`;
  card.style.transform=`translate(-50%,-50%) translateX(${cx*5}px) translateY(${cy*3.5}px)`;
  s1.style.transform=`translateY(${-15*Math.sin(t*.7)}px) translateZ(42px) translateX(${-cx*16}px)`;
  s2.style.transform=`translateY(${-10*Math.sin(t*.55+1.2)}px) translateZ(28px) translateX(${cx*13}px)`;
  s3.style.transform=`translateY(${-7*Math.sin(t*.9+2.5)}px) translateZ(20px) translateX(${cx*20}px)`;
  s4=document.getElementById('s4');
  s4.style.transform=`translateY(${-5*Math.sin(t*1.1+0.8)}px) translateZ(14px)`;

function loadInBrowser(url){
  bUrl.value=url;
  bPlaceholder.style.display='none';
  bFrame.style.display='block';
  try{bFrame.src=__uv$config.prefix+__uv$config.encodeUrl(url);}
  catch(e){bFrame.src=url;}
}
function browserNav(action){
  try{
    if(action==='back')bFrame.contentWindow.history.back();
    else if(action==='fwd')bFrame.contentWindow.history.forward();
    else if(action==='reload')bFrame.contentWindow.location.reload();
  }catch(e){}
}
bUrl.addEventListener('keydown',e=>{if(e.key==='Enter')browserGo();});

/* GAMES */
function launchGame(url){
  switchTab('browser');
  setTimeout(()=>loadInBrowser(url),80);
}

/* SERVICE WORKER */
var swReady=false;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/uv/uv.sw.js',{scope:'/'})
    .then(reg=>{
      if(reg.active){swReady=true;return;}
      const sw=reg.installing||reg.waiting;
      if(sw)sw.addEventListener('statechange',()=>{if(sw.state==='activated')swReady=true;});
    }).catch(()=>{swReady=true;});
}else swReady=true;

/* LOADER */
const loader=document.getElementById('loader');
const ldSub=document.getElementById('ldSub');
const ldStatus=document.getElementById('ldStatus');
const ldProg=document.getElementById('ldProg');
let ldTimer=null;
const ldMsgs=[
  ["routing signal","bypassing filter","tunneling through","almost there","locked on"],
  ["charging particle beam","bending spacetime","warping","entering orbit","touchdown"],
  ["dissolving firewall","encrypting path","bouncing signal","trace eliminated","you're clear"],
];
function startLoader(url){
  const m=ldMsgs[Math.floor(Math.random()*ldMsgs.length)];
  loader.classList.add('active');ldProg.style.width='0%';ldSub.innerText=m[0];ldStatus.innerText=m[0];
  let step=0;const steps=[8,26,50,74,92,100],delays=[260,460,530,580,480,320];
  function next(){if(step<steps.length){ldProg.style.width=steps[step]+'%';ldStatus.innerText=m[Math.min(step,m.length-1)];step++;if(step<steps.length)ldTimer=setTimeout(next,delays[step-1]);else ldTimer=setTimeout(()=>doNav(url),280);}}
  ldTimer=setTimeout(next,delays[0]);
}
function doNav(url){let t=0;function go(){if(swReady||t++>40){try{window.location.href=__uv$config.prefix+__uv$config.encodeUrl(url);}catch(e){window.location.href=url;}}else setTimeout(go,100);}go();}
document.getElementById('ldBack').addEventListener('click',()=>{if(ldTimer)clearTimeout(ldTimer);loader.classList.remove('active');ldProg.style.width='0%';});

/* NAVIGATE */
function launchProxy(url){startLoader(url);}
function doSearch(val){if(!val.trim())return;const url=(val.includes('.')&&!val.includes(' '))?(val.startsWith('http')?val:'https://'+val):'https://search.brave.com/search?q='+encodeURIComponent(val);launchProxy(url);}
document.getElementById('uv-address').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(e.target.value);});
document.getElementById('goBtn').addEventListener('click',()=>doSearch(document.getElementById('uv-address').value));
</script>
</body>
