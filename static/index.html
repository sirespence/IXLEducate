<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.04);
            --text-dim: #444;
            --transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; outline: none; cursor: crosshair; }
        
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #void-curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; transform: translateY(100%);
            transition: var(--transition); z-index: 9999;
        }
        #void-curtain.active { transform: translateY(0); }

        .container { 
            width: 90%; max-width: 900px; text-align: center; 
            animation: emerge 1.2s var(--transition);
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        h1 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 0;
            font-weight: 200;
            opacity: 0.6;
        }

        #subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin: 15px 0 70px 0;
            min-height: 20px;
            font-weight: 300;
            text-transform: lowercase;
            font-style: italic;
        }

        #uv-address {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            font-size: 42px;
            color: #fff;
            font-weight: 100;
            text-align: center;
            transition: var(--transition);
            letter-spacing: -1px;
        }

        #uv-address:focus {
            border-bottom: 1px solid #fff;
            letter-spacing: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 60px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 35px 15px;
            text-decoration: none;
            color: #333;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: var(--transition);
        }

        .card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-10px);
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div id="void-curtain"></div>

    <div class="container">
        <h1>atom</h1>
        <div id="subtitle"></div>
        
        <input id="uv-address" type="text" placeholder="enter the void" autocomplete="off">

        <div class="grid">
            <a href="#" onclick="launch('https://vinmannie.github.io/SonicManiaWeb/')" class="card">Sonic Mania</a>
            <a href="#" onclick="launch('https://jojudge.com/ICBINS1/')" class="card">Sonic 1</a>
            <a href="#" onclick="launch('https://github.com/VinMannie/Sonic-1-WASM')" class="card">Sonic (2013)</a>
            <a href="#" onclick="launch('https://heyjoeway.github.io/s2cx/')" class="card">Sonic 2: CC</a>
            <a href="#" onclick="launch('https://projects.sappharad.com/s3air_ios/')" class="card">Sonic 3ak</a>
        </div>
    </div>

    <!--
        FIX THE 404s: Change these src paths to wherever your server actually serves the UV files.
        Examples:
          "uv/uv.bundle.js"          if files sit next to index.html
          "/uv/uv.bundle.js"         from site root
          "/static/uv/uv.bundle.js"  in a /static folder
    -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>

    <script>
        // Use var (not const/let) so curtain is accessible by inline onclick handlers
        var curtain = document.getElementById('void-curtain');
        var sub = document.getElementById('subtitle');

        self.__uv$config = {
            prefix: '/static/tiw/',
            bare: 'https://bare.benrogo.net',
            encodeUrl: ultraviolet.codec.xor.encode,
            decodeUrl: ultraviolet.codec.xor.decode,
            handler: '/static/uv/uv.handler.js',
            bundle: '/static/uv/uv.bundle.js',
            config: '/static/uv/uv.config.js',
            sw: '/static/uv/uv.sw.js',
        };

        // Register SW and wait for active state before navigating
        var swReady = false;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/uv/uv.sw.js', {
                scope: __uv$config.prefix
            }).then(function(reg) {
                if (reg.active) { swReady = true; return; }
                var sw = reg.installing || reg.waiting;
                if (sw) {
                    sw.addEventListener('statechange', function() {
                        if (sw.state === 'activated') swReady = true;
                    });
                }
            }).catch(function(err) {
                console.warn('SW registration failed:', err);
                swReady = true;
            });
        } else { swReady = true; }

        var phrases = [
            "your gpa just filed for divorce", "calculating your wasted potential...", 
            "sonic is faster than your career path", "imagine being productive right now", 
            "sponsored by 3am academic despair", "your teacher is watching. probably.", 
            "welcome to the digital mid-life crisis", "brainrot level: executive",
            "the gpa reaper is outside your house", "academic victim vibes detected",
            "procrastinating like a high-end ceo", "world history homework? never heard of her.",
            "your fbi agent is bored, play something", "even dial-up era was faster than you",
            "error: user lacks basic motivation", "why study when you can just vibe?",
            "mom says it's my turn on the unblocker", "this proxy is the only thing passing this year",
            "too many tabs, not enough brain cells", "rest in peace to your productivity",
            "the principal called, he's actually impressed", "calculating the radius of your laziness...",
            "sponsored by monster energy and regret", "you look like you're failing algebra 2",
            "stop searching for rizz and do your math", "luxury proxy, budget lifestyle",
            "this design is more expensive than your room", "aesthetic > education always",
            "running on spite and coffee beans", "your math teacher misses your potential",
            "the sonic obsession is getting weird", "staying unblocked since 2026",
            "type fast, the guilt is catching up", "making the internet usable for once",
            "don't let the firewall win the war", "your desk mate is sniffing your screen", 
            "delete your history after this. seriously.", "currently hiding from responsibility", 
            "just one more game of sonic, i swear", "the elite way to fail high school", 
            "minimalism for your maximalist chaos", "atom: too smart for school filters", 
            "the void is comfy, isn't it?", "refreshing for new ways to roast you", 
            "you still here? go to class.", "brainrot loading: 99%", "your future boss just saw your tab."
        ];

        var pIdx = 0, cIdx = 0, erasing = false;
        function type() {
            var cur = phrases[pIdx];
            if (!erasing) {
                sub.innerText = cur.substring(0, cIdx++);
                if (cIdx > cur.length) { erasing = true; setTimeout(type, 3000); }
                else setTimeout(type, 60);
            } else {
                sub.innerText = cur.substring(0, cIdx--);
                if (cIdx < 0) { erasing = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 500); }
                else setTimeout(type, 30);
            }
        }
        type();

        function launch(url) {
            curtain.classList.add('active');
            // Wait for SW to be active, then navigate
            var attempts = 0;
            function go() {
                if (swReady || attempts++ > 30) {
                    window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
                } else {
                    setTimeout(go, 100);
                }
            }
            setTimeout(go, 300);
        }

        document.getElementById('uv-address').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var val = e.target.value;
                var url = val.includes('.') ? (val.startsWith('http') ? val : 'https://' + val) : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
                launch(url);
            }
        });
    </script>
</body>
</html>
