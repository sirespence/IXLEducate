<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>atomOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:-apple-system,'Inter',sans-serif;
  --blur:blur(48px) saturate(2.2) brightness(1.05);
  --blur-sm:blur(24px) saturate(1.8);
  --glass:rgba(28,28,40,0.72);
  --glass-light:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.14);
  --glass-border-top:rgba(255,255,255,0.28);
  --text:rgba(255,255,255,0.92);
  --text2:rgba(255,255,255,0.52);
  --text3:rgba(255,255,255,0.22);
  --accent:#0A84FF;
  --green:#30D158;
  --red:#FF453A;
  --yellow:#FFD60A;
  --sp:cubic-bezier(.34,1.56,.64,1);
  --eo:cubic-bezier(.16,1,.3,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font);-webkit-font-smoothing:antialiased;cursor:none;user-select:none}

/* ═══════ WALLPAPER ═══════ */
#wallpaper{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 90% 70% at 15% 8%,  rgba(72,0,180,0.55) 0%,transparent 55%),
    radial-gradient(ellipse 70% 90% at 88% 12%,  rgba(0,60,180,0.45) 0%,transparent 52%),
    radial-gradient(ellipse 110% 50% at 50% 95%, rgba(0,100,50,0.3)  0%,transparent 55%),
    radial-gradient(ellipse 55% 70% at 72% 55%,  rgba(30,0,100,0.35) 0%,transparent 48%),
    radial-gradient(ellipse 80% 60% at 25% 70%,  rgba(0,40,120,0.3)  0%,transparent 50%),
    linear-gradient(160deg,#060112 0%,#080f2a 40%,#040d18 70%,#0a0520 100%);
}
.wall-orb{position:fixed;border-radius:50%;filter:blur(100px);mix-blend-mode:screen;pointer-events:none;animation:orbDrift ease-in-out infinite}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1);opacity:.65}40%{transform:translate(35px,-28px) scale(1.06);opacity:1}70%{transform:translate(-22px,18px) scale(.97);opacity:.78}}
#wo1{width:700px;height:450px;top:-150px;left:-120px;background:radial-gradient(ellipse,rgba(100,0,255,.28),transparent 68%);animation-duration:20s;z-index:1}
#wo2{width:550px;height:550px;top:15%;right:-130px;background:radial-gradient(ellipse,rgba(0,80,220,.22),transparent 68%);animation-duration:26s;animation-delay:-9s;z-index:1}
#wo3{width:800px;height:380px;bottom:-120px;left:18%;background:radial-gradient(ellipse,rgba(0,130,70,.18),transparent 68%);animation-duration:22s;animation-delay:-5s;z-index:1}
#wo4{width:450px;height:450px;top:35%;left:28%;background:radial-gradient(ellipse,rgba(50,0,150,.22),transparent 68%);animation-duration:32s;animation-delay:-14s;z-index:1}
canvas#stars{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ═══════ CURSOR ═══════ */
#cursor{position:fixed;pointer-events:none;z-index:99999;top:0;left:0;will-change:transform}
#c-ring{position:absolute;width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.45);transform:translate(-50%,-50%);transition:width .18s var(--sp),height .18s var(--sp),border-color .18s,background .18s,border-radius .18s}
#c-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
body.cur-hover #c-ring{width:38px;height:38px;border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.04)}
body.cur-click #c-ring{transform:translate(-50%,-50%) scale(.75)}
body.cur-text #c-ring{width:3px;height:22px;border-radius:2px;border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.7)}
body.cur-text #c-dot{display:none}

/* ═══════ MENUBAR ═══════ */
#menubar{
  position:fixed;top:0;left:0;right:0;height:26px;z-index:1000;
  background:rgba(12,12,20,.6);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
}
.mb-l,.mb-r{display:flex;align-items:center;gap:2px}
.mb-center{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;color:var(--text);letter-spacing:.3px}
.mb-btn{padding:2px 7px;border-radius:4px;font-size:12px;font-weight:400;color:rgba(255,255,255,.78);cursor:pointer;transition:background .12s;white-space:nowrap}
.mb-btn:hover{background:rgba(255,255,255,.1)}
.mb-btn.fw{font-weight:600}
.mb-sep{width:1px;height:12px;background:rgba(255,255,255,.1);margin:0 4px}
.mb-r .mb-btn{font-size:11px;color:rgba(255,255,255,.65)}
#mb-clock{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:.2px;padding:2px 8px}

/* ═══════ DESKTOP ═══════ */
#desktop{position:fixed;inset:26px 0 76px 0;z-index:3;overflow:hidden}

/* Desktop Icons */
.desk-icon{
  position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 6px 6px;border-radius:10px;cursor:pointer;width:76px;
  transition:background .14s;
}
.desk-icon:hover{background:rgba(255,255,255,.07)}
.desk-icon.selected{background:rgba(10,132,255,.22);border:1px solid rgba(10,132,255,.4)}
.desk-icon .di-img{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.15) inset}
.desk-icon .di-img::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:46%;border-radius:12px 12px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,.04));pointer-events:none;z-index:2}
.desk-icon .di-lbl{font-size:11px;font-weight:400;color:rgba(255,255,255,.88);text-align:center;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.8);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.desk-icon.selected .di-lbl{background:var(--accent);padding:1px 5px;border-radius:4px}
.desk-icon:active .di-img{transform:scale(.9);transition:transform .08s}

/* ═══════ WINDOWS ═══════ */
.window{
  position:absolute;
  background:var(--glass);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  border-top:1px solid var(--glass-border-top);
  border-radius:12px;
  box-shadow:0 2px 0 rgba(255,255,255,.06) inset,0 -1px 0 rgba(0,0,0,.3) inset,0 40px 80px rgba(0,0,0,.7),0 20px 40px rgba(0,0,0,.5);
  overflow:hidden;
  display:flex;flex-direction:column;
  min-width:320px;min-height:220px;
  transition:box-shadow .2s, opacity .25s var(--eo), transform .25s var(--eo);
  will-change:transform;
}
.window.active{box-shadow:0 2px 0 rgba(255,255,255,.08) inset,0 -1px 0 rgba(0,0,0,.3) inset,0 50px 100px rgba(0,0,0,.8),0 25px 50px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.12)}
.window.minimized{opacity:0;transform:scale(.5) translateY(100px);pointer-events:none}
.window.opening{animation:winOpen .32s var(--eo) both}
@keyframes winOpen{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:none}}
.window.closing{animation:winClose .22s var(--eo) both}
@keyframes winClose{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.88) translateY(20px)}}

/* Titlebar */
.win-title{
  height:40px;flex-shrink:0;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(255,255,255,.025);
  border-bottom:1px solid rgba(255,255,255,.06);
  cursor:move;
  -webkit-user-select:none;user-select:none;
}
.win-controls{display:flex;gap:7px;align-items:center;flex-shrink:0}
.wc{
  width:12px;height:12px;border-radius:50%;cursor:pointer;
  transition:filter .12s,transform .12s var(--sp);
  position:relative;box-shadow:0 1px 2px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.3);
}
.wc:hover{filter:brightness(1.25);transform:scale(1.12)}
.wc:active{transform:scale(.88)}
.wc-r{background:linear-gradient(145deg,#ff6058,#e0322a)}
.wc-y{background:linear-gradient(145deg,#febc2e,#d4961a)}
.wc-g{background:linear-gradient(145deg,#28c840,#18a32a)}
.wc::after{content:'';position:absolute;top:10%;left:10%;width:45%;height:45%;border-radius:50%;background:rgba(255,255,255,.4)}
.win-title-text{flex:1;text-align:center;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:.2px;pointer-events:none}
.window:not(.active) .win-title-text{color:rgba(255,255,255,.3)}
.window:not(.active) .wc-r,.window:not(.active) .wc-y,.window:not(.active) .wc-g{background:rgba(100,100,110,.5)}

/* Resize handle */
.win-resize{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;z-index:10}
.win-resize::after{content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,.15);border-bottom:2px solid rgba(255,255,255,.15);border-radius:1px}

/* Window content */
.win-body{flex:1;overflow:auto;position:relative;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
.win-body::-webkit-scrollbar{width:5px}
.win-body::-webkit-scrollbar-track{background:transparent}
.win-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

/* ═══════ APP: HOME/FINDER ═══════ */
.app-finder{padding:20px 22px 22px}
.finder-sidebar{display:none}

.home-word{
  font-size:60px;font-weight:200;letter-spacing:16px;text-indent:16px;
  color:rgba(255,255,255,.88);line-height:1;text-align:center;
  animation:wordGlow 5s ease-in-out infinite;
  text-shadow:0 0 40px rgba(255,255,255,.08);
}
@keyframes wordGlow{0%,100%{text-shadow:0 0 30px rgba(255,255,255,.06)}50%{text-shadow:0 0 55px rgba(180,210,255,.2),0 0 90px rgba(120,160,255,.08)}}
.home-badge{display:inline-flex;align-items:center;gap:6px;margin:8px auto 0;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);font-size:9.5px;letter-spacing:2.2px;color:rgba(255,255,255,.28);text-transform:uppercase}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:rgba(48,209,88,.8);box-shadow:0 0 6px rgba(48,209,88,.6);animation:pd 2s ease-in-out infinite}
@keyframes pd{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.5);opacity:1}}
.home-div{height:1px;margin:16px 0 14px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07) 20%,rgba(255,255,255,.07) 80%,transparent)}
#tw{font-size:11.5px;font-weight:300;font-style:italic;color:rgba(255,255,255,.26);text-align:center;min-height:17px;margin-bottom:18px;letter-spacing:.3px}
#tw::after{content:'|';color:rgba(255,255,255,.4);animation:bl 1s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

.srch-wrap{margin-bottom:18px}
.srch-row{display:flex;align-items:center;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:11px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.srch-wrap:focus-within .srch-row{border-color:rgba(255,255,255,.2);box-shadow:0 0 0 3px rgba(10,132,255,.14)}
.srch-ic{padding:0 6px 0 13px;color:rgba(255,255,255,.3);flex-shrink:0;transition:color .18s}
.srch-wrap:focus-within .srch-ic{color:rgba(255,255,255,.6)}
#s-inp{flex:1;background:transparent;border:none;padding:11px 10px 11px 4px;font-family:var(--font);font-size:13.5px;font-weight:300;color:rgba(255,255,255,.9);letter-spacing:.1px}
#s-inp::placeholder{color:rgba(255,255,255,.2)}
#s-inp:focus{outline:none}
.s-go{margin:5px;padding:8px 18px;background:rgba(10,132,255,.85);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;box-shadow:0 2px 8px rgba(10,132,255,.4);transition:background .14s,transform .1s var(--sp)}
.s-go:hover{background:rgba(10,132,255,1)}
.s-go:active{transform:scale(.92)}

.sec-lbl{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:9px;display:flex;align-items:center;gap:9px}
.sec-lbl::before,.sec-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

.ql-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.ql-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px 11px;border-radius:14px;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:background .18s,border-color .18s,transform .22s var(--sp);position:relative;overflow:hidden}
.ql-item::before{content:'';position:absolute;top:0;left:0;right:0;height:46%;border-radius:14px 14px 58% 58%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);pointer-events:none}
.ql-item:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.13);transform:translateY(-3px) scale(1.03)}
.ql-item:active{transform:scale(.95)!important;transition-duration:.08s}
.ql-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.12) inset}
.ql-ico::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:45%;border-radius:10px 10px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.03));pointer-events:none;z-index:2}
.ql-lbl{font-size:10px;color:rgba(255,255,255,.42);letter-spacing:.3px;transition:color .18s}
.ql-item:hover .ql-lbl{color:rgba(255,255,255,.75)}

.g-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.g-strip::-webkit-scrollbar{display:none}
.g-card{flex-shrink:0;width:114px;border-radius:12px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:background .18s,border-color .18s,transform .22s var(--sp)}
.g-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.13);transform:translateY(-3px) scale(1.04)}
.g-card:active{transform:scale(.94)!important;transition-duration:.08s}
.g-th{width:100%;height:60px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.g-th::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.4));pointer-events:none}
.g-info{padding:5px 8px 7px}
.g-name{font-size:10px;font-weight:500;color:rgba(255,255,255,.72);margin-bottom:2px}
.g-tag{font-size:7.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;display:inline-block}

/* ═══════ APP: BROWSER ═══════ */
.app-browser{display:flex;flex-direction:column;height:100%}
.br-chrome{display:flex;align-items:center;gap:6px;padding:7px 11px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.br-btn{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);cursor:pointer;transition:background .12s,color .12s,transform .1s;flex-shrink:0}
.br-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.br-btn:active{transform:scale(.84)}
.br-bar{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;overflow:hidden;transition:border-color .18s,box-shadow .18s}
.br-bar:focus-within{border-color:rgba(255,255,255,.18);box-shadow:0 0 0 2px rgba(10,132,255,.15)}
.br-lock{padding:0 5px 0 8px;color:rgba(255,255,255,.22);flex-shrink:0}
#br-url{flex:1;background:transparent;border:none;padding:6px 8px 6px 0;font-family:var(--font);font-size:12px;font-weight:300;color:rgba(255,255,255,.82)}
#br-url:focus{outline:none}
.br-go{margin:3px;padding:5px 11px;background:rgba(10,132,255,.75);border:none;border-radius:6px;color:#fff;font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:background .14s}
.br-go:hover{background:rgba(10,132,255,1)}
.br-vp{flex:1;position:relative;background:#030509}
#br-frame{width:100%;height:100%;border:none;display:none}
.br-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.35}
.br-empty svg{width:44px;height:44px}
.br-empty-t{font-size:12px;font-weight:300;color:rgba(255,255,255,.5)}
.br-empty-h{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* ═══════ APP: GAMES ═══════ */
.app-games{padding:16px 18px 20px}
.games-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.games-hdr-t{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.25)}
.games-hdr-s{font-size:10px;color:rgba(255,255,255,.15)}
.games-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.gm-card{border-radius:13px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:background .18s,border-color .18s,transform .22s var(--sp)}
.gm-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);transform:translateY(-3px) scale(1.04)}
.gm-card:active{transform:scale(.94)!important;transition-duration:.08s}
.gm-th{width:100%;height:68px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.gm-th::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 44%,rgba(0,0,0,.4));pointer-events:none}
.gm-info{padding:6px 10px 9px}
.gm-name{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.75);margin-bottom:2px}
.gm-tag{font-size:7.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;display:inline-block}

/* ═══════ APP: SETTINGS ═══════ */
.app-settings{padding:20px 22px}
.set-section{margin-bottom:22px}
.set-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-bottom:6px}
.set-row-l{display:flex;flex-direction:column;gap:2px}
.set-row-name{font-size:13px;font-weight:400;color:rgba(255,255,255,.82)}
.set-row-desc{font-size:11px;color:rgba(255,255,255,.32)}
.toggle{width:40px;height:24px;border-radius:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.1);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green);border-color:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s var(--sp)}
.toggle.on::after{transform:translateX(16px)}
.set-badge{font-size:10px;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
.wallpaper-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
.wp-swatch{height:44px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s var(--sp);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.wp-swatch:hover{transform:scale(1.06)}
.wp-swatch.active{border-color:white}
.accent-row{display:flex;gap:8px;margin-top:8px}
.accent-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .14s,transform .14s var(--sp);box-shadow:0 2px 6px rgba(0,0,0,.4)}
.accent-dot:hover{transform:scale(1.12)}
.accent-dot.active{border-color:white}

/* ═══════ APP: TERMINAL ═══════ */
.app-terminal{padding:14px 16px;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12px;color:rgba(50,210,100,.9);background:rgba(0,0,0,.5);height:100%;overflow-y:auto}
.term-line{margin-bottom:2px;line-height:1.55}
.term-prompt{color:rgba(80,180,255,.8)}
.term-output{color:rgba(200,230,200,.7);margin-left:0}
.term-error{color:rgba(255,80,80,.8)}
.term-input-row{display:flex;align-items:center;gap:6px;margin-top:4px}
#term-inp{flex:1;background:transparent;border:none;color:rgba(50,210,100,.9);font-family:inherit;font-size:12px;caret-color:rgba(50,210,100,.9)}
#term-inp:focus{outline:none}

/* ═══════ CONTEXT MENU ═══════ */
#ctx-menu{
  position:fixed;z-index:5000;
  background:rgba(30,30,44,.88);
  backdrop-filter:var(--blur-sm);
  -webkit-backdrop-filter:var(--blur-sm);
  border:1px solid rgba(255,255,255,.14);
  border-top:1px solid rgba(255,255,255,.24);
  border-radius:10px;
  padding:5px;
  min-width:190px;
  box-shadow:0 20px 50px rgba(0,0,0,.65);
  display:none;
  animation:ctxIn .12s var(--eo) both;
}
@keyframes ctxIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.ctx-item{padding:6px 11px;border-radius:6px;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.82);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.ctx-item:hover{background:var(--accent);color:#fff}
.ctx-item.danger:hover{background:var(--red)}
.ctx-sep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}
.ctx-sub{font-size:10px;color:rgba(255,255,255,.3)}
.ctx-item:hover .ctx-sub{color:rgba(255,255,255,.6)}

/* ═══════ DOCK ═══════ */
#dock-wrap{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  z-index:900;
  display:flex;align-items:flex-end;
  background:rgba(255,255,255,.09);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.15);
  border-top:1px solid rgba(255,255,255,.28);
  border-radius:18px;
  padding:7px 10px 8px;
  gap:5px;
  box-shadow:0 20px 50px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.08) inset;
}
.dock-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;cursor:pointer;
  transition:transform .01s;
}
.dock-ico{
  width:50px;height:50px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.12) inset;
  transition:transform .25s var(--sp),filter .2s;
  will-change:transform;
}
.dock-ico::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:46%;border-radius:12px 12px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.04));pointer-events:none;z-index:2}
.dock-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45);opacity:0;transition:opacity .2s}
.dock-item.running .dock-dot{opacity:1}
.dock-sep{width:1px;height:42px;background:rgba(255,255,255,.12);margin:0 2px;align-self:center}
.dock-label{
  position:absolute;bottom:100%;left:50%;transform:translateX(-50%) translateY(-6px);
  background:rgba(20,20,32,.9);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);border-radius:6px;
  padding:4px 10px;font-size:11px;font-weight:500;color:rgba(255,255,255,.88);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s,transform .15s var(--sp);
  box-shadow:0 6px 16px rgba(0,0,0,.5);
  transform:translateX(-50%) translateY(-6px) scale(.9);
}
.dock-item:hover .dock-label{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1)}

/* ═══════ NOTIFICATIONS ═══════ */
#notif-stack{position:fixed;top:36px;right:14px;z-index:4000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif{
  width:280px;border-radius:14px;overflow:hidden;pointer-events:all;
  background:rgba(25,25,38,.85);backdrop-filter:var(--blur-sm);
  border:1px solid rgba(255,255,255,.13);border-top:1px solid rgba(255,255,255,.22);
  box-shadow:0 16px 40px rgba(0,0,0,.55);
  animation:notifIn .4s var(--sp) both;
  padding:12px 14px;
  display:flex;gap:11px;align-items:flex-start;
}
@keyframes notifIn{from{opacity:0;transform:translateX(24px) scale(.94)}to{opacity:1;transform:none}}
.notif.out{animation:notifOut .3s var(--eo) both}
@keyframes notifOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(24px) scale(.9)}}
.notif-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.88);margin-bottom:2px}
.notif-msg{font-size:11px;color:rgba(255,255,255,.45);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.notif-time{font-size:10px;color:rgba(255,255,255,.22);flex-shrink:0;margin-top:1px}

/* ═══════ SPOTLIGHT ═══════ */
#spotlight{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:8000;
  background:rgba(0,0,0,.45);backdrop-filter:blur(20px);
  display:none;align-items:flex-start;justify-content:center;padding-top:15vh;
}
#spotlight.open{display:flex;animation:spIn .2s var(--eo) both}
@keyframes spIn{from{opacity:0}to{opacity:1}}
.sp-box{width:520px;border-radius:14px;overflow:hidden;background:rgba(28,28,42,.88);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.16);border-top:1px solid rgba(255,255,255,.28);box-shadow:0 30px 80px rgba(0,0,0,.7)}
.sp-row{display:flex;align-items:center;padding:14px 18px;gap:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sp-ic{color:rgba(255,255,255,.35);flex-shrink:0}
#sp-inp{flex:1;background:transparent;border:none;font-family:var(--font);font-size:17px;font-weight:300;color:rgba(255,255,255,.9);letter-spacing:.1px}
#sp-inp::placeholder{color:rgba(255,255,255,.2)}
#sp-inp:focus{outline:none}
.sp-results{padding:6px}
.sp-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
.sp-item:hover,.sp-item.sp-sel{background:var(--accent)}
.sp-item-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sp-item-name{font-size:13px;color:rgba(255,255,255,.82)}
.sp-item-desc{font-size:11px;color:rgba(255,255,255,.36)}
.sp-item:hover .sp-item-name,.sp-item.sp-sel .sp-item-name{color:#fff}
.sp-item:hover .sp-item-desc,.sp-item.sp-sel .sp-item-desc{color:rgba(255,255,255,.65)}

/* ═══════ LOADER ═══════ */
#loader{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(28px);
  opacity:0;pointer-events:none;transition:opacity .25s var(--eo);
}
#loader.on{opacity:1;pointer-events:all}
.ld-card{
  width:290px;padding:30px 26px 24px;text-align:center;border-radius:18px;
  background:rgba(18,18,28,.82);backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.13);border-top:1px solid rgba(255,255,255,.24);
  box-shadow:0 40px 80px rgba(0,0,0,.7);
  animation:ldIn .35s var(--sp) both;
}
@keyframes ldIn{from{transform:scale(.9) translateY(10px)}to{transform:none}}
.ld-rings{width:50px;height:50px;margin:0 auto 16px;position:relative}
.ld-r{position:absolute;top:50%;left:50%;border-radius:50%;border-style:solid;border-color:transparent}
.ld-r1{width:50px;height:50px;margin:-25px 0 0 -25px;border-width:1.5px;border-top-color:rgba(10,132,255,.9);animation:spin 1.1s linear infinite}
.ld-r2{width:36px;height:36px;margin:-18px 0 0 -18px;border-width:1.5px;border-top-color:rgba(255,255,255,.3);animation:spin .75s linear infinite reverse}
.ld-r3{width:22px;height:22px;margin:-11px 0 0 -11px;border-width:1.5px;border-top-color:rgba(10,132,255,.55);animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-title{font-size:16px;font-weight:600;color:rgba(255,255,255,.88);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
#ld-sub{font-size:11px;font-weight:300;font-style:italic;color:rgba(255,255,255,.32);margin-bottom:14px;min-height:15px}
.ld-prog{height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:10px}
#ld-bar{height:100%;width:0;background:linear-gradient(90deg,#0A84FF,#5AC8FA);box-shadow:0 0 8px rgba(10,132,255,.6);transition:width .35s var(--eo);border-radius:2px}
#ld-st{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.18);min-height:12px}
#ld-cancel{margin-top:14px;background:none;border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:6px 18px;font-family:var(--font);font-size:11px;color:rgba(255,255,255,.28);cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.5px}
#ld-cancel:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.55)}

/* ═══════ UTILS ═══════ */

</style>

(function(){
  const cv=document.getElementById('stars'),ctx=cv.getContext('2d');
  const rs=()=>{cv.width=innerWidth;cv.height=innerHeight};rs();addEventListener('resize',rs);
  const st=Array.from({length:300},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.3+.1,a:Math.random()*.45+.05,t:Math.random()*100,ts:Math.random()*.011+.003}));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    st.forEach(s=>{s.t+=s.ts;const al=s.a*(.38+.62*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#c0e8ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore()});
    requestAnimationFrame(draw);
  }draw();
})();

const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cur.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
  // bring cursor to front
});
document.addEventListener('mousedown',()=>document.body.classList.add('cur-click'));
document.addEventListener('mouseup',()=>document.body.classList.remove('cur-click'));
document.addEventListener('mouseover',e=>{
  const t=e.target;
  if(t.tagName==='INPUT'||t.tagName==='TEXTAREA'){document.body.classList.add('cur-text');document.body.classList.remove('cur-hover')}
  else if(t.closest('button,a,.dock-item,.wc,.app-icon,.game-card,.gm-card,.ql-item,.g-card,.ctx-item,.sp-item,.desk-icon,.toggle,.wp-swatch,.accent-dot,.mb-btn,.br-btn,.nav-btn,.set-row')){document.body.classList.add('cur-hover');document.body.classList.remove('cur-text')}
  else{document.body.classList.remove('cur-hover','cur-text')}
});

function openApp(id){
  if(openWindows[id]){
    // bring to front / unminimize
    const w=openWindows[id];
    w.classList.remove('minimized');
    focusWindow(id);
    return;
  }
  const cfg=winConfigs[id];
  const win=document.createElement('div');
  win.className='window opening';
  win.id='win-'+id;
  win.style.cssText=`left:${cfg.x()}px;top:${cfg.y()}px;width:${cfg.w}px;height:${cfg.h}px;z-index:${++zTop}`;
  win.innerHTML=buildWindowHTML(id,cfg);
  document.getElementById('desktop').appendChild(win);
  openWindows[id]=win;
  makeDraggable(win,id);
  makeResizable(win);
  focusWindow(id);
  // mark dock running
  const dEl=document.getElementById('d-'+id);
  if(dEl) dEl.classList.add('running');
  win.addEventListener('animationend',()=>win.classList.remove('opening'),{once:true});
  postOpenSetup(id);
  updateMenuBar(id,cfg.title);
}

function buildWindowHTML(id,cfg){
  const controls=`<div class="win-controls"><div class="wc wc-r" onclick="closeWindow('${id}')"></div><div class="wc wc-y" onclick="minimizeWindow('${id}')"></div><div class="wc wc-g" onclick="maximizeWindow('${id}')"></div></div>`;
  const titleBar=`<div class="win-title"><div class="win-controls"><div class="wc wc-r" onclick="closeWindow('${id}')"></div><div class="wc wc-y" onclick="minimizeWindow('${id}')"></div><div class="wc wc-g" onclick="maximizeWindow('${id}')"></div></div><div class="win-title-text">${cfg.title}</div><div style="width:46px"></div></div>`;
  const body=`<div class="win-body">${buildAppContent(id)}</div>`;
  return titleBar+body+`<div class="win-resize"></div>`;
}

function buildAppContent(id){
  if(id==='home') return buildHome();
  if(id==='browser') return buildBrowser();
  if(id==='games') return buildGames();
  if(id==='terminal') return buildTerminal();
  if(id==='settings') return buildSettings();
  return '';
}

/* ════ Window drag ════ */
function makeDraggable(win,id){
  const tb=win.querySelector('.win-title');
  let sx,sy,ox,oy,dragging=false;
  tb.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wc')) return;
    focusWindow(id);
    dragging=true;
    sx=e.clientX;sy=e.clientY;
    ox=win.offsetLeft;oy=win.offsetTop;
    win.style.transition='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const nx=ox+(e.clientX-sx);
    const ny=Math.max(26,oy+(e.clientY-sy));
    win.style.left=nx+'px';
    win.style.top=ny+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;win.style.transition='';}
  });
  win.addEventListener('mousedown',()=>focusWindow(id));
}

/* ════ Window resize ════ */
function makeResizable(win){
  const rh=win.querySelector('.win-resize');
  let sx,sy,sw,sh,resizing=false;
  rh.addEventListener('mousedown',e=>{
    resizing=true;sx=e.clientX;sy=e.clientY;sw=win.offsetWidth;sh=win.offsetHeight;e.preventDefault();e.stopPropagation();
  });
  document.addEventListener('mousemove',e=>{
    if(!resizing) return;
    const nw=Math.max(320,sw+(e.clientX-sx));
    const nh=Math.max(220,sh+(e.clientY-sy));
    win.style.width=nw+'px';win.style.height=nh+'px';
  });
  document.addEventListener('mouseup',()=>{resizing=false;});
}

function focusWindow(id){
  Object.keys(openWindows).forEach(k=>{
    openWindows[k].classList.toggle('active',k===id);
    const z=k===id?++zTop:parseInt(openWindows[k].style.zIndex)||100;
    if(k===id) openWindows[k].style.zIndex=z;
  });
  updateMenuBar(id,winConfigs[id]?.title||'atomOS');
}

function closeWindow(id){
  const win=openWindows[id];if(!win) return;
  win.classList.add('closing');
  win.addEventListener('animationend',()=>{win.remove();delete openWindows[id];},{ once:true});
  const dEl=document.getElementById('d-'+id);
  if(dEl) dEl.classList.remove('running');
}

function minimizeWindow(id){
  const win=openWindows[id];if(!win) return;
  win.classList.add('minimized');
}

let maximized={};
function maximizeWindow(id){
  const win=openWindows[id];if(!win) return;
  if(maximized[id]){
    const s=maximized[id];
    win.style.left=s.left;win.style.top=s.top;win.style.width=s.w;win.style.height=s.h;
    delete maximized[id];
  } else {
    maximized[id]={left:win.style.left,top:win.style.top,w:win.style.width,h:win.style.height};
    win.style.left='0px';win.style.top='26px';
    win.style.width=innerWidth+'px';win.style.height=(innerHeight-26-76)+'px';
  }
}

function updateMenuBar(id,title){
  document.getElementById('mb-appname').textContent=title||'atomOS';
  document.getElementById('mb-center').textContent=title||'atomOS';
}

const phrases=["bro the teacher is literally right behind you","nasa called, they want their firewall back","proxy shields at 100% · grades at 12%","currently disguised as a google doc","quantum tunneling through the content filter","this definitely counts as computer science class","the firewall saw nothing. the firewall knows nothing.","speed of light: 3×10⁸ m/s · bypass speed: faster"];
let twPi=0,twCi=0,twEr=false,twTimeout=null;
function startTypewriter(){
  const el=document.getElementById('tw');if(!el) return;
  if(twTimeout) clearTimeout(twTimeout);
  function step(){
    const el2=document.getElementById('tw');if(!el2) return;
    const ph=phrases[twPi];
    if(!twEr){el2.textContent=ph.substring(0,twCi++);if(twCi>ph.length){twEr=true;twTimeout=setTimeout(step,2600);}else twTimeout=setTimeout(step,40);}
    else{el2.textContent=ph.substring(0,twCi--);if(twCi<0){twEr=false;twPi=(twPi+1)%phrases.length;twTimeout=setTimeout(step,240);}else twTimeout=setTimeout(step,11);}
  }
  step();
}

const termCmds={
  help:()=>`Available commands:\n  help     — show this message\n  ls       — list apps\n  open     — open [app]\n  clear    — clear terminal\n  date     — current date\n  whoami   — who are you\n  proxy    — proxy status\n  fortune  — random fortune`,
  ls:()=>'home  browser  games  terminal  settings',
  open:(a)=>{if(a&&winConfigs[a]){openApp(a);return'Opening '+a+'…';}return'Unknown app. Try: '+Object.keys(winConfigs).join(', ')},
  clear:()=>'__clear__',
  date:()=>new Date().toString(),
  whoami:()=>'anonymous@atomos ~',
  proxy:()=>'● Proxy active — all traffic secured\n  Encoding: UV/Ultraviolet\n  Status: Online',
  fortune:()=>{const f=['The teacher is close. Stay calm.','Your firewall evasion skills are S-tier.','Error 403: Your freedom was denied. Fixed.','Grades: 12%. Fun: 100%.','The IT admin has no idea. Keep going.'];return f[Math.floor(Math.random()*f.length)]},
};
function termInput(e){
  if(e.key!=='Enter') return;
  const inp=document.getElementById('term-inp');if(!inp) return;
  const val=inp.value.trim();
  const body=document.getElementById('terminal-body');
  if(!body) return;
  const inputRow=body.querySelector('.term-input-row');
  const [cmd,...args]=val.split(' ');
  // echo command
  const echoDiv=document.createElement('div');
  echoDiv.className='term-line';
  echoDiv.innerHTML=`<span class="term-prompt">atom@os ~ %</span> ${val}`;
  body.insertBefore(echoDiv,inputRow);
  if(val){
    const fn=termCmds[cmd];
    let out=fn?fn(args[0]):`zsh: command not found: ${cmd}`;
    if(out==='__clear__'){
      Array.from(body.children).forEach(c=>{if(c!==inputRow) c.remove()});
    } else {
      out.split('\n').forEach(line=>{
        const d=document.createElement('div');
        d.className='term-line term-output';
        d.textContent=line;
        body.insertBefore(d,inputRow);
      });
    }
  }
  inp.value='';
  body.scrollTop=body.scrollHeight;
}

function openSpotlight(){spEl.classList.add('open');setTimeout(()=>spInp.focus(),50);spSearch('');}
function closeSpotlight(e){if(!e||e.target===spEl){spEl.classList.remove('open');spInp.value='';spResults.innerHTML='';}}
function spSearch(q){
  spFiltered=q?spItems.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())||i.desc.toLowerCase().includes(q.toLowerCase())):spItems.slice(0,6);
  spSel=0;renderSpResults();
}
function renderSpResults(){
  spResults.innerHTML=spFiltered.slice(0,8).map((it,i)=>`<div class="sp-item${i===spSel?' sp-sel':''}" onclick="spRun(${i})"><div class="sp-item-ico icon-bg-blue" style="font-size:12px;color:white">◉</div><div><div class="sp-item-name">${it.name}</div><div class="sp-item-desc">${it.desc}</div></div></div>`).join('');
}
function spRun(i){const it=spFiltered[i];if(it){it.action();spEl.classList.remove('open');spInp.value='';spResults.innerHTML='';}}
function spKey(e){
  if(e.key==='ArrowDown'){spSel=Math.min(spSel+1,spFiltered.length-1);renderSpResults();}
  else if(e.key==='ArrowUp'){spSel=Math.max(spSel-1,0);renderSpResults();}
  else if(e.key==='Enter'){spRun(spSel);}
  else if(e.key==='Escape'){closeSpotlight();}
}

function launchSite(u){
  const seq=seqs[Math.floor(Math.random()*seqs.length)];

    const cx=r.left+r.width/2;
    const dist=Math.abs(e.clientX-cx);

      const s=1+(1-dist/maxD)*.32;

      ico.style.transform=`scale(${s}) translateY(-${lift}px)`;
    } else ico.style.transform='';
  });
});
