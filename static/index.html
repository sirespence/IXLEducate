<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow: #4dd8f5;
            --glow2: #7ef0ff;
            --glass-border: rgba(255,255,255,0.08);
            --text: #d8f4ff;
            --text-dim: rgba(180,220,255,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #020204;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: default;
        }

        .sky-bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 40% at 50% 100%, rgba(8,18,50,0.7) 0%, transparent 70%),
                linear-gradient(180deg, #010103 0%, #040410 40%, #060614 70%, #080a1c 100%);
        }

        .aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .aurora-band {
            position: absolute; width: 200%; height: 160px;
            border-radius: 50%; filter: blur(50px); opacity: 0;
            animation: auroraFloat 10s ease-in-out infinite;
        }
        .aurora-band:nth-child(1) {
            background: linear-gradient(90deg, transparent, rgba(0,140,210,0.07), rgba(50,200,190,0.04), transparent);
            top: 20%; left: -50%; animation-delay: 0s;
        }
        .aurora-band:nth-child(2) {
            background: linear-gradient(90deg, transparent, rgba(20,90,190,0.06), rgba(0,180,170,0.03), transparent);
            top: 33%; left: -30%; animation-delay: 3.5s;
        }
        .aurora-band:nth-child(3) {
            background: linear-gradient(90deg, transparent, rgba(0,110,190,0.05), rgba(90,50,190,0.03), transparent);
            top: 50%; left: -70%; animation-delay: 7s;
        }
        @keyframes auroraFloat {
            0%   { opacity: 0; transform: translateX(0) scaleY(1); }
            30%  { opacity: 1; }
            70%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateX(55%) scaleY(1.2); }
        }

        #starCanvas { position: fixed; inset: 0; z-index: 0; }

        .orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(70px); animation: orbDrift linear infinite; }
        .orb:nth-child(1) { width: 260px; height: 260px; background: radial-gradient(circle, rgba(0,80,180,0.07) 0%, transparent 70%); top: 55%; left: 8%; animation-duration: 22s; }
        .orb:nth-child(2) { width: 170px; height: 170px; background: radial-gradient(circle, rgba(40,160,210,0.06) 0%, transparent 70%); top: 35%; right: 6%; animation-duration: 17s; animation-delay: -8s; }
        .orb:nth-child(3) { width: 130px; height: 130px; background: radial-gradient(circle, rgba(0,180,150,0.04) 0%, transparent 70%); top: 65%; right: 22%; animation-duration: 20s; animation-delay: -5s; }
        @keyframes orbDrift {
            0%,100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50%      { transform: translateY(-26px) scale(1.08); opacity: 0.9; }
        }

        .horizon {
            position: fixed; bottom: 0; left: 0; right: 0; height: 28%; z-index: 0;
            background: linear-gradient(to top, rgba(6,16,45,0.18) 0%, transparent 100%);
            pointer-events: none;
        }
        .horizon::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(20,110,180,0.35), rgba(77,216,245,0.45), rgba(20,110,180,0.35), transparent);
            box-shadow: 0 0 12px rgba(77,216,245,0.2), 0 0 35px rgba(0,80,180,0.08);
        }

        .planet {
            position: fixed; bottom: -70px; right: 70px;
            width: 190px; height: 190px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%,
                rgba(160,210,255,0.1) 0%, rgba(30,65,145,0.22) 30%,
                rgba(5,10,35,0.88) 70%, #010206 100%);
            box-shadow: 0 0 25px rgba(0,60,140,0.18), 0 0 70px rgba(0,50,120,0.08),
                inset -7px -7px 22px rgba(0,0,0,0.75), inset 3px 3px 12px rgba(40,120,200,0.07);
            border: 1px solid rgba(25,65,140,0.12);
            z-index: 0; pointer-events: none; animation: planetFloat 7s ease-in-out infinite;
        }
        .planet-ring {
            position: absolute; width: 265px; height: 44px; border-radius: 50%;
            border: 1px solid rgba(30,100,180,0.13);
            top: 50%; left: 50%; transform: translate(-50%,-50%) rotateX(75deg);
            box-shadow: 0 0 10px rgba(30,100,180,0.07);
        }
        .planet-sm {
            position: fixed; top: 70px; left: -25px;
            width: 92px; height: 92px; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%,
                rgba(130,185,255,0.09) 0%, rgba(15,50,120,0.28) 40%,
                rgba(3,8,22,0.92) 80%, #010104 100%);
            box-shadow: 0 0 12px rgba(0,50,120,0.12), inset -3px -3px 10px rgba(0,0,0,0.75);
            z-index: 0; pointer-events: none; opacity: 0.45;
            animation: planetFloat 10s ease-in-out infinite; animation-delay: -4s;
        }
        @keyframes planetFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* ── UI ─────────────────────────────── */
        .ui {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
        }
        .ui > * { pointer-events: all; }

        .wordmark {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px; font-weight: 700;
            letter-spacing: 14px; text-transform: uppercase;
            color: transparent;
            background: linear-gradient(180deg, rgba(255,255,255,0.88) 0%, var(--glow2) 45%, var(--glow) 75%, rgba(0,120,185,0.5) 100%);
            -webkit-background-clip: text; background-clip: text;
            filter: drop-shadow(0 0 22px rgba(77,216,245,0.35)) drop-shadow(0 0 55px rgba(0,100,180,0.18));
            margin-bottom: 6px; user-select: none;
            animation: wordmarkPulse 5s ease-in-out infinite;
        }
        @keyframes wordmarkPulse {
            0%,100% { filter: drop-shadow(0 0 22px rgba(77,216,245,0.35)) drop-shadow(0 0 55px rgba(0,100,180,0.18)); }
            50%      { filter: drop-shadow(0 0 32px rgba(77,216,245,0.6)) drop-shadow(0 0 75px rgba(0,100,180,0.3)); }
        }

        #subtitle {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            letter-spacing: 4px; text-transform: lowercase;
            min-height: 18px; text-align: center; margin-bottom: 40px;
        }
        #subtitle::after { content: '▌'; color: var(--glow); animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .search-wrap {
            display: flex; width: 420px; margin-bottom: 36px;
            border-radius: 50px;
            background: rgba(4,5,14,0.72);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 0 1px rgba(77,216,245,0.05), 0 8px 32px rgba(0,0,0,0.65),
                inset 0 1px 0 rgba(255,255,255,0.05), inset 0 0 18px rgba(0,40,100,0.05);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            overflow: hidden; transition: box-shadow 0.3s, border-color 0.3s;
        }
        .search-wrap:focus-within {
            border-color: rgba(77,216,245,0.22);
            box-shadow: 0 0 0 1px rgba(77,216,245,0.14), 0 8px 40px rgba(0,0,0,0.75),
                0 0 22px rgba(77,216,245,0.07), inset 0 1px 0 rgba(255,255,255,0.09);
        }
        #uv-address {
            flex: 1; background: transparent; border: none;
            padding: 14px 22px; font-size: 13px;
            font-family: 'Nunito', sans-serif; font-weight: 600;
            color: var(--text); letter-spacing: 0.3px;
        }
        #uv-address::placeholder { color: var(--text-dim); }
        #uv-address:focus { outline: none; }

        .go-btn {
            background: linear-gradient(135deg, rgba(0,100,160,0.18), rgba(0,65,120,0.12));
            border: none; border-left: 1px solid var(--glass-border);
            padding: 14px 22px; cursor: pointer;
            color: var(--glow); font-size: 18px;
            transition: all 0.2s; border-radius: 0 50px 50px 0;
        }
        .go-btn:hover { background: linear-gradient(135deg, rgba(0,140,200,0.28), rgba(0,100,180,0.18)); color: #fff; }

        .tiles { display: flex; gap: 10px; }

        .tile {
            width: 80px; height: 90px;
            background: rgba(4,5,14,0.62);
            border: 1px solid rgba(255,255,255,0.055);
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 7px;
            text-decoration: none; color: rgba(120,185,225,0.5);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            position: relative; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .tile::before {
            content: ''; position: absolute; inset: 0; border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.035) 0%, transparent 60%);
            pointer-events: none;
        }
        .tile:hover {
            transform: translateY(-6px) scale(1.05);
            border-color: rgba(77,216,245,0.28); color: #c0eaff;
            box-shadow: 0 12px 40px rgba(0,0,0,0.65), 0 0 18px rgba(77,216,245,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            background: rgba(0,22,58,0.5);
        }
        .tile:active { transform: translateY(-2px) scale(0.98); }
        .tile svg { transition: all 0.2s; }
        .tile:hover svg { filter: drop-shadow(0 0 5px var(--glow)); transform: scale(1.1); }
        .tile-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-align: center; }

        #curtain {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, #010103 0%, #040410 50%, #060614 100%);
            z-index: 9999;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.76,0,0.24,1);
            display: flex; align-items: center; justify-content: center;
        }
        #curtain.active { transform: translateY(0); }
        .curtain-inner { text-align: center; }

        .curtain-orb {
            width: 54px; height: 54px; margin: 0 auto 20px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(190,235,255,0.45), rgba(0,120,185,0.45) 40%, rgba(0,35,90,0.5) 70%, transparent);
            box-shadow: 0 0 22px rgba(77,216,245,0.3), 0 0 45px rgba(0,85,160,0.18), inset 0 2px 4px rgba(255,255,255,0.3);
            opacity: 0; transition: opacity 0.3s 0.1s;
        }
        #curtain.active .curtain-orb { opacity: 1; animation: orbPulse 1.4s ease-in-out infinite; }
        @keyframes orbPulse {
            0%,100% { box-shadow: 0 0 22px rgba(77,216,245,0.3), 0 0 45px rgba(0,85,160,0.18); }
            50%      { box-shadow: 0 0 36px rgba(77,216,245,0.55), 0 0 72px rgba(0,85,160,0.32); }
        }

        .curtain-line { width: 150px; height: 2px; background: rgba(255,255,255,0.04); margin: 0 auto 14px; border-radius: 2px; overflow: hidden; }
        .curtain-fill { height: 100%; background: linear-gradient(90deg, rgba(0,65,140,0.8), var(--glow), var(--glow2)); width: 0; border-radius: 2px; box-shadow: 0 0 6px var(--glow); }
        #curtain.active .curtain-fill { animation: fillBar 0.8s 0.15s cubic-bezier(0.4,0,0.2,1) forwards; }
        @keyframes fillBar { to { width: 100%; } }

        #curtain-msg {
            font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 400;
            color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; transition: opacity 0.3s 0.2s;
        }
        #curtain.active #curtain-msg { opacity: 1; }
    </style>
</head>
<body>

<div class="sky-bg"></div>
<div class="aurora">
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
    <div class="aurora-band"></div>
</div>
<canvas id="starCanvas"></canvas>
<div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
</div>
<div class="horizon"></div>
<div class="planet"><div class="planet-ring"></div></div>
<div class="planet-sm"></div>

<div id="curtain">
    <div class="curtain-inner">
        <div class="curtain-orb"></div>
        <div class="curtain-line"><div class="curtain-fill"></div></div>
        <div id="curtain-msg">routing</div>
    </div>
</div>

<div class="ui">
    <div class="wordmark">atom</div>
    <div id="subtitle"></div>

    <div class="search-wrap">
        <input id="uv-address" type="text" placeholder="search the cosmos or enter a url" autocomplete="off" spellcheck="false">
        <button class="go-btn" id="goBtn">⟶</button>
    </div>

    <div class="tiles">
        <!-- Sonic Mania -->
        <a href="#" onclick="launch('https://sonic-mania-online.web.app/');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <circle cx="15" cy="16" r="8" fill="none" stroke="var(--glow)" stroke-width="1.2"/>
                <circle cx="15" cy="11" r="4.5" fill="none" stroke="var(--glow)" stroke-width="1.2"/>
                <path d="M12 9 L10 4M13.5 8.5 L13 3M15 8.5 L15.5 3M16.5 9 L18 4M18 10 L20.5 5.5" stroke="var(--glow)" stroke-width="1.2"/>
                <circle cx="17" cy="10.5" r="1.2" fill="var(--glow)"/>
                <path d="M3 19 L9 19M2 21 L8 21" stroke="var(--glow)" stroke-width="1" opacity="0.4"/>
            </svg>
            <span class="tile-label">mania</span>
        </a>

        <!-- Roblox via EasyFun -->
        <a href="#" onclick="launch('https://www.easyfun.gg/games/roblox.html');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <rect x="9" y="7" width="12" height="12" rx="2" stroke="var(--glow)" stroke-width="1.2" fill="none" transform="rotate(15 15 13)"/>
                <rect x="10" y="17" width="10" height="6" rx="1.5" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <circle cx="15" cy="20" r="1" fill="var(--glow)"/>
            </svg>
            <span class="tile-label">roblox</span>
        </a>

        <!-- YouTube -->
        <a href="#" onclick="launch('https://www.youtube.com');return false;" class="tile">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
                <rect x="3" y="8" width="24" height="16" rx="4" stroke="var(--glow)" stroke-width="1.2" fill="none"/>
                <polygon points="12,11 12,20 21,15.5" fill="var(--glow)" opacity="0.8"/>
            </svg>
            <span class="tile-label">youtube</span>
        </a>
    </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
const starCanvas = document.getElementById('starCanvas');
const sCtx = starCanvas.getContext('2d');
function resizeStar() { starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight; }
resizeStar();
window.addEventListener('resize', resizeStar);

const stars = [];
for (let i = 0; i < 280; i++) {
    stars.push({
        x: Math.random(), y: Math.random() * 0.78,
        r: Math.random() * 1.2 + 0.15,
        a: Math.random() * 0.65 + 0.1,
        speed: Math.random() * 0.006 + 0.002,
        phase: Math.random() * Math.PI * 2
    });
}
let t = 0;
function drawStars() {
    sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
    t += 0.01;
    stars.forEach(s => {
        const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
        sCtx.beginPath();
        sCtx.arc(s.x * starCanvas.width, s.y * starCanvas.height, s.r, 0, Math.PI * 2);
        sCtx.fillStyle = `rgba(200,232,255,${alpha})`;
        sCtx.fill();
    });
    requestAnimationFrame(drawStars);
}
drawStars();

var curtain = document.getElementById('curtain');
var curtainMsg = document.getElementById('curtain-msg');
var sub = document.getElementById('subtitle');

var swReady = false;
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/uv/uv.sw.js', { scope: '/' })
        .then(reg => {
            if (reg.active) { swReady = true; return; }
            var sw = reg.installing || reg.waiting;
            if (sw) sw.addEventListener('statechange', () => {
                if (sw.state === 'activated') swReady = true;
            });
        }).catch(() => { swReady = true; });
} else { swReady = true; }

var phrases = [
    "your gpa just filed for divorce",
    "sonic is faster than your career path",
    "sponsored by 3am academic despair",
    "your teacher is watching. probably.",
    "brainrot level: executive",
    "procrastinating like a high-end ceo",
    "world history homework? never heard of her",
    "your fbi agent is bored, play something",
    "why study when you can just vibe",
    "this proxy is the only thing passing this year",
    "too many tabs, not enough brain cells",
    "luxury proxy, budget lifestyle",
    "running on spite and caffeine",
    "don't let the firewall win",
    "delete your history after this. seriously.",
    "just one more game of sonic, i swear",
    "error 404: homework not found",
    "currently hiring: one (1) motivation",
    "your future boss just saw your tab",
    "staying unblocked since 2026",
    "the wifi blocker has been defeated. again.",
    "education.exe has stopped responding",
];

var pIdx = 0, cIdx = 0, erasing = false;
function type() {
    var cur = phrases[pIdx];
    if (!erasing) {
        sub.innerText = cur.substring(0, cIdx++);
        if (cIdx > cur.length) { erasing = true; setTimeout(type, 2600); }
        else setTimeout(type, 48);
    } else {
        sub.innerText = cur.substring(0, cIdx--);
        if (cIdx < 0) { erasing = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 350); }
        else setTimeout(type, 20);
    }
}
type();

var loadMsgs = ["routing","bypassing firewall","going fast","loading chaos","escaping homework","launching into orbit","deploying brainrot","warping space"];

function launch(url) {
    curtainMsg.innerText = loadMsgs[Math.floor(Math.random() * loadMsgs.length)];
    curtain.classList.add('active');
    var attempts = 0;
    function go() {
        if (swReady || attempts++ > 40) {
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        } else { setTimeout(go, 100); }
    }
    setTimeout(go, 400);
}

function doSearch(val) {
    if (!val.trim()) return;
    var url = (val.includes('.') && !val.includes(' '))
        ? (val.startsWith('http') ? val : 'https://' + val)
        : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
    launch(url);
}

document.getElementById('uv-address').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(e.target.value);
});
document.getElementById('goBtn').addEventListener('click', () => {
    doSearch(document.getElementById('uv-address').value);
});
</script>
</body>
</html>
