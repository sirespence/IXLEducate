<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>atom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;
  --surface:#0b0e18;
  --border:rgba(255,255,255,.06);
  --border-hi:rgba(255,255,255,.11);
  --accent:#4d9fff;
  --accent2:#7ec8ff;
  --dim:rgba(255,255,255,.18);
  --mid:rgba(255,255,255,.42);
  --txt:rgba(255,255,255,.82);
  --mono:'DM Mono',monospace;
  --serif:'Instrument Serif',serif;
  --ease:cubic-bezier(.16,1,.3,1)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);cursor:none;-webkit-font-smoothing:antialiased;color:var(--txt)}

/* ── CURSOR ── */
#cur{position:fixed;pointer-events:none;z-index:9999;top:0;left:0}
#co{position:absolute;width:20px;height:20px;border-radius:50%;border:1px solid rgba(77,159,255,.5);transform:translate(-50%,-50%);transition:width .18s var(--ease),height .18s var(--ease),opacity .18s}
#ci{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);box-shadow:0 0 6px var(--accent)}
body.ch #co{width:36px;height:36px;opacity:.6}
body.cc #co{transform:translate(-50%,-50%) scale(.7)}

/* ── SPACE BG ── */
canvas#sc{position:fixed;inset:0;z-index:0;opacity:.6}
#vignette{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(4,6,12,.9) 100%);pointer-events:none}
#glow1{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(30,60,140,.12),transparent 70%);top:-200px;left:-100px;z-index:1;pointer-events:none;filter:blur(60px)}
#glow2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(20,40,100,.1),transparent 70%);bottom:-150px;right:0;z-index:1;pointer-events:none;filter:blur(80px)}

/* ── LAYOUT ── */
#scene{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center}
#win{width:700px;border-radius:16px;overflow:hidden;
  background:rgba(10,13,22,.88);
  border:1px solid var(--border);
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 .5px rgba(255,255,255,.04) inset;
  backdrop-filter:blur(40px);
  animation:fadeUp .6s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── TITLEBAR ── */
#tb{display:flex;align-items:center;height:44px;padding:0 14px;border-bottom:1px solid var(--border);gap:10px;user-select:none}
.tlw{display:flex;gap:6px;align-items:center}
.tl{width:11px;height:11px;border-radius:50%;cursor:pointer;opacity:.7;transition:opacity .15s}
.tl:hover{opacity:1}
.tlr{background:#e0554a}.tly{background:#d4a026}.tlg{background:#5ba95f}
#tabs{display:flex;gap:1px;flex:1;justify-content:center}
.tab{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:color .15s,background .15s}
.tab:hover{color:var(--mid)}
.tab.on{color:var(--txt);background:rgba(255,255,255,.055)}
.tab svg{opacity:.7}
#clk{font-size:10px;letter-spacing:.5px;color:var(--dim);font-style:italic}

/* ── PANELS ── */
#pw{position:relative}
.pn{display:none;animation:pnIn .25s var(--ease) both}
.pn.on{display:block}
@keyframes pnIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ═══ HOME ═══ */
#ph{padding:36px 36px 32px}
.logo-row{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.logo{font-family:var(--serif);font-style:italic;font-size:72px;color:transparent;
  background:linear-gradient(180deg,rgba(255,255,255,.9) 0%,rgba(180,210,255,.6) 100%);
  -webkit-background-clip:text;background-clip:text;line-height:1;letter-spacing:-1px}
.logo-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);opacity:.6;padding:3px 8px;border:1px solid rgba(77,159,255,.2);border-radius:20px;align-self:center}
.sub-line{font-size:11px;letter-spacing:.3px;color:var(--dim);font-style:italic;margin-bottom:28px;min-height:18px}
.sub-line::after{content:'▋';color:rgba(77,159,255,.5);animation:blink 1s step-end infinite;margin-left:2px;font-size:9px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* search */
.srow{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:10px;margin-bottom:28px;transition:border-color .2s,box-shadow .2s;overflow:hidden}
.srow:focus-within{border-color:rgba(77,159,255,.3);box-shadow:0 0 0 3px rgba(77,159,255,.06)}
.sico{padding:0 12px;color:var(--dim);display:flex;align-items:center;flex-shrink:0}
#uva{flex:1;background:transparent;border:none;padding:13px 8px;font-family:var(--mono);font-size:13px;font-weight:300;color:var(--txt);letter-spacing:.3px}
#uva::placeholder{color:rgba(255,255,255,.14)}
#uva:focus{outline:none}
.gbtn{margin:5px;padding:9px 20px;border:none;border-radius:7px;background:rgba(77,159,255,.14);color:var(--accent2);font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s;flex-shrink:0;border:1px solid rgba(77,159,255,.15)}
.gbtn:hover{background:rgba(77,159,255,.22);color:#fff}
.gbtn:active{transform:scale(.95)}

/* quick launch */
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:18px 8px 14px;border-radius:12px;cursor:pointer;text-decoration:none;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  transition:background .18s,border-color .18s,transform .18s var(--ease)}
.tile:hover{background:rgba(77,159,255,.07);border-color:rgba(77,159,255,.2);transform:translateY(-3px)}
.tile:active{transform:translateY(-1px) scale(.97)}
.tic{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.tlab{font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);transition:color .15s}
.tile:hover .tlab{color:var(--mid)}

/* games strip */
.games-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.games-row::-webkit-scrollbar{display:none}
.hgc{flex-shrink:0;width:120px;border-radius:10px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  transition:background .18s,border-color .18s,transform .18s var(--ease)}
.hgc:hover{background:rgba(77,159,255,.07);border-color:rgba(77,159,255,.2);transform:translateY(-3px)}
.hgc:active{transform:scale(.96)}
.hth{width:100%;height:60px;display:flex;align-items:center;justify-content:center;opacity:.85}
.hgi{padding:6px 8px 8px}
.hgn{font-size:9.5px;letter-spacing:.3px;color:var(--mid);margin-bottom:2px}
.hgt{font-size:7.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim)}
.see-all{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:color .15s;padding:3px 0}
.see-all:hover{color:var(--accent)}
.row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

/* thumb colors */
.ts{background:linear-gradient(135deg,#001e10,#003d22)}.t2{background:linear-gradient(135deg,#190f00,#4e2c00)}.tt{background:linear-gradient(135deg,#000720,#001558)}.tp{background:linear-gradient(135deg,#130f00,#3e3000)}.tf{background:linear-gradient(135deg,#000c18,#002e5e)}.tb{background:linear-gradient(135deg,#0f0022,#340060)}.tm{background:linear-gradient(135deg,#1a0000,#5c1400)}.tch{background:linear-gradient(135deg,#080808,#1e1e1e)}.tgd{background:linear-gradient(135deg,#080016,#240040)}.tms{background:linear-gradient(135deg,#001a25,#00426a)}.tsl{background:linear-gradient(135deg,#000b16,#002248)}.tw{background:linear-gradient(135deg,#0a1200,#263600)}

/* ═══ BROWSER ═══ */
#pbr{padding:0}
#bch{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border)}
.nb{width:28px;height:28px;background:transparent;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--dim);cursor:pointer;transition:border-color .14s,color .14s}
.nb:hover{color:var(--mid);border-color:var(--border-hi)}
.nb:active{transform:scale(.88)}
.burw{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.burw:focus-within{border-color:rgba(77,159,255,.25)}
.bico{padding:0 8px 0 10px;color:var(--dim);display:flex;align-items:center}
#burl{flex:1;background:transparent;border:none;padding:7px 6px;font-family:var(--mono);font-size:12px;font-weight:300;color:var(--txt);letter-spacing:.2px}
#burl:focus{outline:none}
.ngb{margin:4px;padding:6px 14px;background:rgba(77,159,255,.1);border:1px solid rgba(77,159,255,.15);border-radius:6px;color:var(--accent2);font-family:var(--mono);font-size:10px;font-weight:400;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:background .14s}
.ngb:hover{background:rgba(77,159,255,.2)}
#bvp{position:relative;background:#04060e;border-radius:0 0 16px 16px;overflow:hidden;height:430px}
#bf{width:100%;height:100%;border:none;display:none}
#bem{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.eico{width:32px;height:32px;opacity:.15}
.etx{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}

/* ═══ GAMES ═══ */
#pgm{padding:20px 20px 24px}
.gph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.gpt{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.gg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gc{border-radius:10px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  transition:background .18s,border-color .18s,transform .18s var(--ease)}
.gc:hover{background:rgba(77,159,255,.07);border-color:rgba(77,159,255,.2);transform:translateY(-3px)}
.gc:active{transform:scale(.96)}
.gth{width:100%;height:64px;display:flex;align-items:center;justify-content:center;opacity:.85}
.gi{padding:7px 10px 9px}
.gn{font-size:10px;letter-spacing:.3px;color:var(--mid);margin-bottom:2px}
.gtag{font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}

/* ═══ LOADER ═══ */
#ld{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(4,6,12,.88);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
#ld.on{opacity:1;pointer-events:all}
.ldw{width:320px;border-radius:14px;padding:36px 30px 28px;text-align:center;
  background:rgba(10,13,22,.95);border:1px solid var(--border);
  box-shadow:0 40px 80px rgba(0,0,0,.7)}
.ldring{width:48px;height:48px;border-radius:50%;border:1px solid rgba(77,159,255,.15);border-top-color:rgba(77,159,255,.6);animation:spin 1.4s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtit{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--txt);margin-bottom:4px;letter-spacing:.5px}
.ldsub{font-size:10px;letter-spacing:.5px;color:var(--dim);margin-bottom:18px;font-style:italic;min-height:16px}
.ldpw{width:100%;height:2px;background:rgba(255,255,255,.04);border-radius:2px;margin-bottom:16px;overflow:hidden}
#ldbar{height:100%;width:0%;background:linear-gradient(90deg,rgba(77,159,255,.4),rgba(126,200,255,.8));border-radius:2px;transition:width .35s var(--ease)}
.ldst{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:16px;min-height:13px}
.ldc2{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 22px;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:border-color .15s,color .15s}
.ldc2:hover{border-color:var(--border-hi);color:var(--mid)}
</style>
</head>
<body>
<canvas id="sc"></canvas>
<div id="vignette"></div>
<div id="glow1"></div>
<div id="glow2"></div>
<div id="cur"><div id="co"></div><div id="ci"></div></div>

<div id="scene"><div id="win">

  <div id="tb">
    <div class="tlw"><div class="tl tlr"></div><div class="tl tly"></div><div class="tl tlg"></div></div>
    <div id="tabs">
      <div class="tab on" data-p="ph" onclick="sp('ph')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1L1 5v6h3V8h4v3h3V5L6 1z"/></svg>Home
      </div>
      <div class="tab" data-p="pbr" onclick="sp('pbr')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="2" width="10" height="9" rx="1.5"/><line x1="1" y1="5" x2="11" y2="5"/></svg>Browser
      </div>
      <div class="tab" data-p="pgm" onclick="sp('pgm')">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="3" width="10" height="7" rx="1.5"/><line x1="4.5" y1="6.5" x2="6.5" y2="6.5"/><line x1="5.5" y1="5.5" x2="5.5" y2="7.5"/></svg>Games
      </div>
    </div>
    <div id="clk"></div>
  </div>

  <div id="pw">

    <!-- HOME -->
    <div class="pn on" id="ph">
      <div style="padding:36px 36px 32px">
        <div class="logo-row">
          <span class="logo">atom</span>
          <span class="logo-tag">proxy · v2</span>
        </div>
        <div class="sub-line" id="sub"></div>

        <div class="srow">
          <div class="sico"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
          <input id="uva" type="text" placeholder="search or paste a url…" autocomplete="off" spellcheck="false">
          <button class="gbtn" id="goB">Go</button>
        </div>

        <div class="sec-label">Quick Launch</div>
        <div class="tiles" id="qtiles"></div>

        <div class="row-hdr">
          <div class="sec-label" style="margin:0">Games</div>
          <div class="see-all" onclick="sp('pgm')">see all →</div>
        </div>
        <div class="games-row" id="hgstrip"></div>
      </div>
    </div>

    <!-- BROWSER -->
    <div class="pn" id="pbr">
      <div id="bch">
        <button class="nb" onclick="bn('back')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="nb" onclick="bn('fwd')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="nb" onclick="bn('rl')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M2.5 7A4.5 4.5 0 0 1 11 4M11 2v2.5H8.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="burw">
          <div class="bico"><svg width="9" height="11" viewBox="0 0 11 14" fill="none"><rect x="1.5" y="6" width="8" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3.5 6V4a2 2 0 0 1 4 0v2" stroke="currentColor" stroke-width="1.4"/></svg></div>
          <input id="burl" type="text" placeholder="enter a url or search…" autocomplete="off" spellcheck="false">
          <button class="ngb" onclick="bg()">Go</button>
        </div>
      </div>
      <div id="bvp">
        <div id="bem">
          <svg class="eico" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1"/><circle cx="16" cy="16" r="6" stroke="currentColor" stroke-width="1"/><line x1="16" y1="2" x2="16" y2="10" stroke="currentColor"/><line x1="16" y1="22" x2="16" y2="30" stroke="currentColor"/><line x1="2" y1="16" x2="10" y2="16" stroke="currentColor"/><line x1="22" y1="16" x2="30" y2="16" stroke="currentColor"/></svg>
          <div class="etx">enter a url above</div>
        </div>
        <iframe id="bf" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>

    <!-- GAMES -->
    <div class="pn" id="pgm">
      <div style="padding:20px 20px 24px">
        <div class="gph"><div class="gpt">12 titles · click to play</div></div>
        <div class="gg" id="gg"></div>
      </div>
    </div>

  </div>
</div></div>

<!-- LOADER -->
<div id="ld"><div class="ldw">
  <div class="ldring"></div>
  <div class="ldtit">atom</div>
  <div class="ldsub" id="ldSub">preparing launch</div>
  <div class="ldpw"><div id="ldbar"></div></div>
  <div class="ldst" id="ldSt">initializing</div>
  <button class="ldc2" id="ldCanc">cancel</button>
</div></div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
/* ─── GAME CATALOG ─── */
const G=[
  {n:'Snake',       u:'https://www.coolmathgames.com/0-snake',             t:'Classic', c:'ts',  i:`<svg viewBox="0 0 50 50" fill="none" width="38"><path d="M8 40Q8 28 16 28Q24 28 24 20Q24 12 32 12Q40 12 40 20" stroke="#2ef288" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="40" cy="20" r="4.5" fill="#2ef288"/></svg>`},
  {n:'2048',        u:'https://play2048.co/',                               t:'Puzzle',  c:'t2',  i:`<svg viewBox="0 0 50 50" fill="none" width="38"><rect x="4" y="4" width="19" height="19" rx="3" fill="#ffaa00" opacity=".8"/><rect x="27" y="4" width="19" height="19" rx="3" fill="#ff7700" opacity=".75"/><rect x="4" y="27" width="19" height="19" rx="3" fill="#ff5500" opacity=".72"/><rect x="27" y="27" width="19" height="19" rx="3" fill="#ffcc00" opacity=".82"/></svg>`},
  {n:'Tetris',      u:'https://www.coolmathgames.com/0-tetris',             t:'Arcade',  c:'tt',  i:`<svg viewBox="0 0 46 46" fill="none" width="38"><rect x="2" y="2" width="13" height="13" rx="2" fill="#00ccff" opacity=".8"/><rect x="17" y="2" width="13" height="13" rx="2" fill="#00ccff" opacity=".78"/><rect x="17" y="17" width="13" height="13" rx="2" fill="#00ccff" opacity=".76"/><rect x="2" y="30" width="13" height="13" rx="2" fill="#ff44aa" opacity=".78"/><rect x="17" y="30" width="13" height="13" rx="2" fill="#ff44aa" opacity=".76"/><rect x="32" y="30" width="13" height="13" rx="2" fill="#ff44aa" opacity=".74"/></svg>`},
  {n:'Pac-Man',     u:'https://www.google.com/logos/2010/pacman10-i.html',  t:'Arcade',  c:'tp',  i:`<svg viewBox="0 0 50 50" fill="none" width="38"><path d="M25 25L44 15A22 22 0 1 0 44 35Z" fill="#ffdd00" opacity=".85"/></svg>`},

function mkCard(cfg,isSmall){
  const d=document.createElement('div');

  d.addEventListener('click',()=>lgame(cfg.u));
  return d;
}
function mkTile(q){
  const d=document.createElement('div');d.className='tile';
  d.innerHTML=`<div class="tic">${q.i}</div><span class="tlab">${q.n}</span>`;
  d.addEventListener('click',()=>lp(q.u));

}

/* ─── STARFIELD ─── */
(()=>{
  const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  const rs=()=>{cv.width=innerWidth;cv.height=innerHeight};rs();addEventListener('resize',rs);
  const st=Array.from({length:280},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*.9+.1,a:Math.random()*.5+.05,
    t:Math.random()*100,ts:Math.random()*.008+.002
  }));
  // shooting stars
  const ss=[];function mkStar(){ss.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight*.4,vx:3+Math.random()*4,vy:.5+Math.random()*2,life:1,maxL:60+Math.random()*80})}
  setInterval(()=>{if(Math.random()>.6)mkStar()},2200);
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    st.forEach(s=>{s.t+=s.ts;const al=s.a*(.3+.7*Math.abs(Math.sin(s.t)));ctx.save();ctx.globalAlpha=al;ctx.fillStyle='#c8e0ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore()});
    for(let i=ss.length-1;i>=0;i--){const s=ss[i];ctx.save();ctx.globalAlpha=s.life*.4;const g=ctx.createLinearGradient(s.x,s.y,s.x-s.maxL,s.y-s.maxL*.4);g.addColorStop(0,'rgba(200,230,255,0.9)');g.addColorStop(1,'transparent');ctx.strokeStyle=g;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.maxL,s.y-s.maxL*.4);ctx.stroke();ctx.restore();s.x+=s.vx;s.y+=s.vy;s.life-=.018;if(s.life<=0)ss.splice(i,1);}
    requestAnimationFrame(draw);
  }draw();
})();

const bf=document.getElementById('bf'),bem=document.getElementById('bem'),burlEl=document.getElementById('burl');
function bg(){const v=burlEl.value.trim();if(!v)return;const u=v.includes('.')&&!v.includes(' ')?(v.startsWith('http')?v:'https://'+v):'https://search.brave.com/search?q='+encodeURIComponent(v);lbr(u)}
function lbr(u){burlEl.value=u;bem.style.display='none';bf.style.display='block';try{bf.src=__uv$config.prefix+__uv$config.encodeUrl(u);}catch(e){bf.src=u;}}
function bn(a){try{if(a==='back')bf.contentWindow.history.back();else if(a==='fwd')bf.contentWindow.history.forward();else bf.contentWindow.location.reload();}catch(e){}}
burlEl.addEventListener('keydown',e=>{if(e.key==='Enter')bg()});

/* ─── LOADER ─── */
const ldEl=document.getElementById('ld'),ldSub=document.getElementById('ldSub'),ldSt=document.getElementById('ldSt'),ldBar=document.getElementById('ldbar');
let ldT=null;
const seqs=[["routing signal","bypassing filter","tunneling through","signal locked","launching"],["charging particle beam","warping spacetime","entering orbit","touchdown","you're in"],["shredding firewall","encrypting path","bouncing satellites","trace zeroed","clear"],["bribing the router","looking very academic","calculating yeet trajectory","firewall: destroyed","let's go"]];
function lp(u){
  const m=seqs[Math.random()*seqs.length|0];
  ldEl.classList.add('on');ldBar.style.width='0%';ldSub.textContent=m[0];ldSt.textContent=m[0];
  let s=0;const ps=[5,20,44,68,90,100],ds=[240,420,510,570,460,300];
  function nx(){ldBar.style.width=ps[s]+'%';ldSt.textContent=m[Math.min(s,m.length-1)];s++;if(s<ps.length)ldT=setTimeout(nx,ds[s-1]);else ldT=setTimeout(()=>nav(u),260);}
  ldT=setTimeout(nx,ds[0]);
}
function nav(u){let n=0;function go(){if(swR||n++>40){try{window.location.href=__uv$config.prefix+__uv$config.encodeUrl(u);}catch(e){window.location.href=u;}}else setTimeout(go,100);}go();}
document.getElementById('ldCanc').addEventListener('click',()=>{clearTimeout(ldT);ldEl.classList.remove('on');ldBar.style.width='0%'});
