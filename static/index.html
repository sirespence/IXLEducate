<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atom</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            background: #080808;
            color: #d0d0d0;
            font-family: 'Fira Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Full-screen canvas for procedural vines */
        #vineCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* UI layer */
        .ui {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .ui > * { pointer-events: all; }

        /* wordmark */
        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 300;
            font-style: italic;
            color: #f0f0f0;
            letter-spacing: 8px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255,255,255,0.08);
            margin-bottom: 6px;
            user-select: none;
        }

        #subtitle {
            font-size: 10px;
            font-weight: 400;
            color: #444;
            letter-spacing: 3px;
            text-transform: lowercase;
            min-height: 16px;
            text-align: center;
            margin-bottom: 48px;
        }

        #subtitle::after {
            content: '_';
            color: #666;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* search */
        .search-wrap {
            display: flex;
            width: 380px;
            margin-bottom: 44px;
            border: 1px solid #222;
            background: rgba(8,8,8,0.85);
            transition: border-color 0.2s;
        }

        .search-wrap:focus-within {
            border-color: #444;
        }

        #uv-address {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-size: 12px;
            font-family: 'Fira Mono', monospace;
            color: #ccc;
            letter-spacing: 1px;
        }

        #uv-address::placeholder { color: #333; }

        .go-btn {
            background: none;
            border: none;
            border-left: 1px solid #222;
            padding: 12px 16px;
            cursor: pointer;
            color: #555;
            font-size: 14px;
            transition: color 0.15s, background 0.15s;
            font-family: 'Fira Mono', monospace;
        }

        .go-btn:hover { color: #ccc; background: rgba(255,255,255,0.04); }

        /* tiles */
        .tiles {
            display: flex;
            gap: 2px;
        }

        .tile {
            width: 70px;
            height: 70px;
            background: rgba(8,8,8,0.8);
            border: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            color: #555;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }

        .tile:nth-child(1)::before { background: #888; }
        .tile:nth-child(2)::before { background: #666; }
        .tile:nth-child(3)::before { background: #888; }
        .tile:nth-child(4)::before { background: #666; }
        .tile:nth-child(5)::before { background: #888; }

        .tile:hover {
            border-color: #333;
            color: #bbb;
            background: rgba(255,255,255,0.04);
        }

        .tile:hover::before { transform: scaleX(1); }
        .tile:active { transform: scale(0.96); }

        .tile svg { opacity: 0.6; transition: opacity 0.2s; }
        .tile:hover svg { opacity: 1; }

        .tile-label {
            font-size: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.3;
        }

        /* curtain */
        #curtain {
            position: fixed;
            inset: 0;
            background: #080808;
            z-index: 9999;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.76,0,0.24,1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #curtain.active { transform: translateY(0); }

        .curtain-inner {
            text-align: center;
        }

        .curtain-line {
            width: 120px;
            height: 1px;
            background: #1a1a1a;
            margin: 0 auto 14px;
            overflow: hidden;
        }

        .curtain-fill {
            height: 100%;
            background: #444;
            width: 0;
        }

        #curtain.active .curtain-fill {
            animation: fillBar 0.7s 0.1s ease forwards;
        }

        @keyframes fillBar { to { width: 100%; } }

        #curtain-msg {
            font-size: 10px;
            color: #333;
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.3s 0.2s;
        }

        #curtain.active #curtain-msg { opacity: 1; }
    </style>
</head>
<body>

<canvas id="vineCanvas"></canvas>

<div id="curtain">
    <div class="curtain-inner">
        <div class="curtain-line"><div class="curtain-fill"></div></div>
        <div id="curtain-msg">routing</div>
    </div>
</div>

<div class="ui">
    <div class="wordmark">atom</div>
    <div id="subtitle"></div>

    <div class="search-wrap">
        <input id="uv-address" type="text" placeholder="search or enter url" autocomplete="off" spellcheck="false">
        <button class="go-btn" id="goBtn">→</button>
    </div>

    <div class="tiles">
        <!-- Sonic Mania -->
        <a href="#" onclick="launch('https://vinmannie.github.io/SonicManiaWeb/')" class="tile">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="16" r="7" fill="none" stroke="#aaa" stroke-width="1"/>
                <circle cx="14" cy="11" r="4" fill="none" stroke="#aaa" stroke-width="1"/>
                <path d="M11 9 L9 4" stroke="#aaa" stroke-width="1"/>
                <path d="M12.5 8.5 L12 3" stroke="#aaa" stroke-width="1"/>
                <path d="M14 8.5 L14.5 3" stroke="#aaa" stroke-width="1"/>
                <path d="M15.5 9 L17 4" stroke="#aaa" stroke-width="1"/>
                <path d="M17 9.5 L19 5" stroke="#aaa" stroke-width="1"/>
                <circle cx="16" cy="10" r="1" fill="#aaa"/>
                <path d="M3 18 L8 18M2 20 L7 20" stroke="#aaa" stroke-width="1" opacity="0.4"/>
            </svg>
            <span class="tile-label">mania</span>
        </a>

        <!-- Sonic 1 -->
        <a href="#" onclick="launch('https://jojudge.com/ICBINS1/')" class="tile">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="9" stroke="#aaa" stroke-width="1" fill="none"/>
                <circle cx="14" cy="14" r="5" stroke="#aaa" stroke-width="1" fill="none"/>
                <circle cx="14" cy="14" r="1.5" fill="#aaa"/>
                <path d="M14 5 L14 9M14 19 L14 23M5 14 L9 14M19 14 L23 14" stroke="#aaa" stroke-width="1"/>
            </svg>
            <span class="tile-label">sonic 1</span>
        </a>

        <!-- Sonic 2013 -->
        <a href="#" onclick="launch('https://github.com/VinMannie/Sonic-1-WASM')" class="tile">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect x="5" y="5" width="18" height="18" stroke="#aaa" stroke-width="1" fill="none"/>
                <rect x="9" y="9" width="10" height="10" stroke="#aaa" stroke-width="1" fill="none"/>
                <path d="M5 5 L9 9M23 5 L19 9M5 23 L9 19M23 23 L19 19" stroke="#aaa" stroke-width="1"/>
                <text x="14" y="17" text-anchor="middle" font-family="Fira Mono,monospace" font-size="5" fill="#aaa">13</text>
            </svg>
            <span class="tile-label">2013</span>
        </a>

        <!-- Sonic 2 CC -->
        <a href="#" onclick="launch('https://heyjoeway.github.io/s2cx/')" class="tile">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <polygon points="14,3 22,9 22,19 14,25 6,19 6,9" stroke="#aaa" stroke-width="1" fill="none"/>
                <polygon points="14,8 18,11 18,17 14,20 10,17 10,11" stroke="#aaa" stroke-width="0.5" fill="none"/>
                <line x1="14" y1="3" x2="14" y2="25" stroke="#aaa" stroke-width="0.5" opacity="0.3"/>
                <line x1="6" y1="9" x2="22" y2="19" stroke="#aaa" stroke-width="0.5" opacity="0.3"/>
                <line x1="22" y1="9" x2="6" y2="19" stroke="#aaa" stroke-width="0.5" opacity="0.3"/>
            </svg>
            <span class="tile-label">s2 cc</span>
        </a>

        <!-- Sonic 3 AK -->
        <a href="#" onclick="launch('https://projects.sappharad.com/s3air_ios/')" class="tile">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M14 4 L24 14 L14 10 L14 24 L14 10 L4 14 Z" stroke="#aaa" stroke-width="1" fill="none" stroke-linejoin="round"/>
                <path d="M4 14 L24 14" stroke="#aaa" stroke-width="0.5" opacity="0.4"/>
                <circle cx="22" cy="6" r="1" fill="#aaa" opacity="0.5"/>
                <circle cx="6" cy="7" r="1" fill="#aaa" opacity="0.5"/>
                <circle cx="24" cy="20" r="0.8" fill="#aaa" opacity="0.4"/>
            </svg>
            <span class="tile-label">s3 a/k</span>
        </a>
    </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
// ── VINE RENDERER ──────────────────────────────────────────────
const canvas = document.getElementById('vineCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// Branch structure
function randomRange(a, b) { return a + Math.random() * (b - a); }

class Branch {
    constructor(x, y, angle, length, depth, thickness) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.length = length;
        this.depth = depth;
        this.thickness = thickness;
        this.progress = 0; // 0..1 how grown
        this.speed = randomRange(0.003, 0.008);
        this.children = [];
        this.spawned = false;
        this.curl = randomRange(-0.015, 0.015); // gentle curve
        // current tip
        this.tipX = x;
        this.tipY = y;
        this.drawn = []; // array of {x,y} points drawn so far
    }

    update() {
        if (this.progress >= 1) {
            if (!this.spawned && this.depth > 0) {
                this.spawned = true;
                const numChildren = this.depth > 2 ? 2 : randomRange(1, 3) | 0;
                for (let i = 0; i < numChildren; i++) {
                    const spread = randomRange(0.3, 0.9);
                    const childAngle = this.angle + randomRange(-0.8, 0.8);
                    const childLen = this.length * randomRange(0.5, 0.75);
                    const childThick = this.thickness * 0.6;
                    this.children.push(new Branch(
                        this.tipX, this.tipY,
                        childAngle, childLen,
                        this.depth - 1, childThick
                    ));
                }
            }
            this.children.forEach(c => c.update());
            return;
        }

        this.progress = Math.min(1, this.progress + this.speed);
        const t = this.progress;
        // curving tip
        const curAngle = this.angle + this.curl * t * 60;
        this.tipX = this.x + Math.cos(curAngle) * this.length * t;
        this.tipY = this.y + Math.sin(curAngle) * this.length * t;
        this.drawn.push({ x: this.tipX, y: this.tipY });
    }

    draw() {
        if (this.drawn.length < 2) return;

        ctx.save();
        ctx.strokeStyle = `rgba(180,180,180,${Math.min(0.55, this.thickness * 0.18)})`;
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.beginPath();
        ctx.moveTo(this.drawn[0].x, this.drawn[0].y);
        for (let i = 1; i < this.drawn.length; i++) {
            ctx.lineTo(this.drawn[i].x, this.drawn[i].y);
        }
        ctx.stroke();
        ctx.restore();

        // draw a small circle "bud" at the very tip if done
        if (this.progress >= 1 && this.depth === 0) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(this.tipX, this.tipY, this.thickness * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,200,200,0.25)`;
            ctx.fill();
            ctx.restore();
        }

        this.children.forEach(c => c.draw());
    }
}

// Spawn roots from edges
let roots = [];

function spawnRoot() {
    const edge = Math.random();
    let x, y, angle;
    const W = canvas.width, H = canvas.height;

    if (edge < 0.35) {
        // bottom left corner region
        x = randomRange(0, W * 0.3);
        y = H + 10;
        angle = randomRange(-Math.PI * 0.9, -Math.PI * 0.5);
    } else if (edge < 0.6) {
        // bottom right
        x = randomRange(W * 0.7, W);
        y = H + 10;
        angle = randomRange(-Math.PI * 0.9, -Math.PI * 0.5);
    } else if (edge < 0.8) {
        // left edge
        x = -10;
        y = randomRange(H * 0.5, H);
        angle = randomRange(-0.4, 0.4);
    } else {
        // right edge
        x = W + 10;
        y = randomRange(H * 0.5, H);
        angle = randomRange(Math.PI - 0.4, Math.PI + 0.4);
    }

    const depth = (Math.random() < 0.4) ? 4 : 3;
    roots.push(new Branch(x, y, angle, randomRange(80, 160), depth, randomRange(1.2, 2.2)));
}

// Seed initial roots
for (let i = 0; i < 6; i++) spawnRoot();

// Periodically add more
setInterval(() => {
    if (roots.length < 18) spawnRoot();
}, 2800);

// render loop — draw onto dark bg with very slight fade
function render() {
    ctx.fillStyle = 'rgba(8,8,8,0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    roots.forEach(r => { r.update(); r.draw(); });

    // cull fully grown old roots to keep perf
    if (roots.length > 22) roots.splice(0, roots.length - 22);

    requestAnimationFrame(render);
}
// clear once first
ctx.fillStyle = '#080808';
ctx.fillRect(0, 0, canvas.width, canvas.height);
render();

// ── PROXY ──────────────────────────────────────────────────────
var curtain = document.getElementById('curtain');
var curtainMsg = document.getElementById('curtain-msg');
var sub = document.getElementById('subtitle');

var swReady = false;
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/uv/uv.sw.js', {
        scope: '/'
    }).then(function(reg) {
        if (reg.active) { swReady = true; return; }
        var sw = reg.installing || reg.waiting;
        if (sw) sw.addEventListener('statechange', function() {
            if (sw.state === 'activated') swReady = true;
        });
    }).catch(function(err) {
        console.warn('SW:', err);
        swReady = true;
    });
} else { swReady = true; }

var phrases = [
    "your gpa just filed for divorce",
    "sonic is faster than your career path",
    "sponsored by 3am academic despair",
    "your teacher is watching. probably.",
    "brainrot level: executive",
    "procrastinating like a high-end ceo",
    "world history homework? never heard of her",
    "your fbi agent is bored, play something",
    "why study when you can just vibe",
    "this proxy is the only thing passing this year",
    "too many tabs, not enough brain cells",
    "luxury proxy, budget lifestyle",
    "running on spite and caffeine",
    "don't let the firewall win",
    "delete your history after this. seriously.",
    "just one more game of sonic, i swear",
    "error 404: homework not found",
    "currently hiring: one (1) motivation",
    "your future boss just saw your tab",
    "staying unblocked since 2026",
];

var pIdx = 0, cIdx = 0, erasing = false;
function type() {
    var cur = phrases[pIdx];
    if (!erasing) {
        sub.innerText = cur.substring(0, cIdx++);
        if (cIdx > cur.length) { erasing = true; setTimeout(type, 2600); }
        else setTimeout(type, 50);
    } else {
        sub.innerText = cur.substring(0, cIdx--);
        if (cIdx < 0) { erasing = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 350); }
        else setTimeout(type, 22);
    }
}
type();

var loadMsgs = ["routing","bypassing","going fast","loading chaos","escaping homework","sending it","deploying brainrot"];

function launch(url) {
    curtainMsg.innerText = loadMsgs[Math.floor(Math.random() * loadMsgs.length)];
    curtain.classList.add('active');
    var attempts = 0;
    function go() {
        if (swReady || attempts++ > 40) {
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        } else { setTimeout(go, 100); }
    }
    setTimeout(go, 350);
}

function doSearch(val) {
    if (!val.trim()) return;
    var url = (val.includes('.') && !val.includes(' '))
        ? (val.startsWith('http') ? val : 'https://' + val)
        : 'https://search.brave.com/search?q=' + encodeURIComponent(val);
    launch(url);
}

document.getElementById('uv-address').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch(e.target.value);
});
document.getElementById('goBtn').addEventListener('click', function() {
    doSearch(document.getElementById('uv-address').value);
});
</script>
</body>
</html>
