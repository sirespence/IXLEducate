<!-- 
  ATOM OS // VOID FINAL
  Protocol: STRICT (https://nowgg.fun)
  Visuals: Cinematic / Fullscreen / Fluid
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Atom OS</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --border: rgba(255, 255, 255, 0.06);
  --text: #ffffff;
  --text-dim: #555555;
  --ease: cubic-bezier(0.19, 1, 0.22, 1);
  --trans-dur: 0.8s;
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; cursor: none; }

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: var(--bg);
  font-family: 'Manrope', sans-serif;
  color: var(--text);
}

/* ─── FLUID BACKDROP ─── */
#canvas {
  position: fixed; inset: 0; z-index: 0; opacity: 0.5;
  transition: opacity 1s;
}
#vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(circle at 50% 50%, transparent 20%, #000 100%);
}

/* ─── UI LAYER ─── */
#ui {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: transform var(--trans-dur) var(--ease), opacity 0.5s;
}
#ui.zoom-out { transform: scale(1.1); opacity: 0; pointer-events: none; }

/* ─── HEADER ─── */
.header {
  position: absolute; top: 40px; text-align: center;
  mix-blend-mode: difference;
}
h1 {
  font-weight: 300; font-size: 14px; letter-spacing: 8px; text-transform: uppercase;
  margin-bottom: 10px; color: #888;
}
.clock { font-family: 'JetBrains Mono'; font-size: 10px; color: #444; }

/* ─── SEARCH ─── */
.search-box {
  position: relative; margin-bottom: 60px; width: 300px;
  border-bottom: 1px solid #222; transition: width 0.5s var(--ease), border-color 0.3s;
}
.search-box:focus-within { width: 400px; border-color: #fff; }
.search-in {
  width: 100%; background: transparent; border: none; padding: 15px 0;
  color: #fff; font-size: 18px; text-align: center; font-family: 'Manrope';
}
.search-in::placeholder { color: #333; transition: color 0.3s; }
.search-box:focus-within .search-in::placeholder { color: transparent; }

/* ─── GRID ─── */
.grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 40px;
  perspective: 1000px;
}
.app {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: pointer; group;
}
.icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: #050505; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: 0.4s var(--ease); position: relative; overflow: hidden;
}
.icon::before {
  content:''; position: absolute; inset: 0; 
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0; transition: 0.4s;
}
.app:hover .icon {
  transform: translateY(-10px) scale(1.05);
  border-color: rgba(255,255,255,0.4);
  box-shadow: 0 20px 50px rgba(255,255,255,0.05);
}
.app:hover .icon::before { opacity: 1; }

.app svg, .app img { width: 28px; height: 28px; fill: #fff; object-fit: cover; z-index: 2; }
.label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px; color: #444; text-transform: uppercase;
  transition: 0.3s; transform: translateY(5px); opacity: 0;
}
.app:hover .label { color: #fff; opacity: 1; transform: translateY(0); }

/* ─── FULLSCREEN APP ─── */
#app-view {
  position: fixed; inset: 0; z-index: 50;
  background: #000;
  transform: translateY(100vh); transition: transform var(--trans-dur) var(--ease);
  display: flex; flex-direction: column;
}
#app-view.active { transform: translateY(0); }

.bar {
  height: 40px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; background: rgba(0,0,0,0.8); z-index: 2;
  border-bottom: 1px solid #111;
}
.bar-title { font-family: 'JetBrains Mono'; font-size: 10px; color: #444; letter-spacing: 2px; }
.actions { display: flex; gap: 15px; }
.act {
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #666; cursor: pointer; transition: 0.2s;
}
.act:hover { color: #fff; }

#content { flex: 1; position: relative; background: #000; }
iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 1s; }
iframe.vis { opacity: 1; }

#loader {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 1; transition: opacity 0.5s;
}
.line { width: 100px; height: 1px; background: #222; overflow: hidden; }
.prog { width: 50%; height: 100%; background: #fff; animation: load 1s infinite ease-in-out; }
@keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }

/* ─── CURSOR ─── */
#cursor {
  position: fixed; top: 0; left: 0; width: 8px; height: 8px; background: #fff;
  border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999;
  mix-blend-mode: exclusion; transition: transform 0.1s;
}
body.hover #cursor { transform: translate(-50%, -50%) scale(4); background: transparent; border: 1px solid #fff; }

</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="vignette"></div>
<div id="cursor"></div>

<div id="ui">
  <div class="header">
    <h1>Atom Void</h1>
    <div class="clock" id="clock">00:00</div>
  </div>

  <div class="search-box">
    <input type="text" class="search-in" id="search" placeholder="Search" autocomplete="off">
  </div>

  <div class="grid" id="app-grid">
    <!-- GENERATED JS -->
  </div>
</div>

<div id="app-view">
  <div class="bar">
    <div class="act" onclick="closeApp()">✕</div>
    <div class="bar-title" id="app-title">APPLICATION</div>
    <div class="actions">
      <div class="act" onclick="reload()">R</div>
      <div class="act" onclick="pop()">↗</div>
    </div>
  </div>
  <div id="content">
    <div id="loader"><div class="line"><div class="prog"></div></div></div>
    <iframe id="frame" allow="fullscreen; autoplay; encrypted-media; camera; microphone"></iframe>
  </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
/* ─── LINKS (STRICT: nowgg.fun) ─── */
const TARGET = 'https://nowgg.fun';

const APPS = [
  // CLOUD GAMING (All point to main portal)
  { n: 'Roblox',    u: TARGET, i: '<path d="M18.9 5.5L5.5 10L10 23L23 18.5L18.9 5.5ZM13.5 16C12.1 16 11 14.9 11 13.5C11 12.1 12.1 11 13.5 11C14.9 11 16 12.1 16 13.5C16 14.9 14.9 16 13.5 16Z"/>' },
  { n: 'Fortnite',  u: TARGET, i: '<path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2-1-2-1-2 1 2 1zm0 2l-10-5v9l10 5 10-5v-9l-10 5z"/>' },
  { n: 'COD Mobile',u: TARGET, i: '<path d="M2 12l2-2 8 8 8-8 2 2-10 10L2 12z"/>' },
  { n: 'Geo Dash',  u: TARGET, i: '<rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="9" r="2"/><circle cx="15" cy="15" r="2"/>' },
  { n: 'Stumble',   u: TARGET, i: '<circle cx="12" cy="7" r="4"/><path d="M5 21v-8l3-3 4 4 4-4 3 3v8h-2v-6l-2-2-3 3-3-3-2 2v6H5z"/>' },
  { n: 'Cookie Run',u: TARGET, i: '<circle cx="12" cy="12" r="8"/><path d="M15 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>' },
  { n: 'Melon Box', u: TARGET, i: '<path d="M12 2a10 10 0 0 0-10 10 10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/>' },
  { n: 'Launcher',  u: TARGET, i: '<path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm0 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>' },

  // WEB APPS
  { n: 'Discord',   u: 'https://discord.com/app', i: '<path d="M19 4a16 16 0 0 0-4-1 16 16 0 0 0-5 2 16 16 0 0 0-1-2 16 16 0 0 0-5 1 16 16 0 0 0-4 12 11 11 0 0 0 1-2 8 8 0 0 1-1-1c.2-.2.4-.3.7-.5a12 12 0 0 0 10 0 8 8 0 0 1-1 1 11 11 0 0 0 1 2 16 16 0 0 0 5-3c.4-4-.7-8-3-11z"/>' },
  { n: 'YouTube',   u: 'https://www.youtube.com/embed/?autoplay=1', i: '<path d="M22.5 6c-.3-1-1-1.8-2-2C19 3.5 12 3.5 12 3.5s-7 0-8.6.7c-1 .2-1.8 1-2 2C.5 8 .5 12 .5 12s0 4 .9 6c.2 1 1 1.8 2 2 1.6.7 8.6.7 8.6.7s7 0 8.6-.7c1-.2 1.8-1 2-2 .9-2 .9-6 .9-6s0-4-.9-6zM9.5 15.5V8.5l6.5 3.5-6.5 3.5z"/>', direct: true },
  { n: 'Spotify',   u: 'https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M', i: '<path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm4.6 14.4c-.2.4-.7.5-1 .2-2.5-1.5-5.6-1.8-9.3-1-.4-.1-.7-.5-.6-1 .1-.4.5-.7 1-.6 4.1.9 7.6 1.3 10.5-.5.4-.2.9 0 1 .3.3.5.2 1-.2 1.3z"/>', direct: true },
  { n: 'Google',    u: 'https://www.google.com', i: '<path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/>' },
  { n: '1v1.lol',   u: 'https://1v1.lol', i: '<path d="M4 4h16v16H4z"/>' },
  { n: 'Subway',    u: 'https://poki.com/en/g/subway-surfers', i: '<path d="M7 2v16h2V2H7zm8 0v16h2V2h-2z"/>', direct: true },
  { n: 'Slope',     u: 'https://slope-game.github.io', i: '<path d="M22 22L2 22L12 2L22 22ZM12 6L7 16H17L12 6Z"/>', direct: true }
];

/* ─── BUILDER ─── */
const grid = document.getElementById('app-grid');
APPS.forEach(app => {
  const el = document.createElement('div');
  el.className = 'app';
  el.innerHTML = `<div class="icon"><svg viewBox="0 0 24 24" fill="currentColor">${app.i}</svg></div><div class="label">${app.n}</div>`;
  el.onclick = () => open(app);
  grid.appendChild(el);
});

/* ─── CORE LOGIC ─── */
const ui = document.getElementById('ui');
const win = document.getElementById('app-view');
const frm = document.getElementById('frame');
const load = document.getElementById('loader');
const title = document.getElementById('app-title');
let current = '';

function open(app) {
  // ANIMATION
  ui.classList.add('zoom-out');
  win.classList.add('active');
  load.style.opacity = '1';
  frm.classList.remove('vis');
  title.innerText = app.n.toUpperCase();
  current = app.u;

  // LINK HANDLING
  // If strict 'direct' is true, use raw URL (for embeds)
  // Else if URL is strict nowgg.fun, use raw URL (proxy sites break if wrapped in another proxy)
  // Else try UV Proxy
  
  let dest = app.u;
  
  if (!app.direct && !app.u.includes('nowgg.fun')) {
    try {
      if(window.__uv$config) dest = __uv$config.prefix + __uv$config.encodeUrl(app.u);
    } catch(e) {}
  }
  
  frm.src = dest;
  frm.onload = () => {
    load.style.opacity = '0';
    frm.classList.add('vis');
  }
}

function closeApp() {
  win.classList.remove('active');
  ui.classList.remove('zoom-out');
  setTimeout(() => { frm.src = 'about:blank'; }, 800);
}

function reload() { frm.contentWindow.location.reload(); }
function pop() { window.open(current, '_blank'); }

/* ─── SEARCH ─── */
document.getElementById('search').addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    const val = e.target.value;
    const url = val.includes('.') ? (val.startsWith('http') ? val : 'https://'+val) : 'https://search.brave.com/search?q='+encodeURIComponent(val);
    open({ n: 'BROWSER', u: url, direct: false });
  }
});

/* ─── FLUID FX ─── */
const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
let w, h;
const resize = () => { w=cv.width=innerWidth; h=cv.height=innerHeight; };
window.addEventListener('resize', resize); resize();

const smoke = Array.from({length:30}, () => ({
  x: Math.random()*w, y: Math.random()*h,
  vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
  r: Math.random()*200 + 100
}));

function anim() {
  ctx.clearRect(0,0,w,h);
  smoke.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < -p.r) p.x = w+p.r; if(p.x > w+p.r) p.x = -p.r;
    if(p.y < -p.r) p.y = h+p.r; if(p.y > h+p.r) p.y = -p.r;
    
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    g.addColorStop(0, 'rgba(255,255,255,0.06)');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();

// UTILS
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cur.style.top = e.clientY+'px'; cur.style.left = e.clientX+'px'; });
document.querySelectorAll('.app, .act, input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hover'));
});
setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 1000);

</script>
</body>
</html>
