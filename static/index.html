<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>atomOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:-apple-system,'Inter',sans-serif;
  --blur:blur(52px) saturate(2.4) brightness(1.06);
  --blur-md:blur(28px) saturate(2);
  --blur-sm:blur(14px) saturate(1.6);
  --glass:rgba(18,18,30,0.68);
  --gb:rgba(255,255,255,0.09);
  --gbl:rgba(255,255,255,0.15);
  --gbt:rgba(255,255,255,0.26);
  --tx:rgba(255,255,255,0.92);
  --tx2:rgba(255,255,255,0.52);
  --tx3:rgba(255,255,255,0.22);
  --accent:#0A84FF;
  --green:#30D158;
  --red:#FF453A;
  --yellow:#FFD60A;
  --orange:#FF9F0A;
  --purple:#BF5AF2;
  --sp:cubic-bezier(.34,1.56,.64,1);
  --eo:cubic-bezier(.16,1,.3,1);
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font);-webkit-font-smoothing:antialiased;cursor:none;user-select:none}

/* ══════════════════════════════════════
   ANIMATED WALLPAPER SYSTEM
══════════════════════════════════════ */
#wall{position:fixed;inset:0;z-index:0;transition:background 1.2s var(--ease)}
#wall.wp0{background:radial-gradient(ellipse 90% 70% at 15% 8%,rgba(72,0,180,.55),transparent 55%),radial-gradient(ellipse 70% 90% at 88% 12%,rgba(0,60,180,.45),transparent 52%),radial-gradient(ellipse 110% 50% at 50% 95%,rgba(0,100,50,.3),transparent 55%),radial-gradient(ellipse 55% 70% at 72% 55%,rgba(30,0,100,.35),transparent 48%),linear-gradient(160deg,#060112,#080f2a 40%,#040d18 70%,#0a0520)}
#wall.wp1{background:radial-gradient(ellipse 80% 80% at 20% 20%,rgba(255,80,0,.3),transparent 55%),radial-gradient(ellipse 70% 60% at 80% 80%,rgba(200,0,80,.35),transparent 50%),radial-gradient(ellipse 100% 50% at 50% 50%,rgba(80,0,20,.4),transparent 60%),linear-gradient(135deg,#1a0005,#2a0a00,#1a0010,#0a0015)}
#wall.wp2{background:radial-gradient(ellipse 80% 70% at 25% 15%,rgba(0,180,120,.3),transparent 55%),radial-gradient(ellipse 70% 80% at 75% 85%,rgba(0,100,200,.35),transparent 52%),radial-gradient(ellipse 100% 55% at 50% 50%,rgba(0,60,80,.4),transparent 58%),linear-gradient(150deg,#001a10,#001828,#00100a,#00151f)}
#wall.wp3{background:radial-gradient(ellipse 90% 70% at 70% 10%,rgba(180,120,0,.35),transparent 55%),radial-gradient(ellipse 70% 90% at 15% 85%,rgba(100,0,180,.3),transparent 50%),radial-gradient(ellipse 80% 60% at 50% 50%,rgba(60,20,0,.4),transparent 60%),linear-gradient(155deg,#0f0800,#1a0a18,#100600,#0a0015)}
#wall.wp4{background:radial-gradient(ellipse 100% 80% at 50% 0%,rgba(0,100,255,.4),transparent 55%),radial-gradient(ellipse 80% 100% at 50% 100%,rgba(0,200,180,.25),transparent 55%),radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,30,80,.5),transparent 58%),linear-gradient(180deg,#000d1f,#001218,#000a18,#001020)}

/* Animated mesh */
#mesh{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px);mix-blend-mode:screen;will-change:transform}
.orb1{width:800px;height:500px;animation:orb1 22s ease-in-out infinite}
.orb2{width:600px;height:600px;animation:orb2 28s ease-in-out infinite}
.orb3{width:900px;height:400px;animation:orb3 18s ease-in-out infinite}
.orb4{width:500px;height:500px;animation:orb4 34s ease-in-out infinite}
.orb5{width:700px;height:350px;animation:orb5 24s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(-15%,-20%) scale(1)}33%{transform:translate(5%,-10%) scale(1.08)}66%{transform:translate(-8%,10%) scale(.95)}}
@keyframes orb2{0%,100%{transform:translate(85%,80%) scale(1)}40%{transform:translate(70%,60%) scale(1.12)}70%{transform:translate(90%,90%) scale(.92)}}
@keyframes orb3{0%,100%{transform:translate(20%,90%) scale(1)}35%{transform:translate(30%,80%) scale(1.06)}68%{transform:translate(15%,85%) scale(.97)}}
@keyframes orb4{0%,100%{transform:translate(55%,30%) scale(1)}45%{transform:translate(45%,20%) scale(1.1)}75%{transform:translate(60%,40%) scale(.93)}}
@keyframes orb5{0%,100%{transform:translate(-5%,45%) scale(1)}38%{transform:translate(5%,35%) scale(1.07)}72%{transform:translate(-10%,55%) scale(.96)}}

/* Particle canvas */
canvas#pc{position:fixed;inset:0;z-index:2;pointer-events:none}

/* Aurora layer */
#aurora{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.aurora-band{position:absolute;left:-20%;width:140%;height:180px;border-radius:50%;filter:blur(60px);mix-blend-mode:screen;opacity:.18;animation:auroraDrift linear infinite}
.ab1{top:15%;background:linear-gradient(90deg,transparent,rgba(0,200,150,.6),rgba(0,100,255,.4),transparent);animation-duration:14s}
.ab2{top:35%;background:linear-gradient(90deg,transparent,rgba(100,0,255,.4),rgba(0,150,255,.5),transparent);animation-duration:18s;animation-delay:-6s}
.ab3{top:55%;background:linear-gradient(90deg,transparent,rgba(0,180,180,.35),rgba(50,0,200,.4),transparent);animation-duration:22s;animation-delay:-11s}
@keyframes auroraDrift{0%{transform:translateX(-30%) skewY(-2deg)}50%{transform:translateX(15%) skewY(2deg)}100%{transform:translateX(-30%) skewY(-2deg)}}

/* Stars */
canvas#sc{position:fixed;inset:0;z-index:3;pointer-events:none}

/* ══════════════════════════════════════
   CURSOR
══════════════════════════════════════ */
#cur{position:fixed;pointer-events:none;z-index:99999;top:0;left:0;will-change:transform}
#cr{position:absolute;width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.45);transform:translate(-50%,-50%);transition:width .18s var(--sp),height .18s var(--sp),border-color .18s,background .18s,border-radius .18s,opacity .18s}
#cd{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);transition:opacity .14s}
body.ch #cr{width:40px;height:40px;border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.04)}
body.cc #cr{transform:translate(-50%,-50%) scale(.72)}
body.ct #cr{width:3px;height:22px;border-radius:2px;background:rgba(255,255,255,.7);border-color:transparent}
body.ct #cd{opacity:0}

/* ══════════════════════════════════════
   MENU BAR
══════════════════════════════════════ */
#mb{
  position:fixed;top:0;left:0;right:0;height:28px;z-index:2000;
  background:rgba(8,8,18,.55);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
}
.mb-l,.mb-r{display:flex;align-items:center;gap:2px}
#mb-app{font-size:13px;font-weight:700;color:var(--tx);padding:0 7px}
.mbi{padding:1px 8px;border-radius:4px;font-size:12px;font-weight:400;color:rgba(255,255,255,.75);cursor:pointer;transition:background .12s;white-space:nowrap}
.mbi:hover{background:rgba(255,255,255,.11)}
.mbs{width:1px;height:13px;background:rgba(255,255,255,.1);margin:0 3px}
.mb-center{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:.2px;pointer-events:none}
#mb-time{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:.2px;padding:1px 8px;cursor:pointer}
#mb-bat{font-size:11px;color:rgba(255,255,255,.55);padding:1px 6px}
#mb-wifi{font-size:11px;color:rgba(255,255,255,.55);padding:1px 6px;cursor:pointer}

/* ══════════════════════════════════════
   DESKTOP
══════════════════════════════════════ */
#desk{position:fixed;inset:28px 0 82px 0;z-index:5;overflow:hidden}

/* Desktop icons */
.dico{
  position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 6px 6px;border-radius:10px;cursor:pointer;width:78px;
  transition:background .14s;
}
.dico:hover{background:rgba(255,255,255,.07)}
.dico.sel{background:rgba(10,132,255,.22);outline:1px solid rgba(10,132,255,.45)}
.dico .dii{
  width:54px;height:54px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 5px 18px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.14) inset;
  transition:transform .22s var(--sp),filter .18s;
}
.dico:hover .dii{transform:scale(1.06) translateY(-2px)}
.dico:active .dii{transform:scale(.9)!important}
.dii::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:46%;border-radius:12px 12px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.32),rgba(255,255,255,.04));pointer-events:none;z-index:2}
.dico .dil{font-size:11px;font-weight:400;color:rgba(255,255,255,.9);text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.6);max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.dico.sel .dil{background:var(--accent);padding:1px 5px;border-radius:4px;text-shadow:none}
.dico:active{transform:scale(.95);transition:transform .07s}

/* ══════════════════════════════════════
   WINDOWS
══════════════════════════════════════ */
.win{
  position:absolute;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--gbl);
  border-top:1px solid var(--gbt);
  border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;
  min-width:300px;min-height:200px;
  box-shadow:0 2px 0 rgba(255,255,255,.055) inset,0 -1px 0 rgba(0,0,0,.35) inset,0 32px 64px rgba(0,0,0,.65),0 16px 32px rgba(0,0,0,.45);
  transition:box-shadow .2s,opacity .28s var(--eo),transform .28s var(--eo);
  will-change:transform;
}
.win.focused{box-shadow:0 2px 0 rgba(255,255,255,.08) inset,0 -1px 0 rgba(0,0,0,.35) inset,0 48px 96px rgba(0,0,0,.75),0 24px 48px rgba(0,0,0,.55),0 0 0 .5px rgba(255,255,255,.1)}
.win.mini{opacity:0;transform:scale(.45) translateY(120px) !important;pointer-events:none}
.win.opening{animation:wOpen .3s var(--eo) both}
.win.closing{animation:wClose .22s var(--eo) both;pointer-events:none}
@keyframes wOpen{from{opacity:0;transform:scale(.88) translateY(18px)}to{opacity:1;transform:none}}
@keyframes wClose{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.88) translateY(12px)}}

/* Titlebar */
.wtb{
  height:42px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(255,255,255,.022);
  border-bottom:1px solid rgba(255,255,255,.06);
  cursor:move;-webkit-user-select:none;user-select:none;
}
.wcs{display:flex;gap:7px;align-items:center;flex-shrink:0}
.wc{
  width:12px;height:12px;border-radius:50%;cursor:pointer;position:relative;
  box-shadow:0 1px 2px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.3);
  transition:filter .12s,transform .12s var(--sp);
}
.wc:hover{filter:brightness(1.28);transform:scale(1.14)}
.wc:active{transform:scale(.85)}
.wcr{background:linear-gradient(145deg,#ff6058,#e03228)}
.wcy{background:linear-gradient(145deg,#febc2e,#d4961a)}
.wcg{background:linear-gradient(145deg,#28c840,#18a32a)}
.wc::after{content:'';position:absolute;top:10%;left:10%;width:44%;height:44%;border-radius:50%;background:rgba(255,255,255,.4)}
.win:not(.focused) .wcr,.win:not(.focused) .wcy,.win:not(.focused) .wcg{background:rgba(90,90,100,.5);box-shadow:none}
.win:not(.focused) .wc::after{display:none}
.wtt{flex:1;text-align:center;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.65);letter-spacing:.15px;pointer-events:none}
.win:not(.focused) .wtt{color:rgba(255,255,255,.28)}
.wtb-right{width:46px;display:flex;justify-content:flex-end;flex-shrink:0}
.win-search-btn{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;padding:2px 4px;border-radius:4px;transition:color .14s,background .14s;font-size:11px}
.win-search-btn:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)}

/* Body + resize */
.wb{flex:1;overflow:auto;position:relative;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.wb::-webkit-scrollbar{width:5px}
.wb::-webkit-scrollbar-track{background:transparent}
.wb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.wrh{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;z-index:10}
.wrh::after{content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,.14);border-bottom:2px solid rgba(255,255,255,.14);border-radius:1px}

/* ══════════════════════════════════════
   HOME APP
══════════════════════════════════════ */
.ah{padding:22px 24px 24px}
.h-word{
  font-size:62px;font-weight:200;letter-spacing:18px;text-indent:18px;
  color:rgba(255,255,255,.9);line-height:1;text-align:center;
  animation:hGlow 5s ease-in-out infinite;
}
@keyframes hGlow{0%,100%{text-shadow:0 0 40px rgba(255,255,255,.08)}50%{text-shadow:0 0 60px rgba(180,210,255,.2),0 0 100px rgba(120,160,255,.08)}}
.h-badge{display:inline-flex;align-items:center;gap:7px;margin:8px auto 0;padding:4px 14px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);font-size:9.5px;letter-spacing:2.2px;color:rgba(255,255,255,.28);text-transform:uppercase}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(48,209,88,.85);box-shadow:0 0 7px rgba(48,209,88,.65);animation:pd 2s ease-in-out infinite}
@keyframes pd{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.5);opacity:1}}
.hdiv{height:1px;margin:16px 0 14px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07) 20%,rgba(255,255,255,.07) 80%,transparent)}
#tw{font-size:11.5px;font-weight:300;font-style:italic;color:rgba(255,255,255,.26);text-align:center;min-height:18px;margin-bottom:18px;letter-spacing:.3px}
#tw::after{content:'|';color:rgba(255,255,255,.45);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Search */
.sw{margin-bottom:18px}
.sr{display:flex;align-items:center;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s,background .2s}
.sw:focus-within .sr{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);box-shadow:0 0 0 3px rgba(10,132,255,.14)}
.sic{padding:0 6px 0 13px;color:rgba(255,255,255,.3);flex-shrink:0;transition:color .18s}
.sw:focus-within .sic{color:rgba(255,255,255,.6)}
#si{flex:1;background:transparent;border:none;padding:12px 10px 12px 4px;font-family:var(--font);font-size:14px;font-weight:300;color:rgba(255,255,255,.9)}
#si::placeholder{color:rgba(255,255,255,.2)}
#si:focus{outline:none}
.sg{margin:5px;padding:8px 20px;background:rgba(10,132,255,.85);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:12.5px;font-weight:500;cursor:pointer;box-shadow:0 2px 10px rgba(10,132,255,.4);transition:background .14s,transform .1s var(--sp)}
.sg:hover{background:rgba(10,132,255,1)}
.sg:active{transform:scale(.92)}

/* Section label */
.sl{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:9px;display:flex;align-items:center;gap:9px}
.sl::before,.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

/* Quick launch */
.qlg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.qli{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:15px 6px 11px;border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  transition:background .18s,border-color .18s,transform .22s var(--sp);
  position:relative;overflow:hidden;
}
.qli::before{content:'';position:absolute;top:0;left:0;right:0;height:46%;border-radius:14px 14px 58% 58%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);pointer-events:none}
.qli:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.13);transform:translateY(-3px) scale(1.04)}
.qli:active{transform:scale(.94)!important;transition-duration:.07s}
.qlo{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.12) inset}
.qlo::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:45%;border-radius:10px 10px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.03));pointer-events:none;z-index:2}
.qll{font-size:10px;color:rgba(255,255,255,.42);letter-spacing:.3px;transition:color .18s}
.qli:hover .qll{color:rgba(255,255,255,.78)}

/* Games strip */
.gstrip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.gstrip::-webkit-scrollbar{display:none}
.gc{flex-shrink:0;width:116px;border-radius:13px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:background .18s,border-color .18s,transform .22s var(--sp)}
.gc:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.13);transform:translateY(-4px) scale(1.05)}
.gc:active{transform:scale(.93)!important;transition-duration:.07s}
.gct{width:100%;height:62px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gct::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 44%,rgba(0,0,0,.42));pointer-events:none}
.gci{padding:5px 8px 7px}
.gcn{font-size:10px;font-weight:500;color:rgba(255,255,255,.72);margin-bottom:2px}
.gct2{font-size:7.5px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;display:inline-block}

/* ══════════════════════════════════════
   BROWSER APP
══════════════════════════════════════ */
.abr{display:flex;flex-direction:column;height:100%}
.brc{display:flex;align-items:center;gap:5px;padding:7px 10px;background:rgba(0,0,0,.22);border-bottom:1px solid rgba(255,255,255,.055);flex-shrink:0}
.nbt{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);cursor:pointer;transition:background .12s,color .12s,transform .1s;flex-shrink:0}
.nbt:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.88)}
.nbt:active{transform:scale(.82)}
.ub{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;overflow:hidden;transition:border-color .18s,box-shadow .18s}
.ub:focus-within{border-color:rgba(255,255,255,.18);box-shadow:0 0 0 2.5px rgba(10,132,255,.15)}
.ulk{padding:0 5px 0 8px;color:rgba(255,255,255,.22);flex-shrink:0}
#burl{flex:1;background:transparent;border:none;padding:6px 8px 6px 0;font-family:var(--font);font-size:12px;font-weight:300;color:rgba(255,255,255,.84)}
#burl:focus{outline:none}
.bgo{margin:3px;padding:5px 12px;background:rgba(10,132,255,.78);border:none;border-radius:6px;color:#fff;font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:background .14s}
.bgo:hover{background:rgba(10,132,255,1)}
/* Bookmarks bar */
.bbk{display:flex;align-items:center;gap:3px;padding:4px 10px;background:rgba(0,0,0,.12);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.bbk::-webkit-scrollbar{display:none}
.bk{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:11px;color:rgba(255,255,255,.45);cursor:pointer;white-space:nowrap;transition:background .12s,color .12s;flex-shrink:0}
.bk:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.bk-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.bvp{flex:1;position:relative;background:#030509}

}
.dico2::before{content:'';position:absolute;top:2%;left:4%;width:92%;height:46%;border-radius:12px 12px 50% 50%;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(255,255,255,.04));pointer-events:none;z-index:2}

/* Fancy notification badge */
.n-badge{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:1.5px solid rgba(12,12,22,.8);box-shadow:0 0 6px rgba(255,68,58,.6);display:none}
.n-badge.on{display:block}

/* Widget: Clock */
.widget-clock{
  position:absolute;top:18px;right:18px;
  background:rgba(18,18,30,.55);
  backdrop-filter:var(--blur-md);
  border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.18);
  border-radius:16px;padding:16px 22px;
  text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  min-width:130px;
  animation:widgIn .5s var(--eo) .4s both;
}
@keyframes widgIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:none}}
#wclk{font-size:32px;font-weight:200;color:rgba(255,255,255,.9);letter-spacing:2px;line-height:1}
#wdate{font-size:11px;color:rgba(255,255,255,.38);margin-top:3px;letter-spacing:.4px}

/* Widget: Vibe */
.widget-vibe{
  position:absolute;bottom:18px;right:18px;
  background:rgba(18,18,30,.55);
  backdrop-filter:var(--blur-md);
  border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.18);
  border-radius:16px;padding:12px 16px;
  min-width:190px;max-width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  animation:widgIn .5s var(--eo) .6s both;
}
.vib-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:10px}
.vib-bars{display:flex;align-items:flex-end;gap:3px;height:32px}
.vib-bar{flex:1;border-radius:2px 2px 0 0;background:linear-gradient(180deg,rgba(10,132,255,.9),rgba(90,200,250,.5));animation:barDance ease-in-out infinite alternate}
@keyframes barDance{0%{transform:scaleY(.2)}100%{transform:scaleY(1)}}
.vib-bar:nth-child(1){animation-duration:.6s;animation-delay:0s}
.vib-bar:nth-child(2){animation-duration:.8s;animation-delay:.1s}
.vib-bar:nth-child(3){animation-duration:.5s;animation-delay:.2s}
.vib-bar:nth-child(4){animation-duration:.7s;animation-delay:.05s}
.vib-bar:nth-child(5){animation-duration:.4s;animation-delay:.15s}
.vib-bar:nth-child(6){animation-duration:.9s;animation-delay:.08s}
.vib-bar:nth-child(7){animation-duration:.6s;animation-delay:.22s}
.vib-bar:nth-child(8){animation-duration:.75s;animation-delay:.12s}
.vib-label{font-size:11px;color:rgba(255,255,255,.45);margin-top:8px}

/* Boot screen */
#boot{
  position:fixed;inset:0;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;
  transition:opacity .8s var(--ease);
}
#boot.out{opacity:0;pointer-events:none}
.boot-logo{font-size:48px;font-weight:200;letter-spacing:14px;text-indent:14px;color:rgba(255,255,255,.88);animation:bootPulse 1.5s ease-in-out infinite;margin-bottom:28px}
@keyframes bootPulse{0%,100%{opacity:.4}50%{opacity:1}}
.boot-spinner{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(255,255,255,.6);animation:spin .8s linear infinite}

/* Vibes app orb animation */
.vibes-orb{
  width:220px;height:220px;border-radius:50%;margin:0 auto 20px;
  position:relative;overflow:visible;
  animation:vibesOrb 3s ease-in-out infinite;
}
@keyframes vibesOrb{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(30deg) brightness(1.15)}}
.vibes-orb-inner{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.25),rgba(10,132,255,.6) 45%,rgba(100,0,255,.4) 75%,transparent);
  box-shadow:0 0 60px rgba(10,132,255,.4),0 0 120px rgba(100,0,255,.2);
  animation:orbPulse 2s ease-in-out infinite;
}
@keyframes orbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* CALC APP */
.acalc{padding:16px;background:rgba(0,0,0,.3)}
.calc-display{background:rgba(0,0,0,.4);border-radius:10px;padding:14px 18px;margin-bottom:12px;text-align:right}
.calc-expr{font-size:11px;color:rgba(255,255,255,.3);min-height:14px;margin-bottom:4px;letter-spacing:.3px}
.calc-num{font-size:36px;font-weight:200;color:rgba(255,255,255,.92);letter-spacing:-1px;line-height:1}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cb{
  height:56px;border-radius:10px;border:none;

.cb:hover{filter:brightness(1.2)}

.cb-num{background:rgba(255,255,255,.12);color:rgba(255,255,255,.88)}
.cb-op{background:rgba(255,159,10,.85);color:#fff}
.cb-func{background:rgba(255,255,255,.18);color:rgba(255,255,255,.75)}
.cb-eq{background:var(--accent);color:#fff}
.cb-wide{grid-column:span 2}
.cb-del{font-size:13px}
</style>
</head>

   STARS
══════════════════════════════════════ */
(function(){
  const cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  function rs(){cv.width=innerWidth;cv.height=innerHeight}
  rs();addEventListener('resize',rs);
  const stars=Array.from({length:320},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.4+.1,a:Math.random()*.5+.05,
    t:Math.random()*100,ts:Math.random()*.012+.003,
    cross:Math.random()>.82
  }));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.t+=s.ts;
      const al=s.a*(.35+.65*Math.abs(Math.sin(s.t)));
      ctx.save();ctx.globalAlpha=al;
      if(s.cross){
        ctx.strokeStyle='#c8e8ff';ctx.lineWidth=.5;
        ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);
        ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();
      } else {
        ctx.fillStyle='#c8e8ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════
   WINDOW MANAGER
══════════════════════════════════════ */
let zTop=100;
const wins={};
const maxed={};

function openApp(id){
  if(wins[id]){
    const w=wins[id];
    w.classList.remove('mini');
    focusWin(id);
    return;
  }
  const cfg=APPS_CFG[id];
  if(!cfg) return;
  const w=document.createElement('div');
  w.className='win opening';
  w.id='win-'+id;
  w.style.cssText=`left:${cfg.x()}px;top:${cfg.y()}px;width:${cfg.w}px;height:${cfg.h}px;z-index:${++zTop}`;
  w.innerHTML=buildWin(id,cfg);
  document.getElementById('desk').appendChild(w);
  wins[id]=w;
  makeDraggable(w,id);
  makeResizable(w);
  focusWin(id);
  const di=document.getElementById('d-'+id);
  if(di) di.classList.add('run');
  w.addEventListener('animationend',()=>w.classList.remove('opening'),{once:true});
  postSetup(id);
  updateMBApp(cfg.title);
}

function buildWin(id,cfg){
  return `<div class="wtb">
    <div class="wcs">
      <div class="wc wcr" onclick="closeWin('${id}')"></div>
      <div class="wc wcy" onclick="miniWin('${id}')"></div>
      <div class="wc wcg" onclick="maxWin('${id}')"></div>
    </div>
    <div class="wtt">${cfg.title}</div>
    <div class="wtb-right"></div>
  </div>
  <div class="wb">${buildApp(id)}</div>
  <div class="wrh"></div>`;
}

function buildApp(id){
  if(id==='home')     return buildHome();
  if(id==='browser')  return buildBrowser();
  if(id==='games')    return buildGames();
  if(id==='music')    return buildMusic();
  if(id==='notes')    return buildNotes();
  if(id==='calc')     return buildCalc();
  if(id==='terminal') return buildTerminal();
  if(id==='settings') return buildSettings();
  return '';
}

function closeWin(id){
  const w=wins[id]; if(!w) return;
  w.classList.add('closing');
  w.addEventListener('animationend',()=>{w.remove();delete wins[id];delete maxed[id];},{ once:true});
  const di=document.getElementById('d-'+id);
  if(di) di.classList.remove('run');
}
function miniWin(id){const w=wins[id];if(w) w.classList.add('mini')}
function maxWin(id){
  const w=wins[id];if(!w) return;
  if(maxed[id]){
    Object.assign(w.style,maxed[id]);
    delete maxed[id];
  } else {
    maxed[id]={left:w.style.left,top:w.style.top,width:w.style.width,height:w.style.height};
    w.style.left='0';w.style.top='28px';
    w.style.width=innerWidth+'px';w.style.height=(innerHeight-28-82)+'px';
  }
}
function focusWin(id){
  Object.keys(wins).forEach(k=>{
    wins[k].classList.toggle('focused',k===id);
    if(k===id) wins[k].style.zIndex=++zTop;
  });
  updateMBApp(APPS_CFG[id]?.title||'atomOS');
}

function makeDraggable(win,id){
  const tb=win.querySelector('.wtb');
  let sx,sy,ox,oy,drag=false;
  tb.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('wc')) return;
    focusWin(id);drag=true;sx=e.clientX;sy=e.clientY;ox=win.offsetLeft;oy=win.offsetTop;
    win.style.transition='none';e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag) return;
    win.style.left=(ox+e.clientX-sx)+'px';
    win.style.top=Math.max(28,oy+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup',()=>{if(drag){drag=false;win.style.transition=''}});
  win.addEventListener('mousedown',()=>focusWin(id));
}
function makeResizable(win){
  const rh=win.querySelector('.wrh');
  let sx,sy,sw,sh,res=false;
  rh.addEventListener('mousedown',e=>{res=true;sx=e.clientX;sy=e.clientY;sw=win.offsetWidth;sh=win.offsetHeight;e.preventDefault();e.stopPropagation();});
  document.addEventListener('mousemove',e=>{
    if(!res) return;
    win.style.width=Math.max(300,sw+e.clientX-sx)+'px';
    win.style.height=Math.max(200,sh+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup',()=>{res=false;});
}

function updateMBApp(title){
  document.getElementById('mb-app').textContent=title;
  document.getElementById('mb-ctr').textContent=title;
}

const phrases=["bro the teacher is literally right behind you","nasa called, they want their firewall back","proxy shields at 100% · grades at 12%","currently disguised as a google doc","quantum tunneling through the content filter","this definitely counts as computer science class","the firewall saw nothing. the firewall knows nothing.","speed of light: 3×10⁸ m/s · bypass speed: faster","IT department is somewhere crying rn","error 403: your freedom was denied · fixed"];
let twi=0,twc=0,twe=false,twt=null;
function startTW(){
  const el=document.getElementById('tw');if(!el) return;
  clearTimeout(twt);
  function step(){
    const el2=document.getElementById('tw');if(!el2) return;
    const p=phrases[twi];
    if(!twe){el2.textContent=p.substring(0,twc++);if(twc>p.length){twe=true;twt=setTimeout(step,2600);}else twt=setTimeout(step,40);}
    else{el2.textContent=p.substring(0,twc--);if(twc<0){twe=false;twi=(twi+1)%phrases.length;twt=setTimeout(step,240);}else twt=setTimeout(step,11);}
  }
  step();
}

function loadBrowser(){
  const inp=document.getElementById('burl');if(!inp) return;
  const v=inp.value.trim();if(!v) return;
  const u=v.includes('.')&&!v.includes(' ')?(v.startsWith('http')?v:'https://'+v):'https://search.brave.com/search?q='+encodeURIComponent(v);
  brLoad(u);
}
function brLoad(u){
  const inp=document.getElementById('burl');
  const em=document.querySelector('.bempty');
  const fr=document.getElementById('bfrm');
  if(inp) inp.value=u;
  if(em) em.style.display='none';
  if(fr){fr.style.display='block';fr.style.height='100%';try{fr.src=__uv$config.prefix+__uv$config.encodeUrl(u);}catch(e){fr.src=u;}}
}

const tracks=[
  {n:'Midnight Drive',a:'synthwave',dur:222,color:'#0A84FF'},
  {n:'Neon Lights',a:'vaporwave',dur:251,color:'#BF5AF2'},
  {n:'Lo-Fi Study',a:'ambient',dur:178,color:'#30D158'},
  {n:'Chillhop Beat',a:'hip-hop',dur:204,color:'#FF9F0A'},
  {n:'Deep Space',a:'electronic',dur:302,color:'#64D2FF'},
];
let muTrack=0,muPos=0,muPlaying=false,muInterval=null;
function startMusic(){updateMusicUI();}
function togglePlay(){
  muPlaying=!muPlaying;
  const art=document.getElementById('mu-art');
  const ic=document.getElementById('mu-play-ic');
  if(art) art.classList.toggle('playing',muPlaying);
  if(ic) ic.innerHTML=muPlaying?'<rect x="5" y="4" width="4" height="14" rx="1" fill="currentColor"/><rect x="13" y="4" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M6 4L16 10L6 16Z" fill="currentColor"/>';
  if(muPlaying){muInterval=setInterval(musicTick,1000);}
  else clearInterval(muInterval);
}
function musicTick(){
  const t=tracks[muTrack];
  muPos=Math.min(muPos+1,t.dur);
  if(muPos>=t.dur){nextTrack();return;}
  updateMusicProgress();
}
function updateMusicProgress(){
  const t=tracks[muTrack];
  const pct=(muPos/t.dur)*100;
  const fill=document.getElementById('mu-fill');
  const cur=document.getElementById('mu-cur');
  if(fill) fill.style.width=pct+'%';
  if(cur) cur.textContent=fmt(muPos);
}
function updateMusicUI(){
  const t=tracks[muTrack];
  const title=document.getElementById('mu-title');
  const artist=document.getElementById('mu-artist');
  const tot=document.getElementById('mu-tot');
  const art=document.getElementById('mu-art');
  if(title) title.textContent=t.n;
  if(artist) artist.textContent=t.a;
  if(tot) tot.textContent=fmt(t.dur);
  if(art) art.style.background=`radial-gradient(circle at 38% 35%,rgba(255,255,255,.15),${t.color}88 45%,${t.color}44 75%,transparent)`;
  muPos=0;updateMusicProgress();
  document.querySelectorAll('.mu-track').forEach((el,i)=>{
    el.classList.toggle('playing',i===muTrack);
    const ico=el.querySelector('.mu-tic');
    if(ico) ico.textContent=i===muTrack?'▶':'♪';
  });
}
function nextTrack(){muTrack=(muTrack+1)%tracks.length;updateMusicUI();}
function prevTrack(){muTrack=(muTrack-1+tracks.length)%tracks.length;updateMusicUI();}
function playTrack(i){muTrack=i;updateMusicUI();if(!muPlaying)togglePlay();}
function shuffleTrack(){muTrack=Math.floor(Math.random()*tracks.length);updateMusicUI();}
function seekTrack(e){
  const t=tracks[muTrack];
  const rect=e.currentTarget.getBoundingClientRect();
  muPos=Math.round(((e.clientX-rect.left)/rect.width)*t.dur);
  updateMusicProgress();
}
function setVol(v){}
function fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

/* ══════════════════════════════════════
   CALCULATOR
══════════════════════════════════════ */
let calcExpr='',calcNum='0',calcOp='',calcPrev='',calcReset=false;
function calcBind(){
  document.addEventListener('keydown',calcKeyDown);
}
function calcKeyDown(e){
  if(!wins['calc']) return;
  if(e.key>='0'&&e.key<='9') calcBtn(e.key);
  else if(e.key==='.') calcBtn('.');
  else if(e.key==='+') calcBtn('+');
  else if(e.key==='-') calcBtn('−');
  else if(e.key==='*') calcBtn('×');
  else if(e.key==='/'){e.preventDefault();calcBtn('÷');}
  else if(e.key==='Enter'||e.key==='=') calcBtn('=');
  else if(e.key==='Backspace') calcBtn('AC');
  else if(e.key==='Escape') calcBtn('AC');
}
function calcBtn(k){
  const nd=document.getElementById('calc-num');
  const ex=document.getElementById('calc-expr');
  if(!nd||!ex) return;
  if(k==='AC'){calcNum='0';calcExpr='';calcOp='';calcPrev='';calcReset=false;}
  else if(k==='+/-'){calcNum=String(-parseFloat(calcNum)||0);}
  else if(k==='%'){calcNum=String(parseFloat(calcNum)/100);}
  else if(['÷','×','−','+'].includes(k)){
    calcPrev=calcNum;calcOp=k;calcReset=true;
    calcExpr=calcNum+' '+k;
  }
  else if(k==='='){
    if(!calcOp||!calcPrev) return;
    const a=parseFloat(calcPrev),b=parseFloat(calcNum);
    let r=0;
    if(calcOp==='÷') r=b!==0?a/b:0;
    else if(calcOp==='×') r=a*b;
    else if(calcOp==='−') r=a-b;
    else if(calcOp==='+') r=a+b;
    calcExpr=calcPrev+' '+calcOp+' '+calcNum+' =';
    calcNum=String(parseFloat(r.toFixed(10)));
    calcOp='';calcPrev='';calcReset=true;
  }
  else if(k==='.'){
    if(!calcNum.includes('.')) calcNum+='.';
  }
  else{
    if(calcReset||calcNum==='0'){calcNum=k;calcReset=false;}
    else calcNum+=k;
    if(calcNum.length>12) calcNum=calcNum.substring(0,12);
  }
  nd.textContent=calcNum;
  ex.textContent=calcExpr;
}

  clear:()=>'__clear__',

  proxy:()=>'● Proxy: ACTIVE\n  Engine : UV Ultraviolet v3.x\n  Status : All traffic secured\n  History: Disabled',
  fortune:()=>{const f=['The teacher is close. Stay calm.','Error 403: Your freedom was denied. Fixed.','Grades: 12%. Fun: 100%.','The IT admin has no idea.','Quantum-tunneled through the firewall again.','Knowledge is free. The school Wi-Fi is not.'];return f[Math.floor(Math.random()*f.length)]},
  neofetch:()=>`       .---.       atomOS v3.0\n      /|   |\\      ──────────────\n     ( |   | )     OS: atomOS 3.0\n      \\|   |/      Kernel: UV 3.x\n       '---'       Shell: atom-zsh\n                   Proxy: Active\n                   Memory: ∞\n                   Uptime: always`,

};
function termKey(e){
  if(e.key!=='Enter') return;
  const inp=document.getElementById('ti');if(!inp) return;
  const val=inp.value.trim();
  const body=document.getElementById('term-body');if(!body) return;
  const row=body.querySelector('.tinr');
  const echo=document.createElement('div');
  echo.className='trow';
  echo.innerHTML=`<span class="tp">atom@os ~ % </span>${val}`;
  body.insertBefore(echo,row);
  if(val){
    const [cmd,...args]=val.split(' ');
    const fn=cmds[cmd.toLowerCase()];
    let out=fn?fn(args[0]):`zsh: command not found: ${cmd}`;
    if(out==='__clear__'){
      Array.from(body.children).forEach(c=>{if(c!==row) c.remove()});
    } else {
      out.split('\n').forEach(line=>{
        const d=document.createElement('div');d.className='trow to';d.textContent=line;body.insertBefore(d,row);
      });
    }
  }
  inp.value='';body.scrollTop=body.scrollHeight;
}

let spSel=0,spFiltered=[];
function openSp(){spEl.classList.add('open');setTimeout(()=>spInp.focus(),50);spSearch('');}
function closeSp(e){if(!e||e.target===spEl){spEl.classList.remove('open');spInp.value='';spRes.innerHTML='';}}

  spFiltered=q?spAll.filter(i=>i.n.toLowerCase().includes(q.toLowerCase())||i.desc.toLowerCase().includes(q.toLowerCase())):spAll.slice(0,8);
  spSel=0;renderSp();

function renderSp(){
  spRes.innerHTML=spFiltered.slice(0,8).map((it,i)=>`<div class="spi${i===spSel?' spon':''}" onclick="spRun(${i})"><div class="spio ib-blue"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="white" stroke-width="1.3"/></svg></div><div><div class="spin">${it.n}</div><div class="spid">${it.desc}</div></div></div>`).join('');
}

function spKey(e){
  if(e.key==='ArrowDown'){spSel=Math.min(spSel+1,spFiltered.length-1);renderSp();}
  else if(e.key==='ArrowUp'){spSel=Math.max(spSel-1,0);renderSp();}
  else if(e.key==='Enter'){spRun(spSel);}
}

const nstack=document.getElementById('nstack');
function notify(title,msg,icon,bg){
  const n=document.createElement('div');
  n.className='notif';
  n.innerHTML=`<div class="ni ${bg||'ib-blue'}">${icon||`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,.8)" stroke-width="1.4"/><line x1="8" y1="5.5" x2="8" y2="9" stroke="white" stroke-width="1.6" stroke-linecap="round"/><circle cx="8" cy="11" r=".8" fill="white"/></svg>`}</div><div class="nb2"><div class="nt">${title}</div><div class="nm">${msg}</div></div><div class="ntime">now</div>`;
  n.onclick=()=>dismissN(n);
  nstack.appendChild(n);
  setTimeout(()=>dismissN(n),5500);
}
function dismissN(n){n.classList.add('out');n.addEventListener('animationend',()=>n.remove(),{once:true});}
</script>
